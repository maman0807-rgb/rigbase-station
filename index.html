    async function submitMutasi(equipment_id, from_unit_id) {
      const form = document.getElementById('mutasi-form');
      const submitBtn = document.getElementById('mutasi-submit-btn');
      const cancelBtn = document.getElementById('mutasi-cancel-btn');
      const to_unit_id = Number(form.elements.to_unit_id.value);
      const mutation_date = form.elements.mutation_date.value;
      const reason = form.elements.reason.value || null;
      if (!to_unit_id) { toast('Pilih unit tujuan dulu.', 'warn'); return; }
      if (to_unit_id === from_unit_id) { toast('Unit tujuan harus berbeda dengan unit asal.', 'warn'); return; }

      // Cek apakah equipment ini punya children — kalau iya, tanya cascade
      let children = [];
      try { children = await fetchChildren(equipment_id); } catch {}
      let cascade = false;
      if (children.length > 0) {
        closeModal();
        const choice = await new Promise((resolve) => {
          const id = '__cas_' + Date.now();
          openModal({
            title: `Equipment ini punya ${children.length} komponen`,
            maxWidth: 'max-w-md',
            body: `
              <p class="text-sm text-slate-700 mb-3">Equipment ini adalah <b>container</b> yang punya komponen anak:</p>
              <ul class="text-sm text-slate-600 bg-slate-50 rounded p-3 max-h-40 overflow-y-auto mb-3 list-disc list-inside">
                ${children.map(c => `<li><b>${escapeHtml(c.tag_number)}</b> — ${escapeHtml(c.nama_equipment)}</li>`).join('')}
              </ul>
              <p class="text-sm text-slate-700">Apa yang mau dilakukan ke komponen ini saat mutasi?</p>
            `,
            footer: `
              <button onclick="closeModal(); window['${id}']('cancel');" class="px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batalkan Mutasi</button>
              <button onclick="closeModal(); window['${id}']('detach');" class="px-3 py-2 rounded-lg bg-amber-100 hover:bg-amber-200 text-amber-800 text-sm font-medium">Detach saja (komponen tetap di unit lama)</button>
              <button onclick="closeModal(); window['${id}']('cascade');" class="px-3 py-2 rounded-lg bg-navy hover:bg-navy-700 text-white text-sm font-semibold">Cascade — pindah semua</button>
            `,
            dismissable: false,
          });
          window[id] = (v) => { delete window[id]; resolve(v); };
        });

        if (choice === 'cancel') return;
        cascade = (choice === 'cascade');
      }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Memproses…'; }
      if (cancelBtn) cancelBtn.disabled = true;
      try {
        // Mutasi parent
        await createMutation({ equipment_id, from_unit_id, to_unit_id, mutation_date, reason });

        // Handle children
        if (children.length > 0) {
          if (cascade) {
            // Pindahkan semua children ke unit tujuan + log mutation
            for (const child of children) {
              await createMutation({
                equipment_id: child.id,
                from_unit_id,
                to_unit_id,
                mutation_date,
                reason: `[Cascade] Ikut parent ${escapeHtml(window.__currentEq?.tag_number || '')} — ${reason || ''}`.trim(),
              });
            }
          } else {
            // Detach: lepas parent_equipment_id dari children, tapi tetap di unit lama
            const { error } = await state.supabase.from('equipment').update({
              parent_equipment_id: null,
              updated_by: state.user.id,
            }).in('id', children.map(c => c.id));
            if (error) throw new Error('Detach children gagal: ' + error.message);
          }
        }

        const eq = window.__currentEq;
        logActivity('mutated', 'equipment', equipment_id, eq?.tag_number, {
          from: getParentUnitName(from_unit_id),
          to: getParentUnitName(to_unit_id),
          mutation_date, reason,
          cascade_children: cascade ? children.length : 0,
        });
        toast(`Mutasi berhasil${cascade ? ' (cascade ' + children.length + ' komponen)' : children.length > 0 ? ' (komponen di-detach)' : ''} — lihat tab History.`, 'success');
        closeModal();
        // 🔔 Telegram alert
        sendTelegramAlert(
          `↔ <b>Mutasi Equipment</b>\n` +
          `<b>${eq?.tag_number || equipment_id}</b>${eq ? ' — ' + eq.nama_equipment : ''}\n` +
          `${getParentUnitName(from_unit_id)} → <b>${getParentUnitName(to_unit_id)}</b>\n` +
          (cascade && children.length > 0 ? `🧩 +${children.length} komponen ikut\n` : '') +
          `📅 ${mutation_date}\n` +
          (reason ? `📝 ${reason}\n` : '') +
          `👤 ${state.profile.full_name || state.profile.email}`
        );
        setEquipmentView('detail', equipment_id, 'history');
      } catch (err) {
        toast('Gagal mutasi: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Mutasi Sekarang'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitMutasi = submitMutasi;

    // ============================================================
    // 9g.2. PENGGANTIAN EQUIPMENT (Replace Flow)
    // Yang lama → pindah ke unit Independent, status Standby, tipe Mobile-Backup.
    // Yang baru → menempati posisi/unit yang ditinggalkan.
    // ============================================================
    // State helper buat replace modal — track filter Mobile-Backup only
    state.replaceShowPermanent = false;
    state.replaceCandidates = [];

    async function openReplaceModal(equipmentId) {
      const eq = window.__currentEq;
      if (!eq || eq.id !== equipmentId) return;

      // GUARD 1: parent unit "Independent" harus ada
      const independentUnit = state.parentUnits.find(u => u.name === 'Independent');
      if (!independentUnit) {
        toast('Parent unit "Independent" tidak ditemukan di database.', 'error');
        return;
      }
      // GUARD 2: equipment harus punya unit assigned
      if (!eq.assigned_unit_id) {
        toast('Equipment ini belum ter-assign ke unit. Edit dulu sebelum diganti.', 'warn');
        return;
      }
      // GUARD 3: kalau equipment udah di Independent — gak masuk akal diganti
      if (eq.assigned_unit_id === independentUnit.id) {
        toast('Equipment ini sudah di pool Independent (backup). Pakai Mutasi kalau mau pindah ke rig.', 'warn');
        return;
      }
      // GUARD 4: harus punya kategori
      if (!eq.kategori_id) {
        toast('Equipment ini belum punya kategori. Edit dulu sebelum diganti.', 'warn');
        return;
      }

      state.replaceShowPermanent = false;
      await loadReplaceCandidates(eq);
      renderReplaceModal(eq, independentUnit);
    }
    window.openReplaceModal = openReplaceModal;

    async function loadReplaceCandidates(eq) {
      try {
        let q = state.supabase
          .from('equipment')
          .select('id, tag_number, nama_equipment, assigned_unit_id, status_operasi, tipe_kepemilikan, brand, model')
          .eq('kategori_id', eq.kategori_id)
          .neq('id', eq.id)
          .neq('status_operasi', 'Scrap');
        if (!state.replaceShowPermanent) q = q.eq('tipe_kepemilikan', 'Mobile-Backup');
        q = q.order('tipe_kepemilikan', { ascending: false }).order('tag_number');
        const { data, error } = await q;
        if (error) throw error;
        state.replaceCandidates = data || [];
      } catch (err) {
        toast('Gagal load kandidat: ' + err.message, 'error');
        state.replaceCandidates = [];
      }
    }

    async function toggleReplacePermanent(eqId) {
      state.replaceShowPermanent = !state.replaceShowPermanent;
      const eq = window.__currentEq;
      if (!eq || eq.id !== eqId) return;
      await loadReplaceCandidates(eq);
      const selectEl = document.querySelector('#replace-form select[name="new_id"]');
      const noteEl = document.querySelector('#replace-candidate-note');
      const toggleEl = document.querySelector('#replace-permanent-toggle');
      if (selectEl) selectEl.innerHTML = buildCandidateOptions();
      if (noteEl) noteEl.innerHTML = candidateNote(eq);
      if (toggleEl) toggleEl.checked = state.replaceShowPermanent;
    }
    window.toggleReplacePermanent = toggleReplacePermanent;

    function buildCandidateOptions() {
      if (state.replaceCandidates.length === 0) {
        const filterNote = state.replaceShowPermanent ? '' : ' (Mobile-Backup saja)';
        return `<option value="">-- Tidak ada kandidat${filterNote} --</option>`;
      }
      return '<option value="">— pilih pengganti —</option>' + state.replaceCandidates.map(c => {
        const note = c.tipe_kepemilikan === 'Mobile-Backup' ? ' [Backup]' : ' [Permanent]';
        const loc = c.assigned_unit_id ? ` @ ${getParentUnitName(c.assigned_unit_id)}` : ' @ belum ter-assign';
        return `<option value="${c.id}">${escapeHtml(c.tag_number)} — ${escapeHtml(c.nama_equipment)}${note}${escapeHtml(loc)}</option>`;
      }).join('');
    }

    function candidateNote(eq) {
      const total = state.replaceCandidates.length;
      const mode = state.replaceShowPermanent ? 'semua (Backup + Permanent)' : 'Mobile-Backup saja';
      return `${total} kandidat kategori "${escapeHtml(getCategoryName(eq.kategori_id))}" — ${mode}.`;
    }

    function renderReplaceModal(eq, independentUnit) {
      const oldUnitName = getParentUnitName(eq.assigned_unit_id);
      const today = new Date().toISOString().slice(0, 10);
      openModal({
        title: 'Ganti Equipment',
        maxWidth: 'max-w-xl',
        body: `
          <div class="space-y-3">
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm">
              <div class="font-bold text-amber-900 mb-1">Equipment yang akan diganti:</div>
              <div class="text-amber-800">
                <span class="font-semibold">${escapeHtml(eq.tag_number)}</span> — ${escapeHtml(eq.nama_equipment)}
              </div>
              <div class="text-xs text-amber-700 mt-1">
                Kategori: ${escapeHtml(getCategoryName(eq.kategori_id))} • Saat ini di: <span class="font-semibold">${escapeHtml(oldUnitName)}</span>
              </div>
            </div>

            <form id="replace-form" class="space-y-3">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Equipment Pengganti *</label>
                <select name="new_id" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                  ${buildCandidateOptions()}
                </select>
                <p id="replace-candidate-note" class="text-xs text-slate-500 mt-1">${candidateNote(eq)}</p>
                <label class="flex items-center gap-2 mt-2 text-xs text-slate-600 cursor-pointer">
                  <input type="checkbox" id="replace-permanent-toggle" ${state.replaceShowPermanent ? 'checked' : ''} onchange="toggleReplacePermanent('${eq.id}')" class="rounded" />
                  <span>Tampilkan juga equipment <b>Permanent</b> (hati-hati: bisa "mencuri" dari rig lain)</span>
                </label>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Penggantian *</label>
                  <input type="date" name="replace_date" required value="${today}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-1">Status Equipment Lama</label>
                  <select name="old_status" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                    <option value="Standby" selected>Standby (default)</option>
                    <option value="Repair">Repair</option>
                    <option value="Down">Down</option>
                    <option value="Scrap">Scrap</option>
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Catatan / Alasan</label>
                <textarea name="reason" rows="2" placeholder="contoh: Equipment lama overhaul, sementara pakai backup..." class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm"></textarea>
              </div>

              <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
                <div class="font-bold mb-1">📋 Yang akan terjadi:</div>
                <ul class="list-disc list-inside space-y-0.5">
                  <li><span class="font-semibold">${escapeHtml(eq.tag_number)}</span> → pindah ke <span class="font-semibold">Independent</span>, tipe <span class="font-semibold">Mobile-Backup</span>, status sesuai pilihan</li>
                  <li><span class="font-semibold">Equipment pengganti</span> → pindah ke <span class="font-semibold">${escapeHtml(oldUnitName)}</span>, tipe <span class="font-semibold">Permanent</span>, status <span class="font-semibold">Aktif</span></li>
                  <li>Dua entry mutation_log dicatat untuk audit trail</li>
                </ul>
              </div>
            </form>
          </div>
        `,
        footer: `
          <button id="replace-cancel-btn" onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batal</button>
          <button id="replace-submit-btn" onclick="submitReplace('${eq.id}', ${eq.assigned_unit_id}, ${independentUnit.id})" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">🔄 Lakukan Penggantian</button>
        `,
      });
    }

    async function submitReplace(oldEquipmentId, oldUnitId, independentUnitId) {
      const form = document.getElementById('replace-form');
      const submitBtn = document.getElementById('replace-submit-btn');
      const cancelBtn = document.getElementById('replace-cancel-btn');
      const newId = form.elements.new_id.value;
      const replace_date = form.elements.replace_date.value;
      const old_status = form.elements.old_status.value || 'Standby';
      const reason = form.elements.reason.value || null;

      // VALIDASI input
      if (!newId)         { toast('Pilih equipment pengganti dulu.', 'warn'); return; }
      if (!replace_date)  { toast('Tanggal wajib diisi.', 'warn'); return; }
      if (newId === oldEquipmentId) { toast('Equipment pengganti tidak boleh sama dengan equipment lama.', 'warn'); return; }
      if (!oldUnitId)     { toast('Equipment lama belum punya unit. Operasi dibatalkan.', 'error'); return; }
      if (oldUnitId === independentUnitId) { toast('Equipment lama sudah di Independent. Operasi dibatalkan.', 'error'); return; }

      // Konfirmasi double (extra safety)
      const ok = await confirmDialog({
        title: 'Konfirmasi Penggantian',
        message: `Yakin mau lakukan penggantian ini? 2 equipment akan di-update + 2 entry log akan dibuat. Aksi ini tidak otomatis bisa di-undo.`,
        confirmText: 'Ya, Lanjutkan',
      });
      if (!ok) return;

      // Modal konfirmasi nutup modal replace, kita harus buka lagi atau langsung jalan?
      // Karena confirmDialog override modal, replace modal udah ke-close.
      // Disable button gak bisa lagi — langsung kerja saja.

      // Fetch ulang equipment baru (data fresh — antisipasi race condition)
      let newEq;
      try {
        const { data, error } = await state.supabase.from('equipment')
          .select('id, tag_number, nama_equipment, assigned_unit_id, status_operasi').eq('id', newId).single();
        if (error) throw error;
        newEq = data;
      } catch (err) {
        toast('Gagal load equipment pengganti: ' + err.message, 'error');
        return;
      }

      // Re-verify: newEq jangan dalam status Scrap (mungkin baru di-Scrap antara load modal & submit)
      if (newEq.status_operasi === 'Scrap') {
        toast(`Equipment ${newEq.tag_number} berstatus Scrap. Pilih yang lain.`, 'warn');
        return;
      }

      const oldEq = window.__currentEq;
      const oldUnitName = getParentUnitName(oldUnitId);

      // 4 operasi
      try {
        // 1. Update equipment lama
        const { error: e1 } = await state.supabase.from('equipment').update({
          assigned_unit_id: independentUnitId,
          status_operasi: old_status,
          tipe_kepemilikan: 'Mobile-Backup',
          updated_by: state.user.id,
        }).eq('id', oldEquipmentId);
        if (e1) throw new Error('Update equipment lama gagal: ' + e1.message);

        // 2. Update equipment baru
        const { error: e2 } = await state.supabase.from('equipment').update({
          assigned_unit_id: oldUnitId,
          status_operasi: 'Aktif',
          tipe_kepemilikan: 'Permanent',
          updated_by: state.user.id,
        }).eq('id', newId);
        if (e2) throw new Error('Update equipment baru gagal: ' + e2.message);

        // 3. Mutation log untuk equipment lama
        const reasonOld = `[Penggantian] Diganti oleh ${newEq.tag_number}. Status → ${old_status}.${reason ? ' — ' + reason : ''}`.trim();
        const { error: e3 } = await state.supabase.from('mutation_log').insert({
          equipment_id: oldEquipmentId,
          from_unit_id: oldUnitId,
          to_unit_id: independentUnitId,
          mutation_date: replace_date,
          reason: reasonOld,
          created_by: state.user.id,
        });
        if (e3) throw new Error('Log mutasi lama gagal: ' + e3.message);

        // 4. Mutation log untuk equipment baru
        const reasonNew = `[Penggantian] Menggantikan ${oldEq.tag_number} di ${oldUnitName}.${reason ? ' — ' + reason : ''}`.trim();
        const { error: e4 } = await state.supabase.from('mutation_log').insert({
          equipment_id: newId,
          from_unit_id: newEq.assigned_unit_id,
          to_unit_id: oldUnitId,
          mutation_date: replace_date,
          reason: reasonNew,
          created_by: state.user.id,
        });
        if (e4) throw new Error('Log mutasi baru gagal: ' + e4.message);

        logActivity('replaced', 'equipment', oldEquipmentId, oldEq.tag_number, {
          replaced_by: newEq.tag_number,
          old_status, replace_date, reason,
        });
        toast(`Penggantian berhasil. ${newEq.tag_number} aktif di ${oldUnitName}. Lihat tab History.`, 'success');
        // 🔔 Telegram alert
        sendTelegramAlert(
          `🔄 <b>Penggantian Equipment</b>\n` +
          `🟢 Aktif: <b>${newEq.tag_number}</b> @ ${oldUnitName}\n` +
          `🟡 Standby (${old_status}): <b>${oldEq.tag_number}</b> → Independent\n` +
          `📅 ${replace_date}\n` +
          (reason ? `📝 ${reason}\n` : '') +
          `👤 ${state.profile.full_name || state.profile.email}`
        );
        // Langsung pindah ke equipment BARU's History tab
        setEquipmentView('detail', newId, 'history');
      } catch (err) {
        toast('Gagal: ' + err.message + ' — Cek manual via SQL Editor.', 'error');
        console.error('Replace failed:', err);
      }
    }
    window.submitReplace = submitReplace;

    // ============================================================
    // 9g.3. PINJAM-MEMINJAM EQUIPMENT (Loan Flow)
    // Equipment yang rusak pinjam pengganti dari unit lain.
    // Lender equipment: tetap milik unit asal, pindah sementara.
    // Borrower equipment: tetap di unit-nya, status jadi Repair.
    // ============================================================
    async function openLoanModal(borrowerEquipmentId) {
      const borrower = window.__currentEq;
      if (!borrower || borrower.id !== borrowerEquipmentId) return;

      // Guards
      if (!borrower.assigned_unit_id) {
        toast('Equipment ini belum ter-assign ke unit.', 'warn');
        return;
      }
      if (!borrower.kategori_id) {
        toast('Equipment ini belum punya kategori.', 'warn');
        return;
      }

      // Fetch kandidat lender: kategori sama, status Aktif, unit BEDA, gak lagi dipinjam
      let candidates = [];
      try {
        const { data, error } = await state.supabase
          .from('equipment')
          .select('id, tag_number, nama_equipment, assigned_unit_id, status_operasi, tipe_kepemilikan')
          .eq('kategori_id', borrower.kategori_id)
          .eq('status_operasi', 'Aktif')
          .neq('id', borrowerEquipmentId)
          .neq('assigned_unit_id', borrower.assigned_unit_id)
          .order('tipe_kepemilikan', { ascending: false })
          .order('tag_number');
        if (error) throw error;
        // Filter: pastikan gak lagi dipinjamkan (cek loan_log)
        const candidateIds = (data || []).map(c => c.id);
        if (candidateIds.length > 0) {
          const { data: activeLoans } = await state.supabase
            .from('loan_log')
            .select('lender_equipment_id')
            .in('lender_equipment_id', candidateIds)
            .eq('status', 'active');
          const lentIds = new Set((activeLoans || []).map(l => l.lender_equipment_id));
          candidates = (data || []).filter(c => !lentIds.has(c.id));
        }
      } catch (err) {
        toast('Gagal load kandidat: ' + err.message, 'error');
        return;
      }

      const borrowerUnitName = getParentUnitName(borrower.assigned_unit_id);
      const today = new Date().toISOString().slice(0, 10);

      const candidateOpts = candidates.length === 0
        ? '<option value="">-- Tidak ada kandidat (kategori sama, status Aktif, unit lain, tidak sedang dipinjamkan) --</option>'
        : '<option value="">— pilih equipment yang dipinjam —</option>' + candidates.map(c => {
            const note = c.tipe_kepemilikan === 'Mobile-Backup' ? ' [Backup]' : '';
            return `<option value="${c.id}">${escapeHtml(c.tag_number)} — ${escapeHtml(c.nama_equipment)}${note} @ ${escapeHtml(getParentUnitName(c.assigned_unit_id))}</option>`;
          }).join('');

      openModal({
        title: 'Pinjam Equipment Pengganti',
        maxWidth: 'max-w-xl',
        body: `
          <div class="space-y-3">
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm">
              <div class="font-bold text-amber-900 mb-1">Equipment yang butuh pengganti:</div>
              <div class="text-amber-800">
                <span class="font-semibold">${escapeHtml(borrower.tag_number)}</span> — ${escapeHtml(borrower.nama_equipment)}
              </div>
              <div class="text-xs text-amber-700 mt-1">
                Kategori: ${escapeHtml(getCategoryName(borrower.kategori_id))} • Berada di: <span class="font-semibold">${escapeHtml(borrowerUnitName)}</span> • Status: ${escapeHtml(borrower.status_operasi)}
              </div>
            </div>

            <form id="loan-form" class="space-y-3">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Equipment yang Dipinjam *</label>
                <select name="lender_id" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                  ${candidateOpts}
                </select>
                <p class="text-xs text-slate-500 mt-1">${candidates.length} kandidat kategori "${escapeHtml(getCategoryName(borrower.kategori_id))}" — status Aktif & unit berbeda.</p>
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Pinjam *</label>
                <input type="date" name="loan_date" required value="${today}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Alasan / Catatan</label>
                <textarea name="reason" rows="2" placeholder="contoh: ACC-100A rusak segel, perlu pengganti sementara sambil tunggu spare part" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm"></textarea>
              </div>

              <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
                <div class="font-bold mb-1">📋 Yang akan terjadi:</div>
                <ul class="list-disc list-inside space-y-0.5">
                  <li>Equipment yang dipinjam → pindah <b>sementara</b> ke <b>${escapeHtml(borrowerUnitName)}</b></li>
                  <li><b>${escapeHtml(borrower.tag_number)}</b> → status diubah jadi <b>Repair</b> (kalau belum)</li>
                  <li>Entry loan_log dibuat dengan status <b>active</b></li>
                  <li>Nanti tinggal klik <b>↩ Kembalikan Pinjaman</b> untuk balikin equipment ke pemilik</li>
                </ul>
              </div>
            </form>
          </div>
        `,
        footer: `
          <button id="loan-cancel-btn" onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batal</button>
          <button id="loan-submit-btn" onclick="submitLoan('${borrowerEquipmentId}')" class="px-4 py-2 rounded-lg bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">🤝 Pinjam Sekarang</button>
        `,
      });
    }
    window.openLoanModal = openLoanModal;

    async function submitLoan(borrowerEquipmentId) {
      const form = document.getElementById('loan-form');
      const submitBtn = document.getElementById('loan-submit-btn');
      const cancelBtn = document.getElementById('loan-cancel-btn');
      const lender_id = form.elements.lender_id.value;
      const loan_date = form.elements.loan_date.value;
      const reason = form.elements.reason.value || null;

      if (!lender_id) { toast('Pilih equipment yang dipinjam dulu.', 'warn'); return; }
      if (!loan_date) { toast('Tanggal pinjam wajib diisi.', 'warn'); return; }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Memproses…'; }
      if (cancelBtn) cancelBtn.disabled = true;

      try {
        await createLoan({
          lender_equipment_id: lender_id,
          borrower_equipment_id: borrowerEquipmentId,
          loan_date, reason,
        });
        const borrower = window.__currentEq;
        const { data: lenderEq } = await state.supabase.from('equipment').select('tag_number, nama_equipment, assigned_unit_id').eq('id', lender_id).maybeSingle();
        logActivity('loaned', 'loan', null, `${lenderEq?.tag_number} → ${borrower?.tag_number}`, {
          lender_tag: lenderEq?.tag_number,
          borrower_tag: borrower?.tag_number,
          loan_date, reason,
        });
        toast('Pinjaman berhasil dicatat.', 'success');
        closeModal();
        // 🔔 Telegram alert
        sendTelegramAlert(
          `🤝 <b>Pinjam Equipment</b>\n` +
          `Yang dipinjam: <b>${lenderEq?.tag_number || lender_id}</b>${lenderEq ? ' — ' + lenderEq.nama_equipment : ''}\n` +
          `Dari: ${getParentUnitName(lenderEq?.assigned_unit_id)} → <b>${getParentUnitName(borrower?.assigned_unit_id)}</b>\n` +
          `Menggantikan: <b>${borrower?.tag_number || borrowerEquipmentId}</b> (status Repair)\n` +
          `📅 ${loan_date}\n` +
          (reason ? `📝 ${reason}\n` : '') +
          `👤 ${state.profile.full_name || state.profile.email}`
        );
        setEquipmentView('detail', borrowerEquipmentId, 'history');
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '🤝 Pinjam Sekarang'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitLoan = submitLoan;

    async function openReturnLoanModal(loanId) {
      let loan;
      try {
        const { data, error } = await state.supabase.from('loan_log').select('*').eq('id', loanId).single();
        if (error) throw error;
        loan = data;
      } catch (err) {
        toast('Gagal load loan: ' + err.message, 'error');
        return;
      }
      if (loan.status !== 'active') {
        toast('Pinjaman ini sudah dikembalikan.', 'warn');
        return;
      }

      // Fetch info equipment terkait
      const [lenderResp, borrowerResp] = await Promise.all([
        state.supabase.from('equipment').select('id, tag_number, nama_equipment').eq('id', loan.lender_equipment_id).maybeSingle(),
        loan.borrower_equipment_id
          ? state.supabase.from('equipment').select('id, tag_number, nama_equipment, status_operasi').eq('id', loan.borrower_equipment_id).maybeSingle()
          : Promise.resolve({ data: null }),
      ]);
      const lenderEq = lenderResp.data;
      const borrowerEq = borrowerResp.data;
      const today = new Date().toISOString().slice(0, 10);
      const lenderUnitName = getParentUnitName(loan.lender_unit_id);

      openModal({
        title: 'Kembalikan Pinjaman',
        maxWidth: 'max-w-xl',
        body: `
          <div class="space-y-3">
            <div class="bg-green-50 border border-green-200 rounded-lg p-3 text-sm">
              <div class="font-bold text-green-900 mb-1">Detail Pinjaman:</div>
              <div class="text-green-800 text-sm">
                <div><b>Yang dipinjam:</b> ${lenderEq ? escapeHtml(lenderEq.tag_number) + ' — ' + escapeHtml(lenderEq.nama_equipment) : '(equipment terhapus)'}</div>
                <div><b>Kembali ke unit:</b> ${escapeHtml(lenderUnitName)}</div>

    // Kompresi foto sebelum upload — max 1920px, JPEG quality 0.85
    // Target: file < 500KB, kualitas masih jelas buat dokumentasi equipment.
    async function compressImage(file, { maxDim = 1920, quality = 0.85 } = {}) {
      if (!file.type.startsWith('image/')) return file;
      // Skip kompresi untuk GIF / SVG / HEIC — canvas gak bisa handle
      if (/^image\/(gif|svg\+xml|heic|heif)/.test(file.type)) return file;
      let bitmap;
      try { bitmap = await createImageBitmap(file); } catch { return file; }
      let { width, height } = bitmap;
      const ratio = Math.min(maxDim / width, maxDim / height, 1);
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0, width, height);
      bitmap.close?.();
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
      if (!blob || blob.size >= file.size) return file; // kalau hasil kompresi lebih besar, pakai original
      const newName = file.name.replace(/\.[^.]+$/, '') + '.jpg';
      return new File([blob], newName, { type: 'image/jpeg' });
    }

    function fmtBytes(n) {
      if (n < 1024) return n + ' B';
      if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1048576).toFixed(2) + ' MB';
    }

        const file = isImage(raw) ? await compressImage(raw) : raw;
        const savedNote = isImage(raw) && file.size < raw.size
          ? ` (${fmtBytes(raw.size)} → ${fmtBytes(file.size)})`
          : '';
        const bucket = isImage(file) ? 'equipment-photos' : 'equipment-documents';
        const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
        const path = `${equipmentId}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
        try {
          status.innerHTML = `<div class="bg-blue-50 text-blue-700 p-2 rounded text-sm mb-2">Mengupload ${escapeHtml(file.name)}${savedNote}…</div>`;
          await uploadFile(bucket, path, file);

          await createDocumentRecord({
            equipment_id: equipmentId,
            file_name: raw.name, // pakai nama asli, bukan .jpg hasil kompresi
            file_url,
            file_type: file.type || null,

    // 10z. STRESS SCORE (Mobilisasi) — modul analisa Sr Mekanik+
    // ============================================================
    const STRESS_CAT_META = {
      low:      { label: 'LOW',      emoji: '🟢', cls: 'bg-green-100 text-green-700'   },
      medium:   { label: 'MEDIUM',   emoji: '🟡', cls: 'bg-yellow-100 text-yellow-700' },
      high:     { label: 'HIGH',     emoji: '🟠', cls: 'bg-orange-100 text-orange-700' },
      critical: { label: 'CRITICAL', emoji: '🔴', cls: 'bg-red-100 text-red-700'      },
    };
    const STRESS_FACTORS = [
      ['s1_distance','Jarak',10], ['s2_road','Kondisi Jalan',22], ['s3_route','Route',13],
      ['s4_transport','Transport',25], ['s5_duration','Durasi',5], ['s6_weather','Cuaca',10], ['s7_incident','Insiden',10],
    ];

    function calcStress(d) {
      const dist = Number(d.distance) || 0;
      let s1 = 2; if (dist > 100) s1 = 10; else if (dist >= 50) s1 = 8; else if (dist >= 25) s1 = 5;
      const dmgPct = dist > 0 ? (Number(d.roadDamage || 0) / dist) * 100 : 0;
      let s2 = 3; if (dmgPct >= 30) s2 = 22; else if (dmgPct >= 15) s2 = 16; else if (dmgPct >= 5) s2 = 10;
      const s3 = Math.min(Number(d.blindSpots) || 0, 5)
               + Math.min((Number(d.railwayCrossings) || 0) * 2, 5)
               + Math.min(Number(d.bridges) || 0, 3);
      let lot = 2; const L = Number(d.totalLots) || 0;
      if (L >= 21) lot = 10; else if (L >= 11) lot = 7; else if (L >= 5) lot = 4;
      let foco = 3; const F = Number(d.focoUnits) || 0;
      if (F >= 7) foco = 13; else if (F >= 5) foco = 10; else if (F >= 3) foco = 6;
      const craneMap = { none: 0, less_25: 1, '25_50': 2, more_50: 3 };
      const s4 = Math.min(lot + foco + (craneMap[d.craneCapacity] || 0), 25);
      let s5 = 0; const dur = Number(d.duration) || 0;
      if (dur >= 48) s5 = 5; else if (dur >= 24) s5 = 3; else if (dur >= 8) s5 = 2; else if (dur > 0) s5 = 1;
      const s6 = ({ cerah: 0, mendung: 3, hujan_delay: 6, hujan_sering: 10 })[d.weather] || 0;
      const s7 = ({ none: 0, minor: 3, moderate: 6, major: 10 })[d.incident] || 0;
      const total = s1 + s2 + s3 + s4 + s5 + s6 + s7;
      let category = 'low'; if (total > 75) category = 'critical'; else if (total > 50) category = 'high'; else if (total > 30) category = 'medium';
      return { s1_distance: s1, s2_road: s2, s3_route: s3, s4_transport: s4, s5_duration: s5, s6_weather: s6, s7_incident: s7, total, category, equivalentHours: Math.round(total * 2.5) };
    }

    // ---- PDF JMP: load pdf.js (CDN), ekstraksi teks, parse, auto-isi ----
    async function loadPdfJs() {
      if (window.pdfjsLib) return window.pdfjsLib;
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload = res; s.onerror = () => rej(new Error('Gagal load pdf.js (cek koneksi)'));
        document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      return window.pdfjsLib;
    }
    async function extractPdfText(file) {
      const lib = await loadPdfJs();
      const buf = await file.arrayBuffer();
      const pdf = await lib.getDocument({ data: buf }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it => it.str).join(' ') + '\n';
      }
      return text;
    }
    function parseJmpText(text) {
      const num = (s) => s ? parseFloat(String(s).replace(',', '.')) : null;
      const ba = (text.match(/BA[-\s]?[A-Z0-9][A-Z0-9\-]+/i) || [])[0] || '';
      let origin = (text.match(/DARI\s+LOKASI\s*:?\s*([A-Z0-9\-]+)/i) || [])[1]
        || (ba.match(/BA-?([A-Z0-9]+)-/i) || [])[1] || '';
      let dest = (text.match(/KE\s+LOKASI\s*:?\s*([A-Z0-9\-]+)/i) || [])[1]
        || (ba.match(/-([A-Z0-9]+)\s*$/i) || [])[1] || '';
      let dist = null;
      const totalMatch = text.match(/total\s*(?:jarak)?\s*:?\s*([\d.,]+)\s*km/i);
      if (totalMatch) dist = num(totalMatch[1]);
      else {
        const kms = [...text.matchAll(/([\d]+[.,]?[\d]*)\s*km/gi)].map(m => num(m[1])).filter(n => n);
        if (kms.length) dist = Math.max(...kms);
      }
      const blindSpots = (text.match(/blind\s*spot/gi) || []).length;
      const railwayCrossings = (text.match(/re?ll?\s*ka|kereta\s*api/gi) || []).length;
      const bridges = (text.match(/jembatan/gi) || []).length;
      let roadDamage = 0;
      [...text.matchAll(/rusak[^.\n]{0,40}?([\d]+[.,]?[\d]*)\s*km/gi)].forEach(m => { const v = num(m[1]); if (v) roadDamage += v; });
      return { ba, origin, dest, dist, blindSpots, railwayCrossings, bridges, roadDamage: Math.round(roadDamage * 100) / 100 };
    }
    function tryDetectRig(text) {
      const t = text.toLowerCase().replace(/[\s.\-#]/g, '');
      const rigs = state.parentUnits.filter(u => u.type === 'Rig');
      for (const u of rigs) {
        const key = u.name.toLowerCase().replace(/[\s.\-#]/g, '').replace(/^bw/, '');
        if (key.length >= 4 && t.includes(key)) {
          const sel = document.getElementById('mob-unit');
          if (sel) { sel.value = u.id; loadRigEquipment(u.id); }
          return ` <span class="text-green-600">Rig terdeteksi: ${escapeHtml(u.name)}.</span>`;
        }
      }
      return ' <span class="text-amber-600">Rig tidak terdeteksi — pilih manual.</span>';
    }
    async function handleJmpUpload(input) {
      const file = input.files && input.files[0];
      const status = document.getElementById('mob-pdf-status');
      if (!file) return;
      window.__jmpFile = file; window.__jmpFileName = file.name;
      status.textContent = 'Membaca PDF…';
      try {
        const text = await extractPdfText(file);
        const d = parseJmpText(text);
        const setv = (id, v) => { const el = document.getElementById(id); if (el && v != null && v !== '') el.value = v; };
        setv('mob-jmp', d.ba); setv('mob-origin', d.origin); setv('mob-dest', d.dest);
        if (d.dist != null) setv('mob-distance', d.dist);
        if (d.roadDamage) setv('mob-roaddamage', d.roadDamage);
        setv('mob-blind', d.blindSpots); setv('mob-rail', d.railwayCrossings); setv('mob-bridge', d.bridges);
        const rigMsg = tryDetectRig(text);
        renderStressPreview();
        status.innerHTML = `✅ Terbaca: jarak ${d.dist ?? '?'}km · rusak ${d.roadDamage}km · blind ${d.blindSpots} · rel ${d.railwayCrossings} · jembatan ${d.bridges}.${rigMsg}<br><span class="text-amber-600">Periksa angkanya & lengkapi data aktual (durasi/cuaca/insiden) sebelum simpan.</span>`;
      } catch (e) {
        status.innerHTML = `<span class="text-red-600">Gagal baca PDF: ${escapeHtml(e.message)}. Isi manual saja.</span>`;
      }
    }
    async function openJmpPdf(path) {

    async function saveFmea(id) {
      const eqSel = document.getElementById('fmea-eq');

      const payload = {
        equipment_id: eqId,
        equipment_tag: opt?.dataset?.tag || window.__fmeaById?.[id]?.equipment_tag || null,
        equipment_name: opt?.dataset?.name || window.__fmeaById?.[id]?.equipment_name || null,
        fungsi: v('fmea-fungsi'), failure_mode: mode, effect: v('fmea-effect'), cause: v('fmea-cause'),
        severity: ni('fmea-s'), occurrence: ni('fmea-o'), detection: ni('fmea-d'),
        recommended_action: v('fmea-action'), pic: v('fmea-pic'),
        status: document.getElementById('fmea-status')?.value || 'open', notes: v('fmea-notes'),
      };
      try {

    async function renderReliabilityOverview(host) {
      let stress = [], fmea = [];
      try {
        const [s, f] = await Promise.all([
          state.supabase.from('v_stress_per_equipment').select('*'),
          state.supabase.from('fmea_entries').select('equipment_id, equipment_tag, equipment_name, rpn'),
        ]);
        if (s.error) throw s.error; if (f.error) throw f.error;
        stress = s.data || []; fmea = f.data || [];
      } catch (e) {
        host.innerHTML = `<div class="bg-red-50 text-red-700 p-4 rounded-xl text-sm">Gagal memuat: ${escapeHtml(e.message)}</div>`;

      const map = {};

      fmea.forEach(r => { const k = r.equipment_id; if (!map[k]) map[k] = { id: k, tag: r.equipment_tag, name: r.equipment_name, stress: 0, mob: 0, maxRpn: 0, fmeaCount: 0 }; map[k].maxRpn = Math.max(map[k].maxRpn, Number(r.rpn) || 0); map[k].fmeaCount++; });
      const list = Object.values(map).sort((a, b) => (b.maxRpn - a.maxRpn) || (b.stress - a.stress));
      const rows = list.slice(0, 100).map(r => `

          <td class="px-3 py-2 text-sm font-bold">${r.stress || '—'}</td>

        </tr>`).join('');
      host.innerHTML = `
        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <h3 class="text-lg font-bold text-slate-900 mb-1">🎯 Reliability Center</h3>

          <div class="text-xs bg-slate-50 border border-slate-200 rounded-lg p-3 leading-relaxed">
            <b>🚛 Stress Score</b> (berat mobilisasi) → menaikkan <b>Occurrence</b> di <b>⚠️ FMEA</b> → komponen <b>RPN</b> tinggi → spare-nya jadi prioritas di <b>📦 CSPP</b>.

        </div>
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="px-4 py-3 border-b border-slate-100 font-semibold text-slate-800 text-sm">Equipment Paling Berisiko (Stress + FMEA) <span class="text-slate-400 font-normal">— klik buka detail</span></div>
          <div class="overflow-x-auto max-h-[28rem] overflow-y-auto"><table class="w-full">
            <thead class="sticky top-0 bg-slate-50"><tr class="text-left text-xs text-slate-500"><th class="px-3 py-2">Equipment</th><th class="px-3 py-2">Σ Stress</th><th class="px-3 py-2">Mob</th><th class="px-3 py-2">FMEA Max RPN</th><th class="px-3 py-2"># FMEA</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="5" class="px-3 py-6 text-center text-slate-400 text-sm">Belum ada data stress/FMEA.</td></tr>'}</tbody>

    window.renderReliabilityTab = renderReliabilityTab;

    // ============================================================
    // 10v. AVAILABILITY — downtime tracking & uptime % (analisa Sr Mekanik+)
    // ============================================================
    const DT_CAT = {
      breakdown: 'Breakdown', tunggu_spare: 'Tunggu Spare', pm: 'PM', mobilisasi: 'Mobilisasi', lainnya: 'Lainnya',
    };
    let availPeriodDays = 365;
    let availData = [];

    function availPct(p) { p = Number(p) || 0; const cls = p >= 95 ? 'bg-green-100 text-green-700' : p >= 85 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'; return `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${cls}">${p.toFixed(1)}%</span>`; }
    function fmtH(h) { h = Number(h) || 0; if (h < 24) return h.toFixed(1) + ' jam'; return (h / 24).toFixed(1) + ' hari'; }
    function toLocalInput(iso) { if (!iso) return ''; const d = new Date(iso); return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16); }

    async function renderAvailabilityPage(host) {
      try {
        const { data, error } = await state.supabase.from('downtime_events').select('*').order('start_at', { ascending: false });
        if (error) throw error; availData = data || [];
      } catch (e) {
        host.innerHTML = `<div class="bg-red-50 text-red-700 p-4 rounded-xl text-sm">Gagal memuat: ${escapeHtml(e.message)}</div>`;
        return;
      }
      const now = Date.now(), start = now - availPeriodDays * 86400000, periodH = availPeriodDays * 24;
      const byEq = {};
      availData.forEach(d => {
        const k = d.equipment_id; if (!byEq[k]) byEq[k] = { id: k, tag: d.equipment_tag, name: d.equipment_name, events: 0, downH: 0, dur: [] };
        byEq[k].events++;
        const s = new Date(d.start_at).getTime(), e = d.end_at ? new Date(d.end_at).getTime() : now;
        byEq[k].downH += Math.max(0, Math.min(e, now) - Math.max(s, start)) / 3600000;
        if (d.end_at) byEq[k].dur.push((e - s) / 3600000);
      });
      const eqList = Object.values(byEq).map(o => ({ ...o, avail: Math.max(0, Math.min(100, (periodH - o.downH) / periodH * 100)), mttr: o.dur.length ? o.dur.reduce((a, b) => a + b, 0) / o.dur.length : null })).sort((a, b) => a.avail - b.avail);
      const ongoing = availData.filter(d => !d.end_at);
      const allDur = availData.filter(d => d.end_at).map(d => Number(d.duration_hours) || 0);
      const mttr = allDur.length ? allDur.reduce((a, b) => a + b, 0) / allDur.length : null;
      const totalDownH = eqList.reduce((a, b) => a + b.downH, 0);
      const totalFail = availData.length;
      const mtbf = totalFail ? (eqList.length * periodH - totalDownH) / totalFail : null;
      const fleetAvail = eqList.length ? eqList.reduce((a, b) => a + b.avail, 0) / eqList.length : 100;
      // breakdown kategori
      const cat = {}; availData.forEach(d => { const c = DT_CAT[d.category] || 'Lainnya'; if (!cat[c]) cat[c] = { n: 0, h: 0 }; cat[c].n++; cat[c].h += Number(d.duration_hours) || 0; });

      const kpi = (label, val) => `<div class="bg-white rounded-xl border border-slate-200 p-4"><div class="text-xs text-slate-500 mb-1">${label}</div><div class="text-2xl font-extrabold text-slate-900">${val}</div></div>`;
      const ongoingRows = ongoing.map(d => `<tr class="border-b border-slate-100">
        <td class="px-3 py-2 text-sm font-mono text-navy">${escapeHtml(d.equipment_tag || '—')}</td>
        <td class="px-3 py-2 text-sm">${escapeHtml(DT_CAT[d.category] || '-')}</td>
        <td class="px-3 py-2 text-sm">${escapeHtml(d.start_at ? new Date(d.start_at).toLocaleString('id-ID') : '—')}</td>
        <td class="px-3 py-2 text-sm text-red-600 font-semibold">${fmtH((now - new Date(d.start_at).getTime()) / 3600000)}</td>
        <td class="px-3 py-2 text-right whitespace-nowrap"><button onclick="markDowntimeDone('${d.id}')" class="px-2 py-1 rounded bg-green-100 hover:bg-green-200 text-green-700 text-xs font-semibold">✓ Selesai</button> <button onclick="openDowntimeEdit('${d.id}')" class="px-2 py-1 rounded bg-navy hover:bg-navy-700 text-white text-xs">✏</button></td>
      </tr>`).join('');
      const eqRows = eqList.map(o => `<tr class="border-b border-slate-100 hover:bg-slate-50 cursor-pointer" onclick="setEquipmentView('detail','${o.id}'); navigate('equipment')">
        <td class="px-3 py-2 text-sm font-mono text-navy">${escapeHtml(o.tag || '—')}</td>
        <td class="px-3 py-2 text-sm">${escapeHtml(o.name || '')}</td>
        <td class="px-3 py-2">${availPct(o.avail)}</td>
        <td class="px-3 py-2 text-sm">${o.events}x</td>
        <td class="px-3 py-2 text-sm">${fmtH(o.downH)}</td>
        <td class="px-3 py-2 text-sm">${o.mttr != null ? fmtH(o.mttr) : '—'}</td>
      </tr>`).join('');
      const catRows = Object.entries(cat).sort((a, b) => b[1].h - a[1].h).map(([c, v]) => `<div class="flex items-center justify-between text-sm py-1.5 border-b border-slate-100"><span>${escapeHtml(c)}</span><span class="text-slate-500">${v.n}x · ${fmtH(v.h)}</span></div>`).join('');

      host.innerHTML = `
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h3 class="text-xl font-bold text-slate-900">🟢 Availability — Kesiapan Equipment</h3>
            <p class="text-sm text-slate-500">% waktu equipment siap pakai (tidak down). Dihitung dari catatan downtime.</p>
          </div>
          <div class="flex items-center gap-2">
            <select onchange="setAvailPeriod(this.value)" class="px-2 py-2 border border-slate-300 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-navy">
              <option value="30" ${availPeriodDays==30?'selected':''}>30 hari</option>
              <option value="90" ${availPeriodDays==90?'selected':''}>90 hari</option>
              <option value="365" ${availPeriodDays==365?'selected':''}>1 tahun</option>
            </select>
            <button onclick="openDowntimeForm()" class="bg-safety hover:bg-safety/90 text-white px-4 py-2.5 rounded-lg text-sm font-semibold whitespace-nowrap">+ Catat Downtime</button>
          </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          ${kpi('Availability rata-rata', eqList.length ? fleetAvail.toFixed(1) + '%' : '—')}
          ${kpi('Sedang Down', ongoing.length)}
          ${kpi('MTTR (rata² perbaikan)', mttr != null ? fmtH(mttr) : '—')}
          ${kpi('MTBF (rata² antar rusak)', mtbf != null ? fmtH(mtbf) : '—')}
        </div>
        ${ongoing.length ? `<div class="bg-white rounded-xl border border-red-200 overflow-hidden">
          <div class="px-4 py-3 border-b border-slate-100 font-semibold text-red-700 text-sm">🔴 Sedang Down (${ongoing.length})</div>
          <div class="overflow-x-auto"><table class="w-full"><thead><tr class="bg-slate-50 text-left text-xs text-slate-500"><th class="px-3 py-2">Equipment</th><th class="px-3 py-2">Penyebab</th><th class="px-3 py-2">Mulai</th><th class="px-3 py-2">Lama</th><th class="px-3 py-2"></th></tr></thead><tbody>${ongoingRows}</tbody></table></div>
        </div>` : ''}
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-4 py-3 border-b border-slate-100 font-semibold text-slate-800 text-sm">Availability per Equipment (${availPeriodDays} hari) <span class="text-slate-400 font-normal">— klik buka detail</span></div>
            <div class="overflow-x-auto max-h-96 overflow-y-auto"><table class="w-full"><thead class="sticky top-0 bg-slate-50"><tr class="text-left text-xs text-slate-500"><th class="px-3 py-2">Tag</th><th class="px-3 py-2">Nama</th><th class="px-3 py-2">Availability</th><th class="px-3 py-2">Down</th><th class="px-3 py-2">Total</th><th class="px-3 py-2">MTTR</th></tr></thead><tbody>${eqRows || '<tr><td colspan="6" class="px-3 py-6 text-center text-slate-400 text-sm">Belum ada catatan downtime.</td></tr>'}</tbody></table></div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-4 py-3 border-b border-slate-100 font-semibold text-slate-800 text-sm">Penyebab Down</div>
            <div class="p-4">${catRows || '<div class="text-slate-400 text-sm text-center py-4">Belum ada data.</div>'}</div>
          </div>
        </div>`;
    }
    function setAvailPeriod(d) { availPeriodDays = Number(d) || 365; renderAvailabilityPage(document.getElementById('rel-content')); }
    window.setAvailPeriod = setAvailPeriod;
    window.renderAvailabilityPage = renderAvailabilityPage;

    async function openDowntimeForm(existing) {
      if (!isSrMekanikOrAbove()) { toast('Khusus Sr Mekanik ke atas.', 'warn'); return; }
      let eqs = [];
      try { const { data } = await state.supabase.from('equipment').select('id, tag_number, nama_equipment, assigned_unit_id').order('tag_number'); eqs = data || []; } catch (e) {}
      const e = existing || {};
      const opts = `<option value="">— pilih equipment —</option>` + eqs.map(x => `<option value="${x.id}" data-tag="${escapeHtml(x.tag_number)}" data-name="${escapeHtml(x.nama_equipment || '')}" data-unit="${x.assigned_unit_id || ''}" ${x.id === e.equipment_id ? 'selected' : ''}>${escapeHtml(x.tag_number)} — ${escapeHtml(x.nama_equipment || '')}</option>`).join('');
      const startVal = e.start_at ? toLocalInput(e.start_at) : toLocalInput(new Date().toISOString());
      const body = `
        <div class="space-y-3">
          <div><label class="text-xs font-semibold text-slate-500 uppercase">Equipment *</label>
            <select id="dt-eq" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-navy">${opts}</select></div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-slate-500">Mulai Down *</label><input id="dt-start" type="datetime-local" value="${startVal}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-navy"></div>
            <div><label class="text-xs text-slate-500">Selesai (kosongkan kalau masih down)</label><input id="dt-end" type="datetime-local" value="${e.end_at ? toLocalInput(e.end_at) : ''}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-navy"></div>
          </div>
          <div><label class="text-xs text-slate-500">Penyebab</label>
            <select id="dt-cat" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-navy">
              ${Object.entries(DT_CAT).map(([k, l]) => `<option value="${k}" ${e.category === k ? 'selected' : ''}>${l}</option>`).join('')}
            </select></div>
          <div><label class="text-xs text-slate-500">Catatan</label><input id="dt-notes" value="${escapeHtml(e.notes || '')}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-navy"></div>
        </div>`;
      const footer = `<button onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batal</button>
        <button onclick="saveDowntime('${existing?.id || ''}')" class="px-4 py-2 rounded-lg bg-navy hover:bg-navy-700 text-white text-sm font-semibold">💾 Simpan</button>`;
      openModal({ title: existing ? 'Edit Downtime' : 'Catat Downtime', body, footer, maxWidth: 'max-w-lg' });
    }
    window.openDowntimeForm = openDowntimeForm;
    function openDowntimeEdit(id) { const d = (availData || []).find(x => x.id === id); if (d) openDowntimeForm(d); }
    window.openDowntimeEdit = openDowntimeEdit;

    async function saveDowntime(id) {
      const eqSel = document.getElementById('dt-eq'); const eqId = eqSel?.value;
      if (!eqId) { toast('Pilih equipment dulu.', 'warn'); return; }
      const startV = document.getElementById('dt-start')?.value;
      if (!startV) { toast('Isi waktu mulai down.', 'warn'); return; }
      const endV = document.getElementById('dt-end')?.value;
      if (endV && new Date(endV) < new Date(startV)) { toast('Waktu selesai tidak boleh sebelum mulai.', 'warn'); return; }
      const opt = eqSel.selectedOptions[0];
      const unitId = opt?.dataset?.unit ? Number(opt.dataset.unit) : null;
      const payload = {
        equipment_id: eqId, equipment_tag: opt?.dataset?.tag || null, equipment_name: opt?.dataset?.name || null,
        unit_id: unitId, unit_name: unitId ? getParentUnitName(unitId) : null,
        start_at: new Date(startV).toISOString(), end_at: endV ? new Date(endV).toISOString() : null,
        category: document.getElementById('dt-cat')?.value || 'lainnya',
        notes: (document.getElementById('dt-notes')?.value || '').trim() || null,
      };
      try {
        if (id) { const { error } = await state.supabase.from('downtime_events').update(payload).eq('id', id); if (error) throw error; }
        else { payload.created_by = state.user.id; payload.created_by_name = state.profile?.full_name || state.profile?.email || ''; const { error } = await state.supabase.from('downtime_events').insert(payload); if (error) throw error; }
        toast('Downtime tersimpan.', 'success'); closeModal();
        renderAvailabilityPage(document.getElementById('rel-content'));
      } catch (e) { toast('Gagal simpan: ' + e.message, 'error'); }
    }
    window.saveDowntime = saveDowntime;

    async function markDowntimeDone(id) {
      const { error } = await state.supabase.from('downtime_events').update({ end_at: new Date().toISOString() }).eq('id', id);
      if (error) { toast('Gagal: ' + error.message, 'error'); return; }
      toast('Ditandai selesai.', 'success');
      renderAvailabilityPage(document.getElementById('rel-content'));
    }
    window.markDowntimeDone = markDowntimeDone;

    // ============================================================
    // 11. BOOT
    // ============================================================
    (async function boot() {
      if (!initSupabase()) {
        showLogin();
        return;
      }
      await testConnection();
      await checkSession();
      // Subscribe ke perubahan auth (misal token expired)
      state.supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT' || !session) {
          state.user = null;
          state.profile = null;
          showLogin();
        }
      });
    })();
  </script>
</body>
</html>
