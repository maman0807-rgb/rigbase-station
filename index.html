    async function commitInspectionImport() {
      const data = window.__importData;
      if (!data) return;
      const btn = document.getElementById('import-commit-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Mengimpor…'; }

      const validSiklus = data.siklusList.filter(s => s._status !== 'error');
      const validTemuan = data.temuanList.filter(t => t._status !== 'error');

      let imported = { siklus_inserted: 0, siklus_updated: 0, temuan_inserted: 0, temuan_deleted: 0, failed: 0 };
      const codeToId = {};  // inspection_code → inspection_id

      try {
        // 1. Upsert siklus
        for (const s of validSiklus) {
          const payload = {
            inspection_code: s.inspection_code,
            parent_unit_id: s.parent_unit_id,
            kategori_inspeksi: s.kategori_inspeksi,
            client: s.client || null,
            service: s.service || null,
            rig_type: s.rig_type || null,
            manufacturer: s.manufacturer || null,
            year_manufactured: s.year_manufactured || null,
            model_serial: s.model_serial || null,
            height_of_mast: s.height_of_mast || null,
            hook_load: s.hook_load || null,
            power_hp: s.power_hp || null,
            place_of_inspection: s.place_of_inspection || null,
            start_date: s.start_date,
            end_date: s.end_date || null,
            pi_company: s.pi_company,
            rig_inspector: s.rig_inspector,
            status: s.status || 'On Progress',
            progress_akumulatif: s.progress_akumulatif != null ? s.progress_akumulatif : 0,
            catatan: s.catatan || null,
          };
          // Check existing
          const { data: existing } = await state.supabase.from('inspections').select('id').eq('inspection_code', s.inspection_code).maybeSingle();
          if (existing) {
            payload.updated_by = state.user.id;
            await state.supabase.from('inspections').update(payload).eq('id', existing.id);
            codeToId[s.inspection_code] = existing.id;
            imported.siklus_updated++;
          } else {
            payload.created_by = state.user.id;
            payload.updated_by = state.user.id;
            const { data: ins, error } = await state.supabase.from('inspections').insert(payload).select().single();
            if (error) { imported.failed++; continue; }
            codeToId[s.inspection_code] = ins.id;
            imported.siklus_inserted++;
          }
        }

        // 1b. REPLACE MODE: hapus temuan lama untuk siklus yang di-import ulang
        //     (biar upload ulang = ganti data, bukan numpuk dobel)
        const replaceCodes = [...new Set(validTemuan.map(t => t.inspection_code))];
        const replaceIds = [];
        for (const code of replaceCodes) {
          let id = codeToId[code];
          if (!id) {
            const { data: ex } = await state.supabase.from('inspections').select('id').eq('inspection_code', code).maybeSingle();
            id = ex?.id;
          }
          if (id) replaceIds.push(id);
        }
        if (replaceIds.length > 0) {
          // Hitung temuan lama yang bakal ketimpa
          const { count: oldCount } = await state.supabase
            .from('inspection_findings')
            .select('id', { count: 'exact', head: true })
            .in('inspection_id', replaceIds);
          if (oldCount > 0) {
            const ok = await confirmDialog({
              title: 'Ganti Temuan Lama?',
              message: `Siklus yang di-import sudah punya ${oldCount} temuan di database. Lanjut import akan MENGHAPUS temuan lama itu lalu menggantinya dengan ${validTemuan.length} temuan dari Excel (foto yang sudah di-upload ke temuan lama akan ikut hilang link-nya). Mau lanjut?`,
              confirmText: 'Ya, ganti',
              cancelText: 'Batal',
              danger: true,
            });
            if (!ok) {
              if (btn) { btn.disabled = false; btn.textContent = '✅ Import Semua'; }
              toast('Import dibatalkan. Data lama tidak diubah.', 'info');
              return;
            }
            const { error: delErr, count: delCount } = await state.supabase
              .from('inspection_findings')
              .delete({ count: 'exact' })
              .in('inspection_id', replaceIds);
            if (delErr) { toast('Gagal hapus temuan lama: ' + delErr.message, 'error'); if (btn) { btn.disabled = false; btn.textContent = '✅ Import Semua'; } return; }
            if (!delCount) {
              // RLS: hapus temuan butuh hak Admin. Batalkan biar gak jadi dobel.
              toast('Gagal ganti temuan lama — butuh hak Admin untuk menghapus. Import dibatalkan.', 'error');
              if (btn) { btn.disabled = false; btn.textContent = '✅ Import Semua'; }
              return;
            }
            imported.temuan_deleted = delCount;
          }
        }

        // 2. Insert temuan
        for (const t of validTemuan) {
          // Resolve inspection_id from code
          let inspId = codeToId[t.inspection_code];
          if (!inspId) {
            const { data: ex } = await state.supabase.from('inspections').select('id').eq('inspection_code', t.inspection_code).maybeSingle();
            inspId = ex?.id;
          }
          if (!inspId) { imported.failed++; continue; }

          const payload = {
            inspection_id: inspId,
            no_urut: t.no_urut,
            equipment_id: t.equipment_id || null,
            equipment_name_snapshot: t.equipment_name_snapshot,
            qty: t.qty || null,
            bagian: t.bagian || null,
            category: t.category,
            finding: t.finding || null,
            mpi_result: t.mpi_result || null,
            acceptance_criteria: t.acceptance_criteria || null,
            recommendation: t.recommendation || null,
            tgl_ditemukan: t.tgl_ditemukan,
            status: t.status || 'Open',
            tgl_closed: t.tgl_closed || null,
            pic_perbaikan: t.pic_perbaikan || null,
            catatan: t.catatan || null,
            created_by: state.user.id,
            updated_by: state.user.id,
          };
          const { error } = await state.supabase.from('inspection_findings').insert(payload);
          if (error) { imported.failed++; console.warn('Failed insert temuan:', error.message); continue; }
          imported.temuan_inserted++;
        }

        // 🔔 Telegram alert
        sendTelegramAlert(
          `📊 <b>Bulk Import Inspeksi</b>\n` +
          `Siklus: ${imported.siklus_inserted} baru, ${imported.siklus_updated} update\n` +
          `Temuan: ${imported.temuan_inserted} baru` + (imported.temuan_deleted > 0 ? ` (${imported.temuan_deleted} lama diganti)` : '') + `\n` +
          (imported.failed > 0 ? `⚠ ${imported.failed} gagal\n` : '') +
          `👤 ${state.profile.full_name || state.profile.email}`
        );
        logActivity('bulk_imported', 'inspection', null, `${imported.siklus_inserted + imported.siklus_updated} siklus, ${imported.temuan_inserted} temuan`, imported);

        toast(`✅ Import selesai! ${imported.siklus_inserted + imported.siklus_updated} siklus, ${imported.temuan_inserted} temuan${imported.temuan_deleted > 0 ? ' (' + imported.temuan_deleted + ' lama diganti)' : ''}.${imported.failed > 0 ? ' ⚠ ' + imported.failed + ' gagal.' : ''}`, 'success');
        closeModal();
        // Pindah ke siklus pertama yang diimport (kalau ada)
        const firstCode = validSiklus[0]?.inspection_code;
        if (firstCode && codeToId[firstCode]) setInspectionView('detail', codeToId[firstCode], 'temuan');
        else setInspectionView('list');
      } catch (err) {
        toast('Gagal commit: ' + err.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Import Semua'; }
      }
    }
    window.commitInspectionImport = commitInspectionImport;

    function downloadErrorReport() {
      const data = window.__importData;
      if (!data) return;
      const errorRows = [...data.siklusList, ...data.temuanList].filter(r => r._status === 'error').map(r => ({
        'Excel Row': r._excelRow,
        'Type': r.no_urut != null ? 'Temuan' : 'Siklus',
        'ID Siklus': r.inspection_code || '',
        'Equipment / Rig': r.equipment_name_snapshot || r._rig_name || '',
        'Errors': r._errors.join('; '),
        'Warnings': r._warnings.join('; '),
      }));
      if (errorRows.length === 0) { toast('Gak ada error.', 'info'); return; }
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(errorRows);
      XLSX.utils.book_append_sheet(wb, ws, 'Errors');
      const ts = new Date().toISOString().slice(0, 16).replace(/[:\-T]/g, '');
      XLSX.writeFile(wb, `inspeksi_import_errors_${ts}.xlsx`);
      toast(`${errorRows.length} error rows ter-export.`, 'success');
    }
    window.downloadErrorReport = downloadErrorReport;

    async function deleteFindingPhoto(findingId, slot, photoUrl) {
      const ok = await confirmDialog({
        title: 'Hapus Foto?',
        message: 'Foto akan dihapus permanen dari storage. Lanjut?',
        confirmText: 'Hapus',
        danger: true,
      });
      if (!ok) return;
      const finding = (window.__currentFindings || []).find(f => f.id === findingId);
      if (!finding) return;
      const existing = Array.isArray(slot === 'before' ? finding.photos_before : finding.photos_after)
        ? (slot === 'before' ? finding.photos_before : finding.photos_after)
        : [];
      const newList = existing.filter(u => u !== photoUrl);
      try {
        const update = slot === 'before' ? { photos_before: newList } : { photos_after: newList };
        await updateFinding(findingId, update);
        await deleteFindingPhotoFromStorage(photoUrl);
        logActivity('photo_deleted', 'finding', findingId, finding.equipment_name_snapshot, { slot });
        toast('Foto dihapus.', 'success');
        if (window.__currentInspection) setInspectionView('detail', window.__currentInspection.id, 'temuan');
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    }
    window.deleteFindingPhoto = deleteFindingPhoto;

          <button onclick="setEquipmentView('detail', '${eq.id}')" class="flex-1 min-w-0 text-left">

              <div class="font-bold text-navy">${escapeHtml(eq.tag_number)}</div>
              ${statusBadge(eq.status_operasi)}
            </div>
            <div class="text-sm text-slate-800 font-medium truncate">${escapeHtml(eq.nama_equipment)}</div>
            <div class="text-xs text-slate-500 mt-1 truncate">
              ${escapeHtml(getCategoryName(eq.kategori_id))} • ${escapeHtml(getParentUnitName(eq.assigned_unit_id))}
            </div>
          </button>
        </div>
      `).join('');
      const rows = items.map(eq => `
        <tr class="${isChecked(eq.id) ? 'bg-safety/5' : 'hover:bg-slate-50'}">
          <td class="px-3 py-2 text-center w-10">
            <input type="checkbox" ${isChecked(eq.id) ? 'checked' : ''} onclick="toggleEquipmentSelect('${eq.id}', event)" class="w-4 h-4 rounded cursor-pointer accent-safety" />
          </td>
          <td class="px-3 py-2 text-sm font-semibold text-navy whitespace-nowrap cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">${escapeHtml(eq.tag_number)}</td>
          <td class="px-3 py-2 text-sm cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">${escapeHtml(eq.nama_equipment)}</td>
          <td class="px-3 py-2 text-sm text-slate-600 whitespace-nowrap cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">${escapeHtml(getCategoryName(eq.kategori_id))}</td>
          <td class="px-3 py-2 text-sm text-slate-600 whitespace-nowrap cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">${escapeHtml(getParentUnitName(eq.assigned_unit_id))}</td>
          <td class="px-3 py-2 text-sm cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">${statusBadge(eq.status_operasi)}</td>
          <td class="px-3 py-2 text-sm cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">${statusBadge(eq.tipe_kepemilikan)}</td>
          <td class="px-3 py-2 text-sm text-slate-600 whitespace-nowrap cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">${fmtDate(eq.next_maintenance_date)}</td>
        </tr>
      `).join('');
      // Action bar (muncul kalau ada selected)
      const selCount = items.filter(eq => isChecked(eq.id)).length;
      const actionBar = selCount > 0 ? `
        <div class="sticky top-0 z-10 bg-safety text-white px-4 py-3 rounded-t-xl flex items-center justify-between gap-3 flex-wrap shadow">
          <div class="flex items-center gap-2 text-sm font-semibold">
            <span>${selCount} dipilih</span>
            <button onclick="clearEquipmentSelection()" class="text-white/80 hover:text-white text-xs underline">Bersihkan</button>
          </div>
          <div class="flex gap-2 flex-wrap">
            <button onclick="bulkExportSelected()" class="px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded text-sm font-medium">📊 Export</button>
            ${isAdmin ? `
              <button onclick="bulkUpdateStatusModal()" class="px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded text-sm font-medium">🔧 Update Status</button>
              <button onclick="bulkDeleteSelected()" class="px-3 py-1.5 bg-red-700 hover:bg-red-800 rounded text-sm font-medium">🗑 Hapus</button>
            ` : ''}
          </div>
        </div>
      ` : '';
      return `
        ${actionBar}
        <div class="md:hidden space-y-2">${cards}</div>
        <div class="hidden md:block bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                  <th class="px-3 py-2 text-center w-10">
                    <input type="checkbox" ${allChecked && items.length > 0 ? 'checked' : ''} onclick="toggleSelectAll(event)" class="w-4 h-4 rounded cursor-pointer accent-safety" title="Pilih semua di halaman ini" />
                  </th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Tag</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Nama</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Kategori</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Parent Unit</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Status</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Tipe</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Next Maint.</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200">${rows}</tbody>
            </table>
          </div>
          <div class="px-4 py-2 text-xs text-slate-500 bg-slate-50 border-t">${items.length} equipment${selCount > 0 ? ` • ${selCount} dipilih` : ''}</div>
        </div>
      `;
    }

    // ============================================================
    // 9d.2. BULK SELECTION & ACTIONS
    // ============================================================
    function toggleEquipmentSelect(id, event) {
      if (event) event.stopPropagation();
      if (state.selectedEquipmentIds.has(id)) {
        state.selectedEquipmentIds.delete(id);
      } else {
        state.selectedEquipmentIds.add(id);
      }
      // Re-render only the list (preserve filters)
      const c = document.getElementById('eq-list-container');
      if (c) c.innerHTML = renderEquipmentTable(state.equipmentList);
    }
    window.toggleEquipmentSelect = toggleEquipmentSelect;

    function toggleSelectAll(event) {
      if (event) event.stopPropagation();
      const allChecked = state.equipmentList.every(eq => state.selectedEquipmentIds.has(eq.id));
      if (allChecked) {
        state.equipmentList.forEach(eq => state.selectedEquipmentIds.delete(eq.id));
      } else {
        state.equipmentList.forEach(eq => state.selectedEquipmentIds.add(eq.id));
      }
      const c = document.getElementById('eq-list-container');
      if (c) c.innerHTML = renderEquipmentTable(state.equipmentList);
    }
    window.toggleSelectAll = toggleSelectAll;

    function clearEquipmentSelection() {
      state.selectedEquipmentIds.clear();
      const c = document.getElementById('eq-list-container');
      if (c) c.innerHTML = renderEquipmentTable(state.equipmentList);
    }
    window.clearEquipmentSelection = clearEquipmentSelection;

    async function bulkExportSelected() {
      const ids = Array.from(state.selectedEquipmentIds);
      if (ids.length === 0) { toast('Pilih equipment dulu.', 'warn'); return; }
      try {
        toast(`Export ${ids.length} equipment…`, 'info');
        const { data, error } = await state.supabase.from('equipment').select('*').in('id', ids).order('tag_number');
        if (error) throw error;
        const rows = data.map(eq => ({
          'Tag Number': eq.tag_number,
          'Nama Equipment': eq.nama_equipment,
          'Kategori': getCategoryName(eq.kategori_id),
          'Parent Unit': getParentUnitName(eq.assigned_unit_id),
          'Tipe Kepemilikan': eq.tipe_kepemilikan,
          'Brand': eq.brand, 'Model': eq.model, 'Serial Number': eq.serial_number,
          'Status Operasi': eq.status_operasi, 'Kondisi Fisik': eq.kondisi_fisik,
          'Lokasi Fisik': eq.lokasi_fisik, 'Running Hours': eq.running_hours,
          'Last Maintenance': eq.last_maintenance_date, 'Next Maintenance': eq.next_maintenance_date,
          'SKPI End': eq.skpi_end_date, 'Remarks': eq.remarks,
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, 'Equipment Selected');
        const ts = new Date().toISOString().slice(0, 16).replace(/[:\-T]/g, '');
        XLSX.writeFile(wb, `rigbase_selected_${ts}.xlsx`);
        toast(`✅ ${rows.length} equipment ter-export.`, 'success');
      } catch (err) {
        toast('Gagal export: ' + err.message, 'error');
      }
    }
    window.bulkExportSelected = bulkExportSelected;

    async function bulkDeleteSelected() {
      const ids = Array.from(state.selectedEquipmentIds);
      if (ids.length === 0) return;
      const ok = await confirmDialog({
        title: `Hapus ${ids.length} Equipment?`,
        message: `Yakin mau hapus ${ids.length} equipment beserta semua maintenance log, mutasi, dokumen, dan loan terkait? Aksi ini TIDAK BISA di-undo.`,
        confirmText: `Ya, Hapus ${ids.length} Equipment`,
        danger: true,
      });
      if (!ok) return;
      try {
        const { error } = await state.supabase.from('equipment').delete().in('id', ids);
        if (error) throw error;
        logActivity('bulk_deleted', 'equipment', null, `${ids.length} equipment`, { count: ids.length, ids });
        toast(`✅ ${ids.length} equipment dihapus.`, 'success');
        sendTelegramAlert(
          `🗑 <b>Bulk Delete Equipment</b>\n` +
          `${ids.length} equipment dihapus oleh ${state.profile.full_name || state.profile.email}`
        );
        state.selectedEquipmentIds.clear();
        reloadEquipmentList();
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    }
    window.bulkDeleteSelected = bulkDeleteSelected;

    function bulkUpdateStatusModal() {
      const count = state.selectedEquipmentIds.size;
      if (count === 0) return;
      openModal({
        title: `Update Status ${count} Equipment`,
        maxWidth: 'max-w-md',
        body: `
          <form id="bulk-status-form" class="space-y-3">
            <p class="text-sm text-slate-600">${count} equipment akan di-update statusnya.</p>
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1">Status Operasi Baru *</label>
              <select name="status" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                <option value="">— pilih —</option>
                ${['Aktif','Standby','Repair','Down','Scrap'].map(s => `<option value="${s}">${s}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1">Catatan (opsional)</label>
              <textarea name="notes" rows="2" placeholder="contoh: Annual inspection — semua Aktif" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm"></textarea>
            </div>
          </form>
        `,
        footer: `
          <button onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batal</button>
          <button onclick="submitBulkStatus()" class="px-4 py-2 rounded-lg bg-navy hover:bg-navy-700 text-white text-sm font-semibold">Update ${count} Equipment</button>
        `,
      });
    }
    window.bulkUpdateStatusModal = bulkUpdateStatusModal;

    async function submitBulkStatus() {
      const form = document.getElementById('bulk-status-form');
      const status = form.elements.status.value;
      const notes = form.elements.notes.value;
      if (!status) { toast('Pilih status dulu.', 'warn'); return; }
      const ids = Array.from(state.selectedEquipmentIds);
      try {
        const { error } = await state.supabase.from('equipment').update({
          status_operasi: status, updated_by: state.user.id,
        }).in('id', ids);
        if (error) throw error;
        logActivity('bulk_status_updated', 'equipment', null, `${ids.length} equipment → ${status}`, { count: ids.length, new_status: status, notes });
        toast(`✅ ${ids.length} equipment di-update jadi ${status}.`, 'success');
        sendTelegramAlert(
          `🔧 <b>Bulk Update Status</b>\n` +
          `${ids.length} equipment → status <b>${status}</b>\n` +
          (notes ? `📝 ${notes}\n` : '') +
          `👤 ${state.profile.full_name || state.profile.email}`
        );
        closeModal();
        state.selectedEquipmentIds.clear();
        reloadEquipmentList();
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
      }
    }
    window.submitBulkStatus = submitBulkStatus;

    // ============================================================
    // 9e. EQUIPMENT DETAIL VIEW (5 tabs)
    // ============================================================
    function renderEquipmentDetail() {
      const div = document.createElement('div');
      div.className = 'page space-y-4';
      div.innerHTML = '<div class="text-slate-400 text-sm">Memuat detail…</div>';

      Promise.all([
        fetchEquipment(state.currentEquipmentId),
        fetchActiveLoanAsLender(state.currentEquipmentId).catch(() => null),
        fetchActiveLoanAsBorrower(state.currentEquipmentId).catch(() => null),
        fetchChildren(state.currentEquipmentId).catch(() => []),
      ]).then(async ([eq, loanAsLender, loanAsBorrower, children]) => {
        // Fetch parent equipment kalau ada
        let parentEq = null;
        if (eq.parent_equipment_id) {
          try {
            const { data } = await state.supabase.from('equipment')
              .select('id, tag_number, nama_equipment, kategori_id')
              .eq('id', eq.parent_equipment_id).maybeSingle();
            parentEq = data;
          } catch {}
        }
        const isAdmin = state.profile.role === 'admin';
        const isBroken = eq.status_operasi === 'Down' || eq.status_operasi === 'Repair';
        const hasActiveLoan = !!(loanAsLender || loanAsBorrower);
        const activeLoan = loanAsLender || loanAsBorrower;

        // Banner pinjaman
        let loanBanner = '';
        if (loanAsLender) {
          loanBanner = `
            <div class="bg-purple-50 border-2 border-purple-300 rounded-xl p-4 shadow-sm">
              <div class="flex items-start gap-3">
                <span class="text-2xl">📌</span>
                <div class="flex-1">
                  <div class="font-bold text-purple-900 text-sm">Equipment ini sedang DIPINJAMKAN</div>
                  <div class="text-sm text-purple-800 mt-1">
                    Pemilik asli: <span class="font-semibold">${escapeHtml(getParentUnitName(loanAsLender.lender_unit_id))}</span> →
                    Dipinjam ke: <span class="font-semibold">${escapeHtml(getParentUnitName(loanAsLender.borrower_unit_id))}</span>
                  </div>
                  <div class="text-xs text-purple-700 mt-1">
                    Sejak <span class="font-semibold">${fmtDate(loanAsLender.loan_date)}</span>
                    (${daysUntil(loanAsLender.loan_date) != null ? `${-daysUntil(loanAsLender.loan_date)} hari lalu` : '—'})
                    ${loanAsLender.reason ? '• Alasan: ' + escapeHtml(loanAsLender.reason) : ''}
                  </div>
                </div>
              </div>
            </div>`;
        } else if (loanAsBorrower) {
          loanBanner = `
            <div class="bg-amber-50 border-2 border-amber-300 rounded-xl p-4 shadow-sm">
              <div class="flex items-start gap-3">
                <span class="text-2xl">🔧</span>
                <div class="flex-1">
                  <div class="font-bold text-amber-900 text-sm">Equipment ini sementara DIGANTIKAN PINJAMAN</div>
                  <div class="text-sm text-amber-800 mt-1">
                    Dari unit <span class="font-semibold">${escapeHtml(getParentUnitName(loanAsBorrower.lender_unit_id))}</span> sejak
                    <span class="font-semibold">${fmtDate(loanAsBorrower.loan_date)}</span>
                  </div>
                  <div class="text-xs text-amber-700 mt-1">
                    ${loanAsBorrower.reason ? 'Alasan: ' + escapeHtml(loanAsBorrower.reason) : ''}
                  </div>
                </div>
              </div>
            </div>`;
        }

        // Determine which buttons to show
        const canPinjam = isAdmin && isBroken && !loanAsBorrower; // butuh pengganti tapi belum punya pinjaman aktif
        const canKembalikan = isAdmin && hasActiveLoan;
        const canMutasi = isAdmin && !hasActiveLoan; // gak boleh mutasi kalau lagi dipinjam/meminjamkan
        const canGanti = isAdmin && !hasActiveLoan;
        const canEdit = isAdmin;
        const canHapus = isAdmin && !hasActiveLoan;

        // Breadcrumb hierarki: Parent Unit → Parent Equipment → Equipment ini
        const breadcrumb = `
          <div class="flex items-center gap-1.5 flex-wrap text-xs text-slate-500 mb-1">
            <span>🏭 ${escapeHtml(getParentUnitName(eq.assigned_unit_id))}</span>
            ${parentEq ? `<span>›</span><button onclick="setEquipmentView('detail','${parentEq.id}')" class="text-navy hover:underline">📦 ${escapeHtml(parentEq.tag_number)}</button>` : ''}
            <span>›</span>
            <span class="font-semibold text-slate-700">${escapeHtml(eq.tag_number)}</span>
          </div>`;

        div.innerHTML = `
          ${loanBanner}
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <button onclick="setEquipmentView('list')" class="text-sm text-navy hover:underline mb-2 inline-flex items-center gap-1">← Kembali ke daftar</button>
            ${breadcrumb}
            <div class="flex items-start justify-between gap-3 flex-wrap">
              <div class="flex-1 min-w-0">
                <h2 class="text-2xl font-bold text-slate-900">${escapeHtml(eq.tag_number)}</h2>
                <p class="text-base text-slate-700 mt-1">${escapeHtml(eq.nama_equipment)}</p>
                <div class="flex flex-wrap items-center gap-2 mt-3">
                  ${statusBadge(eq.status_operasi)}
                  ${statusBadge(eq.kondisi_fisik)}
                  ${statusBadge(eq.tipe_kepemilikan)}
                  <span class="text-xs text-slate-500">${escapeHtml(getCategoryName(eq.kategori_id))}</span>
                  <span class="text-xs text-slate-400">•</span>
                  <span class="text-xs text-slate-500">${escapeHtml(getParentUnitName(eq.assigned_unit_id))}</span>
                  ${children.length > 0 ? `<span class="text-xs text-slate-400">•</span><span class="text-xs font-semibold text-navy">🧩 ${children.length} komponen</span>` : ''}
                </div>
              </div>
              <div class="flex gap-2 flex-wrap">
                <button onclick="printEquipmentDetail()" class="px-3 py-2 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium no-print">🖨 Print / PDF</button>
                ${isAdmin ? `
                  ${canPinjam ? `<button onclick="openLoanModal('${eq.id}')" class="px-3 py-2 rounded-lg bg-amber-100 hover:bg-amber-200 text-amber-800 text-sm font-medium">🤝 Pinjam Pengganti</button>` : ''}
                  ${canKembalikan ? `<button onclick="openReturnLoanModal('${activeLoan.id}')" class="px-3 py-2 rounded-lg bg-green-100 hover:bg-green-200 text-green-800 text-sm font-medium">↩️ Kembalikan Pinjaman</button>` : ''}
                  ${canGanti ? `<button onclick="openReplaceModal('${eq.id}')" class="px-3 py-2 rounded-lg bg-purple-100 hover:bg-purple-200 text-purple-800 text-sm font-medium">🔄 Ganti</button>` : ''}
                  ${canMutasi ? `<button onclick="openMutasiModal('${eq.id}')" class="px-3 py-2 rounded-lg bg-blue-100 hover:bg-blue-200 text-blue-800 text-sm font-medium">↔ Mutasi</button>` : ''}
                  ${canEdit ? `<button onclick="setEquipmentView('form', '${eq.id}')" class="px-3 py-2 rounded-lg bg-navy hover:bg-navy-700 text-white text-sm font-medium">✏ Edit</button>` : ''}
                  ${canHapus ? `<button onclick="confirmDeleteEquipment('${eq.id}', '${escapeHtml(eq.tag_number).replace(/'/g,'&#39;')}')" class="px-3 py-2 rounded-lg bg-red-100 hover:bg-red-200 text-red-700 text-sm font-medium">🗑 Hapus</button>` : ''}
                ` : ''}
              </div>
            </div>
            ${hasActiveLoan && isAdmin ? '<div class="mt-3 text-xs text-slate-500 italic">ℹ️ Mutasi/Ganti/Hapus di-disable selama equipment ini ada pinjaman aktif. Kembalikan dulu pinjaman.</div>' : ''}
          </div>

          ${children.length > 0 ? `
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <h3 class="text-base font-bold text-slate-800 mb-3 flex items-center gap-2">
              🧩 Komponen (${children.length})
              <span class="text-xs font-normal text-slate-500">— equipment yang merupakan bagian dari ${escapeHtml(eq.tag_number)}</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${children.map(c => `
                <button onclick="setEquipmentView('detail','${c.id}')" class="text-left bg-slate-50 hover:bg-navy hover:text-white rounded-lg p-3 transition group border border-slate-200">
                  <div class="flex items-center justify-between gap-2 mb-1">
                    <span class="font-bold text-navy group-hover:text-white text-sm">${escapeHtml(c.tag_number)}</span>
                    ${statusBadge(c.status_operasi)}
                  </div>
                  <div class="text-xs text-slate-700 group-hover:text-blue-100 truncate">${escapeHtml(c.nama_equipment)}</div>
                  <div class="text-xs text-slate-500 group-hover:text-blue-200 mt-0.5">${escapeHtml(getCategoryName(c.kategori_id))}</div>
                </button>
              `).join('')}
            </div>
          </div>` : ''}

          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="flex border-b border-slate-200 overflow-x-auto">
              ${[
                ['info','📋 Info'],
                ['maintenance','🛠️ Maintenance'],
                ['sertifikasi','📜 Sertifikasi'],
                ['dokumen','📎 Dokumen'],
                ['inspeksi','🔍 Riwayat Inspeksi'],
                ['history','🔄 History'],
                ['stress','🚛 Riwayat Stress'],
                ['fmea','⚠️ FMEA'],
              ].map(([id, lbl]) => `
                <button onclick="state.equipmentDetailTab='${id}'; renderDetailTab(window.__currentEq)"
                  class="px-4 py-3 text-sm font-medium whitespace-nowrap ${state.equipmentDetailTab===id ? 'border-b-2 border-safety text-safety bg-safety/5' : 'text-slate-600 hover:text-navy'}">
                  ${lbl}
                </button>
              `).join('')}
            </div>
            <div id="detail-tab-content" class="p-5"></div>
          </div>
        `;
        window.__currentEq = eq;
        window.__currentLoan = activeLoan;
        renderDetailTab(eq);
      }).catch(err => {
        div.innerHTML = `<div class="bg-red-50 border border-red-200 p-4 rounded-lg text-red-700 text-sm">Gagal load: ${escapeHtml(err.message)}</div>`;
      });

      return div;
    }

    function renderDetailTab(eq) {
      const c = document.getElementById('detail-tab-content');
      if (!c) return;
      // Re-render tabs bar to update active state
      const parent = c.parentElement.querySelector('.flex.border-b');
      if (parent) {
        parent.querySelectorAll('button').forEach((btn, i) => {
          const ids = ['info','maintenance','sertifikasi','dokumen','inspeksi','history','stress','fmea'];
          btn.className = `px-4 py-3 text-sm font-medium whitespace-nowrap ${state.equipmentDetailTab===ids[i] ? 'border-b-2 border-safety text-safety bg-safety/5' : 'text-slate-600 hover:text-navy'}`;
        });
      }
      switch (state.equipmentDetailTab) {
        case 'info':        c.innerHTML = renderInfoTab(eq); break;
        case 'sertifikasi': c.innerHTML = renderSertifikasiTab(eq); break;
        case 'maintenance': c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderMaintenanceTab(eq, c); break;
        case 'dokumen':     c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderDokumenTab(eq, c); break;
        case 'inspeksi':    c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderInspeksiHistoryTab(eq, c); break;
        case 'history':     c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderHistoryTab(eq, c); break;
        case 'stress':      c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderStressHistoryTab(eq, c); break;
        case 'fmea':        c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderFmeaForEquipmentTab(eq, c); break;
      }
    }
    window.renderDetailTab = renderDetailTab;

    function infoRow(label, value) {

    // ============================================================
    // 9e.1. PHOTO LIGHTBOX
    // Modal full-screen untuk lihat foto dengan navigasi prev/next
    // ============================================================
    function openPhotoLightbox(index) {
      const photos = window.__currentPhotos || [];
      if (photos.length === 0) return;
      window.__lightboxIndex = index;
      renderLightbox();
      // Keyboard navigation
      document.addEventListener('keydown', lightboxKeyHandler);
    }
    window.openPhotoLightbox = openPhotoLightbox;

    function renderLightbox() {
      const photos = window.__currentPhotos || [];
      const idx = window.__lightboxIndex;
      if (idx < 0 || idx >= photos.length) return;
      const photo = photos[idx];

      // Hapus lightbox lama
      const old = document.getElementById('photo-lightbox');
      if (old) old.remove();

      const overlay = document.createElement('div');
      overlay.id = 'photo-lightbox';
      overlay.className = 'fixed inset-0 bg-black/90 z-[60] flex items-center justify-center';
      overlay.innerHTML = `
        <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white hover:text-safety p-2 rounded-full bg-black/40 hover:bg-black/60 z-10" title="Tutup (Esc)">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        ${photos.length > 1 ? `
          <button onclick="navigateLightbox(-1)" class="absolute left-2 md:left-6 text-white hover:text-safety p-3 rounded-full bg-black/40 hover:bg-black/60 z-10" title="Sebelumnya (←)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button onclick="navigateLightbox(1)" class="absolute right-2 md:right-6 text-white hover:text-safety p-3 rounded-full bg-black/40 hover:bg-black/60 z-10" title="Berikutnya (→)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
        ` : ''}
        <div class="max-w-7xl max-h-[90vh] flex flex-col items-center p-4">
          <img src="${escapeHtml(photo.file_url)}" alt="${escapeHtml(photo.file_name)}" class="max-w-full max-h-[80vh] object-contain rounded-lg shadow-2xl" />
          <div class="mt-3 text-center text-white">
            <div class="text-sm font-medium">${escapeHtml(photo.file_name)}</div>
            <div class="text-xs text-white/60 mt-0.5">${fmtDate(photo.created_at)} • ${idx + 1} / ${photos.length}</div>
          </div>
        </div>
      `;
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeLightbox(); });
      document.body.appendChild(overlay);
    }

    function navigateLightbox(direction) {
      const photos = window.__currentPhotos || [];
      let idx = (window.__lightboxIndex || 0) + direction;
      if (idx < 0) idx = photos.length - 1;
      if (idx >= photos.length) idx = 0;
      window.__lightboxIndex = idx;
      renderLightbox();
    }
    window.navigateLightbox = navigateLightbox;

    function closeLightbox() {
      const el = document.getElementById('photo-lightbox');
      if (el) el.remove();
      document.removeEventListener('keydown', lightboxKeyHandler);
    }
    window.closeLightbox = closeLightbox;

    function lightboxKeyHandler(e) {
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') navigateLightbox(-1);
      else if (e.key === 'ArrowRight') navigateLightbox(1);
    }

    // ============================================================
    // 9e.2. RIWAYAT INSPEKSI TAB di Equipment Detail
    // Tampilkan semua findings yang nyebut equipment ini, lintas siklus
    // + auto-detect recurring (findings di bagian sama yang muncul ≥2x)
    // ============================================================
    async function renderInspeksiHistoryTab(eq, container) {
      try {
        const findings = await fetchFindingsByEquipment(eq.id);
        if (findings.length === 0) {
          container.innerHTML = '<div class="text-center py-6 text-slate-400 text-sm bg-slate-50 rounded-lg">Equipment ini belum pernah diinspeksi.</div>';
          return;
        }

        // Stats
        const counts = {
          total: findings.length,
          critical: findings.filter(f => f.category === 'Critical').length,
          major:    findings.filter(f => f.category === 'Major').length,
          minor:    findings.filter(f => f.category === 'Minor').length,
          na:       findings.filter(f => f.category === 'N/A').length,
          open:     findings.filter(f => f.status === 'Open').length,
          siklus:   new Set(findings.map(f => f.inspection_id)).size,
        };

        // Rekap per Tahun (pakai tahun dari tgl_ditemukan)
        const yearMap = {};  // { 2026: { findings: [], siklusSet: Set } }
        findings.forEach(f => {
          const year = f.tgl_ditemukan ? f.tgl_ditemukan.slice(0, 4) : '—';
          if (!yearMap[year]) yearMap[year] = { findings: [], siklusSet: new Set() };
          yearMap[year].findings.push(f);
          if (f.inspection_id) yearMap[year].siklusSet.add(f.inspection_id);
        });
        const yearStats = Object.entries(yearMap)
          .map(([year, { findings: yf, siklusSet }]) => {
            const closed = yf.filter(x => x.status === 'Closed').length;
            const open   = yf.length - closed;
            const closingRate = yf.length > 0 ? Math.round((closed / yf.length) * 100) : 0;
            return {
              year,
              total: yf.length,
              siklus: siklusSet.size,
              critical: yf.filter(x => x.category === 'Critical').length,
              major:    yf.filter(x => x.category === 'Major').length,
              minor:    yf.filter(x => x.category === 'Minor').length,
              na:       yf.filter(x => x.category === 'N/A').length,
              closed, open, closingRate,
            };
          })
          .sort((a, b) => b.year.localeCompare(a.year));  // terbaru di atas

        // Deteksi recurring per bagian (kalau bagian sama muncul ≥2x dengan category non-N/A)
        const recurringMap = {};  // { 'Crown Block': [finding1, finding2, ...] }
        findings.forEach(f => {
          if (f.category === 'N/A' || !f.bagian) return;
          const key = f.bagian;
          if (!recurringMap[key]) recurringMap[key] = [];
          recurringMap[key].push(f);
        });
        const recurring = Object.entries(recurringMap).filter(([_, arr]) => arr.length >= 2);

        // Index finding → occurrence number (untuk badge "Ke-N")
        const findingOccurrence = {};
        Object.entries(recurringMap).forEach(([bagian, arr]) => {
          arr.sort((a, b) => (a.tgl_ditemukan || '').localeCompare(b.tgl_ditemukan || ''));
          arr.forEach((f, idx) => { findingOccurrence[f.id] = idx + 1; });
        });

        const recurringAlert = recurring.length > 0 ? `
          <div class="bg-red-50 border-2 border-red-300 rounded-lg p-4 mb-4">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-2xl">🔁</span>
              <h4 class="font-bold text-red-900">Temuan Berulang Terdeteksi</h4>
            </div>
            <div class="text-sm text-red-800 mb-2">Equipment ini punya finding berulang di bagian/area yang sama. Pertimbangkan <b>replacement permanen</b> atau <b>overhaul</b>:</div>
            <ul class="text-sm text-red-800 space-y-1">
              ${recurring.map(([bagian, arr]) => `
                <li>• <b>${escapeHtml(bagian)}</b>: ${arr.length}× temuan (${arr.map(a => fmtDate(a.tgl_ditemukan)).join(', ')})</li>
              `).join('')}
            </ul>
          </div>
        ` : '';

        container.innerHTML = `
          <div class="space-y-4">
            <!-- Stats card -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-center text-xs">
              <div class="bg-slate-100 rounded p-2"><div class="font-bold text-lg text-slate-900">${counts.total}</div><div class="text-slate-600">Total Temuan</div></div>
              <div class="bg-blue-50 rounded p-2"><div class="font-bold text-lg text-blue-700">${counts.siklus}</div><div class="text-blue-700">Siklus</div></div>
              <div class="bg-red-50 rounded p-2"><div class="font-bold text-lg text-red-700">${counts.critical + counts.major + counts.minor}</div><div class="text-red-700">Major+ Findings</div></div>
              <div class="bg-orange-50 rounded p-2"><div class="font-bold text-lg text-orange-700">${counts.open}</div><div class="text-orange-700">Masih Open</div></div>
            </div>

            <!-- Rekap per Tahun -->
            <div>
              <h4 class="font-bold text-slate-800 mb-2 flex items-center gap-2">
                <span>📅</span> Rekap per Tahun
              </h4>
              <div class="space-y-2">
                ${yearStats.map(ys => {
                  const barColor = ys.closingRate >= 80 ? 'bg-green-500'
                                  : ys.closingRate >= 50 ? 'bg-amber-500'
                                  : 'bg-red-500';
                  return `
                    <div class="bg-white border border-slate-200 rounded-lg p-3">
                      <div class="flex items-center justify-between flex-wrap gap-2 mb-2">
                        <div class="flex items-center gap-2">
                          <span class="text-lg font-bold text-navy">${escapeHtml(ys.year)}</span>
                          <span class="text-xs text-slate-500">• ${ys.siklus} siklus • ${ys.total} temuan</span>
                        </div>
                        <div class="flex items-center gap-2 text-xs">
                          <span class="text-green-700 font-semibold">✓ ${ys.closed} Closed</span>
                          <span class="text-slate-400">|</span>
                          <span class="text-orange-700 font-semibold">⏳ ${ys.open} Open</span>
                          <span class="px-2 py-0.5 rounded font-bold ${ys.closingRate >= 80 ? 'bg-green-100 text-green-800' : ys.closingRate >= 50 ? 'bg-amber-100 text-amber-800' : 'bg-red-100 text-red-800'}">${ys.closingRate}%</span>
                        </div>
                      </div>
                      <div class="w-full bg-slate-100 rounded-full h-1.5 mb-2 overflow-hidden">
                        <div class="${barColor} h-1.5 transition-all" style="width:${ys.closingRate}%"></div>
                      </div>
                      <div class="flex flex-wrap gap-1.5 text-xs">
                        ${ys.critical > 0 ? `<span class="px-2 py-0.5 bg-red-50 border border-red-200 text-red-700 rounded font-semibold">🚨 ${ys.critical} Critical</span>` : ''}
                        ${ys.major > 0    ? `<span class="px-2 py-0.5 bg-amber-50 border border-amber-200 text-amber-700 rounded font-semibold">⚠ ${ys.major} Major</span>` : ''}
                        ${ys.minor > 0    ? `<span class="px-2 py-0.5 bg-yellow-50 border border-yellow-200 text-yellow-700 rounded font-semibold">⚡ ${ys.minor} Minor</span>` : ''}
                        ${ys.na > 0       ? `<span class="px-2 py-0.5 bg-slate-50 border border-slate-200 text-slate-600 rounded font-semibold">N/A ${ys.na}</span>` : ''}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>

            ${recurringAlert}

            <!-- Daftar Siklus Inspeksi (compact, link only) -->
            <div>
              <h4 class="font-bold text-slate-800 mb-2">📋 Daftar Siklus Inspeksi (terbaru di atas)</h4>
              <div class="space-y-1.5">
                ${(() => {
                  // Group findings per inspection_id
                  const siklusMap = {};
                  findings.forEach(f => {
                    const id = f.inspection_id;
                    if (!siklusMap[id]) {
                      siklusMap[id] = {
                        id,
                        code: f.inspection?.inspection_code || '—',
                        kategori: f.inspection?.kategori_inspeksi || '—',
                        start_date: f.inspection?.start_date || f.tgl_ditemukan,
                        pi_company: f.inspection?.pi_company || '—',
                        total: 0, closed: 0, open: 0,
                      };
                    }
                    siklusMap[id].total++;
                    if (f.status === 'Closed') siklusMap[id].closed++;
                    else siklusMap[id].open++;
                  });
                  const siklusList = Object.values(siklusMap)
                    .sort((a, b) => (b.start_date || '').localeCompare(a.start_date || ''));

                  return siklusList.map(s => {
                    const katBadge = s.kategori === 'Cat 4'
                      ? '<span class="px-1.5 py-0.5 bg-purple-100 text-purple-800 text-xs font-bold rounded">Cat 4</span>'
                      : '<span class="px-1.5 py-0.5 bg-indigo-100 text-indigo-800 text-xs font-bold rounded">Cat 3</span>';
                    return `
                      <button onclick="setInspectionView('detail','${s.id}','temuan'); navigate('inspections')"
                        class="w-full text-left bg-white border border-slate-200 hover:border-safety hover:bg-safety/5 rounded-lg p-3 flex items-center justify-between gap-3 transition">
                        <div class="flex items-center gap-2 flex-wrap min-w-0">
                          ${katBadge}
                          <span class="font-semibold text-navy text-sm">${escapeHtml(s.code)}</span>
                          <span class="text-xs text-slate-500">• ${fmtDate(s.start_date)}</span>
                          <span class="text-xs text-slate-400 hidden md:inline">• ${escapeHtml(s.pi_company)}</span>
                        </div>
                        <div class="flex items-center gap-2 text-xs flex-shrink-0">
                          <span class="font-bold text-slate-700">${s.total} temuan</span>
                          ${s.open > 0 ? `<span class="text-orange-700">(${s.open} open)</span>` : `<span class="text-green-700">(all closed)</span>`}
                          <span class="text-slate-400">→</span>
                        </div>
                      </button>
                    `;
                  }).join('');
                })()}
              </div>
              <p class="text-xs text-slate-500 mt-2">💡 Klik salah satu siklus untuk lihat detail temuan + foto.</p>
            </div>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `<div class="bg-red-50 text-red-700 p-3 rounded">Gagal load: ${escapeHtml(err.message)}</div>`;
      }
    }

    async function renderHistoryTab(eq, container) {
      try {
        const [muts, loans] = await Promise.all([
          fetchMutationLog(eq.id),
          fetchLoanHistory(eq.id).catch(() => []),
        ]);

        // Gabung events ke timeline yg sama, sort by date desc
        const events = [];
        muts.forEach(m => events.push({
          kind: 'mutasi',
          date: m.mutation_date,
          title: `${getParentUnitName(m.from_unit_id)} → ${getParentUnitName(m.to_unit_id)}`,
          detail: m.reason,
          color: 'bg-safety',
        }));
        loans.forEach(l => {
          const isLender = l.lender_equipment_id === eq.id;
          // Event "pinjam"
          events.push({
            kind: 'pinjam',
            date: l.loan_date,
            title: isLender
              ? `🤝 DIPINJAMKAN: ${getParentUnitName(l.lender_unit_id)} → ${getParentUnitName(l.borrower_unit_id)}`
              : `🤝 MENERIMA PINJAMAN: dari ${getParentUnitName(l.lender_unit_id)}`,
            detail: l.reason,
            color: 'bg-amber-500',
            status: l.status,
          });
          // Event "kembali" (kalau sudah dikembalikan)
          if (l.status === 'returned' && l.return_date) {
            events.push({
              kind: 'kembali',
              date: l.return_date,
              title: isLender
                ? `↩️ DIKEMBALIKAN: ke ${getParentUnitName(l.lender_unit_id)}`
                : `↩️ MENGEMBALIKAN: pinjaman ke ${getParentUnitName(l.lender_unit_id)}`,
              detail: l.return_notes,
              color: 'bg-green-500',
            });
          }
        });
        events.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        container.innerHTML = `
          <h4 class="font-bold text-slate-800 mb-3">Riwayat Mutasi & Pinjaman (${events.length})</h4>
          ${events.length === 0 ? '<div class="text-center py-6 text-slate-400 text-sm bg-slate-50 rounded-lg">Belum ada riwayat.</div>' :
            `<div class="relative pl-6 space-y-3">
              ${events.map((ev, idx) => `
                <div class="relative">
                  <div class="absolute -left-6 top-1 w-3 h-3 rounded-full ${ev.color} ring-4 ring-white"></div>
                  ${idx < events.length - 1 ? '<div class="absolute -left-[18px] top-4 bottom-[-12px] w-0.5 bg-slate-200"></div>' : ''}
                  <div class="bg-white border border-slate-200 rounded-lg p-4">
                    <div class="flex items-center gap-2 text-sm mb-1 flex-wrap">
                      <span class="font-semibold text-navy">${fmtDate(ev.date)}</span>
                      <span class="text-slate-500">•</span>
                      <span class="text-slate-700">${escapeHtml(ev.title)}</span>
                      ${ev.kind === 'pinjam' && ev.status === 'active' ? '<span class="px-2 py-0.5 bg-amber-100 text-amber-800 text-xs font-semibold rounded">aktif</span>' : ''}
                    </div>
                    ${ev.detail ? `<div class="text-xs text-slate-600">${escapeHtml(ev.detail)}</div>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>`
          }
        `;
      } catch (err) {
        container.innerHTML = `<div class="bg-red-50 text-red-700 p-3 rounded">Gagal load: ${escapeHtml(err.message)}</div>`;
      }
    }

    function renderEquipmentForm() {
      const isEdit = !!state.currentEquipmentId;

      const div = document.createElement('div');
      div.className = 'page space-y-4';
      div.innerHTML = `<div class="text-slate-400 text-sm">${isEdit ? 'Memuat data…' : 'Menyiapkan form…'}</div>`;

      const setup = (existing) => {
        const data = existing || { tipe_kepemilikan: 'Permanent', status_operasi: 'Aktif', kondisi_fisik: 'Good' };
        const sections = EQUIPMENT_FIELDS.map(sec => `
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <h4 class="px-5 py-3 font-bold text-navy border-b border-slate-200 bg-slate-50">${sec.section}</h4>
            <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
              ${sec.fields.map(f => renderFormField(f, data[f.name])).join('')}
            </div>
          </div>
        `).join('');

        div.innerHTML = `
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <button onclick="${isEdit ? `setEquipmentView('detail', '${state.currentEquipmentId}')` : `setEquipmentView('list')`}" class="text-sm text-navy hover:underline mb-2 inline-flex items-center gap-1">← Kembali</button>
            <h2 class="text-xl font-bold text-slate-900">${isEdit ? '✏ Edit Equipment' : '+ Tambah Equipment Baru'}</h2>
            ${isEdit ? `<p class="text-sm text-slate-500 mt-1">${escapeHtml(data.tag_number || '')}</p>` : ''}
          </div>
          <form id="eq-form" class="space-y-4">
            ${sections}
            <div class="flex flex-col md:flex-row gap-3 sticky bottom-0 md:bottom-0 bg-white border border-slate-200 rounded-xl p-4 shadow-lg">
              <button type="button" onclick="${isEdit ? `setEquipmentView('detail', '${state.currentEquipmentId}')` : `setEquipmentView('list')`}" class="md:flex-none px-5 py-2.5 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batal</button>
              <button type="submit" class="flex-1 bg-navy hover:bg-navy-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold">
                ${isEdit ? '💾 Simpan Perubahan' : '+ Simpan Equipment'}
              </button>
            </div>
            <div id="form-error" class="hide bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3"></div>
          </form>
        `;
        setTimeout(() => {
          $('#eq-form').addEventListener('submit', (e) => { e.preventDefault(); submitEquipmentForm(isEdit); });
          // Populate parent equipment dropdown awal & kategori dropdown
          populateParentEquipmentDropdown(data.assigned_unit_id, data.parent_equipment_id, state.currentEquipmentId);
          populateCategoryDropdown(data.assigned_unit_id, data.kategori_id);
          // Listen ke perubahan parent_unit — refresh dua dropdown
          const unitSelect = $('#eq-form select[name="assigned_unit_id"]');
          if (unitSelect) {
            unitSelect.addEventListener('change', () => {
              const newUnitId = Number(unitSelect.value) || null;
              populateParentEquipmentDropdown(newUnitId, null, state.currentEquipmentId);
              populateCategoryDropdown(newUnitId, null); // reset kategori karena unit berubah
            });
          }
        }, 0);
      };

      if (isEdit) {
        fetchEquipment(state.currentEquipmentId).then(setup).catch(err => {
          div.innerHTML = `<div class="bg-red-50 text-red-700 p-4 rounded">Gagal load: ${escapeHtml(err.message)}</div>`;
        });
      } else {
        setup(null);
      }
      return div;
    }

    function renderFormField(f, value) {
      const v = value == null ? '' : value;
      const required = f.required ? 'required' : '';
      const baseCls = 'w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-navy text-sm';
      let input;
      if (f.type === 'textarea') {
        input = `<textarea name="${f.name}" rows="3" ${required} class="${baseCls}">${escapeHtml(v)}</textarea>`;
      } else if (f.type === 'select') {
        input = `<select name="${f.name}" ${required} class="${baseCls} bg-white">
          ${f.required ? '' : '<option value="">—</option>'}
          ${f.options.map(o => `<option value="${o}" ${v == o ? 'selected' : ''}>${o}</option>`).join('')}
        </select>`;
      } else if (f.type === 'select-parent-unit') {
        input = `<select name="${f.name}" ${required} class="${baseCls} bg-white">
          <option value="">— pilih —</option>
          ${state.parentUnits.map(u => `<option value="${u.id}" ${v == u.id ? 'selected' : ''}>${escapeHtml(u.name)} (${u.type})</option>`).join('')}
        </select>`;
      } else if (f.type === 'select-category') {
        // Render placeholder dulu; akan di-populate berdasarkan parent_unit type
        // (populateCategoryDropdown dipanggil setelah form di-render)
        const selectedTag = v ? `data-current-value="${v}"` : '';
        input = `<select name="${f.name}" ${required} ${selectedTag} class="${baseCls} bg-white">
          <option value="">— pilih Parent Unit dulu —</option>
        </select>
        <p class="text-xs text-slate-500 mt-1">Filter otomatis berdasarkan tipe Parent Unit (Rig/Standalone).</p>`;
      } else if (f.type === 'select-parent-equipment') {
        // Dropdown ini diisi async setelah form di-render (pas kategori/unit dipilih).
        // Render placeholder dulu, isi lewat populateParentEquipmentDropdown().
        const selectedTag = v ? `data-current-value="${v}"` : '';
        input = `<select name="${f.name}" ${selectedTag} class="${baseCls} bg-white">
          <option value="">— tidak ada parent (top-level) —</option>
        </select>
        ${f.placeholder ? `<p class="text-xs text-slate-500 mt-1">${escapeHtml(f.placeholder)}</p>` : ''}`;
      } else {
        const extras = [
          f.min != null ? `min="${f.min}"` : '',
          f.max != null ? `max="${f.max}"` : '',
          f.step ? `step="${f.step}"` : '',
          f.placeholder ? `placeholder="${escapeHtml(f.placeholder)}"` : '',
        ].join(' ');
        input = `<input type="${f.type}" name="${f.name}" value="${escapeHtml(v)}" ${extras} ${required} class="${baseCls}" />`;
      }
      const isFull = f.type === 'textarea';
      return `<div class="${isFull ? 'md:col-span-2' : ''}">
        <label class="block text-xs font-semibold text-slate-700 mb-1">${escapeHtml(f.label)}</label>
        ${input}
      </div>`;
    }

    async function submitEquipmentForm(isEdit) {
      const form = $('#eq-form');
      const errBox = $('#form-error');
      hide(errBox);
      const payload = {};
      EQUIPMENT_FIELDS.forEach(sec => sec.fields.forEach(f => {
        const el = form.elements[f.name];
        if (!el) return;
        let v = el.value;
        if (v === '') v = null;
        else if (f.type === 'number' || f.type === 'select-parent-unit' || f.type === 'select-category') {
          v = v == null ? null : Number(v);
          if (Number.isNaN(v)) v = null;
        }
        // select-parent-equipment stays as UUID string (no conversion)
        payload[f.name] = v;
      }));

      const submitBtn = form.querySelector('button[type=submit]');
      submitBtn.disabled = true;
      const originalLabel = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Menyimpan…';

      try {
        let saved;
        const prevEq = isEdit ? window.__currentEq : null;
        if (isEdit) {
          saved = await updateEquipment(state.currentEquipmentId, payload);
          toast('Equipment berhasil di-update.', 'success');
        } else {
          saved = await createEquipment(payload);
          toast('Equipment baru berhasil dibuat.', 'success');
        }
        // 📋 Activity log
        if (isEdit && prevEq) {
          // Hitung field yang berubah
          const changes = {};
          Object.keys(payload).forEach(k => {
            if (prevEq[k] !== saved[k]) changes[k] = { from: prevEq[k], to: saved[k] };
          });
          logActivity('updated', 'equipment', saved.id, saved.tag_number, { changes });
        } else if (!isEdit) {
          logActivity('created', 'equipment', saved.id, saved.tag_number, {
            kategori: getCategoryName(saved.kategori_id),
            unit: getParentUnitName(saved.assigned_unit_id),
            status: saved.status_operasi,
          });
        }
        // 🔔 Telegram alert untuk perubahan critical
        if (isEdit && prevEq) {
          const statusChanged = prevEq.status_operasi !== saved.status_operasi;
          const isCritical = ['Down', 'Scrap'].includes(saved.status_operasi);
          if (statusChanged && isCritical) {
            sendTelegramAlert(
              `🛑 <b>Status Equipment Berubah</b>\n` +
              `<b>${saved.tag_number}</b> — ${saved.nama_equipment}\n` +
              `📍 ${getParentUnitName(saved.assigned_unit_id)}\n` +
              `Status: ${prevEq.status_operasi} → <b>${saved.status_operasi}</b>\n` +
              `👤 ${state.profile.full_name || state.profile.email}`
            );
          }
        } else if (!isEdit) {
          // Equipment baru
          sendTelegramAlert(
            `➕ <b>Equipment Baru Ditambahkan</b>\n` +
            `<b>${saved.tag_number}</b> — ${saved.nama_equipment}\n` +
            `Kategori: ${getCategoryName(saved.kategori_id)}\n` +
            `📍 ${getParentUnitName(saved.assigned_unit_id)}\n` +
            `Status: ${saved.status_operasi} / ${saved.tipe_kepemilikan}\n` +
            `👤 ${state.profile.full_name || state.profile.email}`
          );
        }
        setEquipmentView('detail', saved.id);
      } catch (err) {
        errBox.textContent = `Gagal: ${err.message}`;
        show(errBox);
        toast('Gagal menyimpan: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalLabel;
      }
    }
