        footer: `
          <button id="return-cancel-btn" onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batal</button>
          <button id="return-submit-btn" onclick="submitReturnLoan('${loanId}')" class="px-4 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">↩️ Kembalikan</button>
        `,
      });
    }
    window.openReturnLoanModal = openReturnLoanModal;

    async function submitReturnLoan(loanId) {
      const form = document.getElementById('return-form');
      const submitBtn = document.getElementById('return-submit-btn');
      const cancelBtn = document.getElementById('return-cancel-btn');
      const return_date = form.elements.return_date.value;
      const borrower_new_status = form.elements.borrower_status ? form.elements.borrower_status.value : null;
      const return_notes = form.elements.return_notes.value || null;

      if (!return_date) { toast('Tanggal pengembalian wajib diisi.', 'warn'); return; }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Memproses…'; }
      if (cancelBtn) cancelBtn.disabled = true;

      try {
        await returnLoan({ loan_id: loanId, return_date, borrower_new_status, return_notes });
        toast('Pinjaman berhasil dikembalikan.', 'success');
        closeModal();
        // Refresh halaman detail
        if (state.currentEquipmentId) setEquipmentView('detail', state.currentEquipmentId, 'history');
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '↩️ Kembalikan'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitReturnLoan = submitReturnLoan;

    function openMaintenanceModal(equipmentId) {
      openModal({
        title: 'Tambah Maintenance Log',
        maxWidth: 'max-w-md',
        body: `
          <form id="maint-form" class="space-y-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Maintenance *</label>
              <input type="date" name="maintenance_date" required value="${new Date().toISOString().slice(0,10)}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Tipe Maintenance</label>
              <input type="text" name="maintenance_type" placeholder="misal: Service rutin, Repair, Overhaul" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">PIC Mechanic</label>
              <input type="text" name="pic_mechanic" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Catatan</label>
              <textarea name="notes" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm"></textarea>
            </div>
          </form>
        `,
        footer: `
          <button onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm">Batal</button>
          <button onclick="submitMaintenance('${equipmentId}')" class="px-4 py-2 rounded-lg bg-safety hover:bg-safety-700 text-white text-sm font-semibold">Simpan</button>
        `,
      });
    }
    window.openMaintenanceModal = openMaintenanceModal;

    async function submitMaintenance(equipment_id) {
      const f = document.getElementById('maint-form');
      const payload = {
        equipment_id,
        maintenance_date: f.elements.maintenance_date.value,
        maintenance_type: f.elements.maintenance_type.value || null,
        pic_mechanic: f.elements.pic_mechanic.value || null,
        notes: f.elements.notes.value || null,
      };
      if (!payload.maintenance_date) { toast('Tanggal wajib diisi.', 'warn'); return; }
      try {
        await createMaintenanceLog(payload);
        toast('Maintenance log ditambahkan.', 'success');
        closeModal();
        if (window.__currentEq?.id === equipment_id) {
          renderDetailTab(window.__currentEq);
        }
      } catch (err) {
        toast('Gagal simpan: ' + err.message, 'error');
      }
    }
    window.submitMaintenance = submitMaintenance;

    // Kompresi foto sebelum upload — max 1920px, JPEG quality 0.85
    // Target: file < 500KB, kualitas masih jelas buat dokumentasi equipment.
    async function compressImage(file, { maxDim = 1920, quality = 0.85 } = {}) {
      if (!file.type.startsWith('image/')) return file;
      // Skip kompresi untuk GIF / SVG / HEIC — canvas gak bisa handle
      if (/^image\/(gif|svg\+xml|heic|heif)/.test(file.type)) return file;
      let bitmap;
      try { bitmap = await createImageBitmap(file); } catch { return file; }
      let { width, height } = bitmap;
      const ratio = Math.min(maxDim / width, maxDim / height, 1);
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0, width, height);
      bitmap.close?.();
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
      if (!blob || blob.size >= file.size) return file; // kalau hasil kompresi lebih besar, pakai original
      const newName = file.name.replace(/\.[^.]+$/, '') + '.jpg';
      return new File([blob], newName, { type: 'image/jpeg' });
    }

    function fmtBytes(n) {
      if (n < 1024) return n + ' B';
      if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1048576).toFixed(2) + ' MB';
    }

    async function handleDocUpload(event, equipmentId) {
      const rawFiles = Array.from(event.target.files || []);
      if (!rawFiles.length) return;
      const status = document.getElementById('doc-upload-status');
      const isImage = (f) => f.type.startsWith('image/');
      let okCount = 0;
      for (const raw of rawFiles) {
        // Kompresi kalau foto
        status.innerHTML = `<div class="bg-blue-50 text-blue-700 p-2 rounded text-sm mb-2">${isImage(raw) ? '🖼️ Mengompres' : '📎 Memuat'} ${escapeHtml(raw.name)}…</div>`;
        const file = isImage(raw) ? await compressImage(raw) : raw;
        const savedNote = isImage(raw) && file.size < raw.size
          ? ` (${fmtBytes(raw.size)} → ${fmtBytes(file.size)})`
          : '';
        const bucket = isImage(file) ? 'equipment-photos' : 'equipment-documents';
        const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
        const path = `${equipmentId}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
        try {
          status.innerHTML = `<div class="bg-blue-50 text-blue-700 p-2 rounded text-sm mb-2">Mengupload ${escapeHtml(file.name)}${savedNote}…</div>`;
          await uploadFile(bucket, path, file);
          const file_url = isImage(file) ? getPublicUrl(bucket, path) : `${bucket}/${path}`;
          await createDocumentRecord({
            equipment_id: equipmentId,
            file_name: raw.name, // pakai nama asli, bukan .jpg hasil kompresi
            file_url,
            file_type: file.type || null,
          });
          okCount++;
          if (savedNote) toast(`Foto ${raw.name} dikompres${savedNote}`, 'info');
        } catch (err) {
          toast(`Gagal upload ${raw.name}: ${err.message}`, 'error');
        }
      }
      status.innerHTML = '';
      event.target.value = '';
      if (okCount > 0) {
        toast(`${okCount} file ter-upload.`, 'success');
        if (window.__currentEq?.id === equipmentId) {
          const c = document.getElementById('detail-tab-content');
          if (c) renderDokumenTab(window.__currentEq, c);
        }
      }
    }
    window.handleDocUpload = handleDocUpload;

    async function openDoc(fileUrl, fileName) {
      try {
        let url = fileUrl;
        if (!url.startsWith('http')) {
          // private bucket — fileUrl format: "bucket/path"
          const [bucket, ...rest] = url.split('/');
          url = await getSignedUrl(bucket, rest.join('/'), 3600);
        }
        window.open(url, '_blank');
      } catch (err) {
        toast('Gagal buka dokumen: ' + err.message, 'error');
      }
    }
    window.openDoc = openDoc;

    async function confirmDeleteDoc(docId, fileUrl, fileName) {
      const ok = await confirmDialog({ title: 'Hapus Dokumen?', message: `Hapus "${fileName}"?`, confirmText: 'Hapus', danger: true });
      if (!ok) return;
      try {
        // delete file from storage (best effort)
        try {
          if (fileUrl.startsWith('http')) {
            const idx = fileUrl.indexOf('/equipment-photos/');
            if (idx > -1) await deleteStorageFile('equipment-photos', fileUrl.slice(idx + '/equipment-photos/'.length));
          } else {
            const [bucket, ...rest] = fileUrl.split('/');
            await deleteStorageFile(bucket, rest.join('/'));
          }
        } catch (storageErr) {
          console.warn('Storage delete failed (continuing):', storageErr.message);
        }
        await deleteDocumentRecord(docId);
        toast('Dokumen dihapus.', 'success');
        if (window.__currentEq) {
          const c = document.getElementById('detail-tab-content');
          if (c) renderDokumenTab(window.__currentEq, c);
        }
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    }
    window.confirmDeleteDoc = confirmDeleteDoc;

    // ============================================================
    // 9h. SETTINGS ACTIONS
    // ============================================================
    async function saveSettings() {
      const name = $('#settings-name').value.trim();
      const tg = $('#settings-tg').value.trim();
      try {
        const { data, error } = await state.supabase.from('profiles')
          .update({ full_name: name || null, telegram_user_id: tg || null })
          .eq('id', state.user.id).select().single();
        if (error) throw error;
        state.profile = data;
        renderUserInfo();
        toast('Profil tersimpan.', 'success');
      } catch (err) {
        toast('Gagal simpan: ' + err.message, 'error');
      }
    }
    window.saveSettings = saveSettings;

    async function changePassword() {
      const pwd = $('#settings-newpass').value;
      if (!pwd || pwd.length < 6) { toast('Password minimal 6 karakter.', 'warn'); return; }
      try {
        const { error } = await state.supabase.auth.updateUser({ password: pwd });
        if (error) throw error;
        $('#settings-newpass').value = '';
        toast('Password berhasil diganti.', 'success');
      } catch (err) {
        toast('Gagal ganti password: ' + err.message, 'error');
      }
    }
    window.changePassword = changePassword;

    // ============================================================
    // 10. EVENT LISTENERS
    // ============================================================
    $('#login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      login($('#login-email').value.trim(), $('#login-password').value);
    });

    $('#alert-bell').addEventListener('click', () => navigate('alerts'));

    // ============================================================
    // 11. BOOT
    // ============================================================
    (async function boot() {
      if (!initSupabase()) {
        showLogin();
        return;
      }
      await testConnection();
      await checkSession();
      // Subscribe ke perubahan auth (misal token expired)
      state.supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT' || !session) {
          state.user = null;
          state.profile = null;
          showLogin();
        }
      });
    })();
  </script>
