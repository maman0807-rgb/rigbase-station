    body { font-family: 'Inter', system-ui, sans-serif; }
    .hide { display: none !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    /* Aktif state untuk nav */
    .nav-active { background-color: #1E3A8A; color: white; }
    .bottom-nav-active { color: #F97316; }

    /* ===== PRINT STYLES (untuk Save as PDF) ===== */
    @media print {
      /* Sembunyikan navigasi & elemen interaktif */
      aside, header, #bottom-nav, .no-print, #toast-container, #modal-overlay { display: none !important; }
      /* Reset background & padding biar irit kertas */
      body, main { background: white !important; padding: 0 !important; margin: 0 !important; }
      .page { animation: none !important; }
      /* Card jangan ada shadow + border tipis */
      .shadow-sm, .shadow-md { box-shadow: none !important; }
      /* Komponen card jangan break di tengah */
      .grid > * { break-inside: avoid; }
      /* Pastikan teks gelap */
      * { color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      /* Tombol di header detail sembunyikan */
      button { display: none !important; }
      /* Tetap tampilkan info penting */
      h2, h3, h4, td, th, span, div, p, li, label { display: revert !important; color: black !important; }
      /* Tab content tetap kelihatan */
      #detail-tab-content { display: block !important; }
    }

    // ============================================================
    // 4. UTILITAS UI & FORMATTERS

    function $(sel) { return document.querySelector(sel); }
    function show(el) { (typeof el === 'string' ? $(el) : el).classList.remove('hide'); }
    function hide(el) { (typeof el === 'string' ? $(el) : el).classList.add('hide'); }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function fmtDate(d) {
      if (!d) return '—';
      try { return new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); }
      catch { return d; }
    }
    function fmtCurrency(n) {
      if (n == null || n === '') return '—';
      return 'Rp ' + Number(n).toLocaleString('id-ID');
    }
    function fmtNumber(n, suffix = '') {
      if (n == null || n === '') return '—';
      return Number(n).toLocaleString('id-ID') + suffix;
    }
    function daysUntil(date) {
      if (!date) return null;
      return Math.floor((new Date(date).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
    }

      Fair:    'bg-amber-100 text-amber-800',
      Poor:    'bg-red-100 text-red-800',
      Permanent:     'bg-indigo-100 text-indigo-800',
      'Mobile-Backup': 'bg-purple-100 text-purple-800',
    };
    function statusBadge(s) {
      if (!s) return '<span class="text-slate-400">—</span>';
      const cls = STATUS_BADGES[s] || 'bg-slate-100 text-slate-700';
      return `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${cls}">${escapeHtml(s)}</span>`;
    }

    function debounce(fn, ms = 300) {
      let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    }

    function toast(message, type = 'info') {
      const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-navy', warn: 'bg-safety' };
      const el = document.createElement('div');
      el.className = `${colors[type] || colors.info} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm pointer-events-auto`;
      el.textContent = message;
      $('#toast-container').appendChild(el);
      setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; }, 2700);
      setTimeout(() => el.remove(), 3000);
    }

    // ============================================================
    // 4b. MODAL SYSTEM
    // ============================================================
    function openModal({ title, body, footer, maxWidth = 'max-w-lg', dismissable = true }) {
      closeModal();
      const overlay = document.createElement('div');
      overlay.id = 'modal-overlay';
      overlay.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 overflow-y-auto';
      overlay.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl w-full ${maxWidth} my-8 max-h-[90vh] flex flex-col">
          <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
            <h3 class="text-lg font-bold text-slate-900">${escapeHtml(title || '')}</h3>
            <button onclick="closeModal()" class="p-1 hover:bg-slate-100 rounded text-slate-500" aria-label="Tutup">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div id="modal-body" class="p-5 overflow-y-auto flex-1"></div>
          ${footer ? `<div class="px-5 py-3 border-t border-slate-200 flex justify-end gap-2 flex-shrink-0 flex-wrap">${footer}</div>` : ''}
        </div>
      `;
      const bodyHost = overlay.querySelector('#modal-body');
      if (body instanceof HTMLElement) bodyHost.appendChild(body);
      else bodyHost.innerHTML = body || '';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay && dismissable) closeModal(); });
    }
    function closeModal() {
      const m = document.getElementById('modal-overlay');
      if (m) m.remove();
    }
    window.closeModal = closeModal;

    function confirmDialog({ title = 'Konfirmasi', message, confirmText = 'Ya', cancelText = 'Batal', danger = false }) {
      return new Promise((resolve) => {
        const id = '__cd_' + Date.now();
        openModal({
          title,
          body: `<p class="text-base text-slate-700">${escapeHtml(message)}</p>`,
          footer: `
            <button onclick="closeModal(); window['${id}'](false);" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">${escapeHtml(cancelText)}</button>
            <button onclick="closeModal(); window['${id}'](true);" class="px-4 py-2 rounded-lg ${danger ? 'bg-red-600 hover:bg-red-700' : 'bg-navy hover:bg-navy-700'} text-white text-sm font-semibold">${escapeHtml(confirmText)}</button>
          `,
        });
        window[id] = (v) => { delete window[id]; resolve(v); };
      });
    }

    async function createLoan({ lender_equipment_id, borrower_equipment_id, loan_date, reason }) {
      // Fetch fresh data
      const { data: lender, error: el } = await state.supabase.from('equipment')
        .select('id, tag_number, assigned_unit_id, status_operasi').eq('id', lender_equipment_id).single();
      if (el) throw el;
      const { data: borrower, error: eb } = await state.supabase.from('equipment')
        .select('id, tag_number, assigned_unit_id, status_operasi').eq('id', borrower_equipment_id).single();
      if (eb) throw eb;

      const lender_unit_id   = lender.assigned_unit_id;
      const borrower_unit_id = borrower.assigned_unit_id;
      if (!lender_unit_id)   throw new Error('Equipment yang dipinjam belum punya unit.');
      if (!borrower_unit_id) throw new Error('Equipment yang rusak belum punya unit.');
      if (lender_unit_id === borrower_unit_id) throw new Error('Lender dan borrower di unit yang sama — gak masuk akal "dipinjam".');

      // 1. Insert loan_log
      const { data: loan, error: e1 } = await state.supabase.from('loan_log').insert({
        lender_equipment_id, borrower_equipment_id,
        lender_unit_id, borrower_unit_id,
        loan_date, reason,
        status: 'active',
        created_by: state.user.id,
      }).select().single();
      if (e1) throw e1;

      // 2. Pindah lender equipment ke borrower unit
      const { error: e2 } = await state.supabase.from('equipment').update({
        assigned_unit_id: borrower_unit_id,
        updated_by: state.user.id,
      }).eq('id', lender_equipment_id);
      if (e2) throw e2;

      // 3. Set borrower equipment status ke Repair (kalau belum Down/Repair)
      if (borrower.status_operasi !== 'Down' && borrower.status_operasi !== 'Repair') {
        const { error: e3 } = await state.supabase.from('equipment').update({
          status_operasi: 'Repair',
          updated_by: state.user.id,
        }).eq('id', borrower_equipment_id);
        if (e3) throw e3;
      }

      return loan;
    }

    async function returnLoan({ loan_id, return_date, borrower_new_status, return_notes }) {
      // Fetch loan fresh
      const { data: loan, error: e0 } = await state.supabase.from('loan_log').select('*').eq('id', loan_id).single();
      if (e0) throw e0;
      if (loan.status !== 'active') throw new Error('Pinjaman ini sudah dikembalikan sebelumnya.');

      // 1. Update loan_log → returned
      const { error: e1 } = await state.supabase.from('loan_log').update({
        status: 'returned', return_date, return_notes,
        returned_by: state.user.id,
      }).eq('id', loan_id);
      if (e1) throw e1;

      // 2. Pindah lender equipment balik ke unit asal
      const { error: e2 } = await state.supabase.from('equipment').update({
        assigned_unit_id: loan.lender_unit_id,
        updated_by: state.user.id,
      }).eq('id', loan.lender_equipment_id);
      if (e2) throw e2;

      // 3. Update borrower equipment status sesuai pilihan user
      if (loan.borrower_equipment_id && borrower_new_status) {
        const { error: e3 } = await state.supabase.from('equipment').update({
          status_operasi: borrower_new_status,
          updated_by: state.user.id,
        }).eq('id', loan.borrower_equipment_id);
        if (e3) throw e3;
      }
    }

    // Populate kategori dropdown berdasarkan tipe parent_unit (Rig / Standalone).
    // - currentValue: kalau editing, preserve nilai yang sudah ada walaupun gak match filter.
    function populateCategoryDropdown(parentUnitId, currentValue) {
      const sel = document.querySelector('#eq-form select[name="kategori_id"]');
      if (!sel) return;
      const unit = state.parentUnits.find(u => u.id === Number(parentUnitId));
      if (!unit) {
        sel.innerHTML = '<option value="">— pilih Parent Unit dulu —</option>';
        return;
      }
      // Filter: kategori dengan parent_unit_type matching unit.type, atau 'Both'
      const matching = state.categories.filter(c =>
        c.parent_unit_type === unit.type || c.parent_unit_type === 'Both'
      );
      // Kalau ada currentValue yang TIDAK match filter, tetap include sebagai legacy
      let extra = [];
      if (currentValue && !matching.find(c => c.id == currentValue)) {
        const legacy = state.categories.find(c => c.id == currentValue);
        if (legacy) extra.push(legacy);
      }
      const all = [...matching, ...extra];
      sel.innerHTML = '<option value="">— pilih kategori —</option>' +
        all.map(c => {
          const isLegacy = extra.includes(c);
          const note = isLegacy ? ` ⚠ legacy (${c.parent_unit_type})` : '';
          return `<option value="${c.id}" ${currentValue == c.id ? 'selected' : ''}>${escapeHtml(c.name)}${note}</option>`;
        }).join('');
      // Tampilkan note kalau ada legacy
      const noteEl = sel.parentElement.querySelector('.text-xs.text-slate-500');
      if (noteEl) {
        noteEl.textContent = `${matching.length} kategori cocok untuk unit type "${unit.type}"${extra.length ? ' (+ 1 legacy)' : ''}.`;
      }
    }
    window.populateCategoryDropdown = populateCategoryDropdown;

        .select('id, email, full_name, role, telegram_user_id')
        .eq('id', user.id)

    async function login(email, password) {
      const btn = $('#login-btn');
      const label = $('#login-btn-label');
      const spinner = $('#login-btn-spinner');
      const errorBox = $('#login-error');

      hide(errorBox);
      btn.disabled = true;
      label.textContent = 'Memproses…';
      show(spinner);

      try {
        const { data, error } = await state.supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await loadProfile(data.user);
        await loadReferenceData().catch(err => console.warn('Ref data load failed:', err.message));
        showApp();
        toast(`Selamat datang, ${state.profile.full_name || state.profile.email}`, 'success');
      } catch (err) {
        errorBox.textContent = err.message === 'Invalid login credentials'
          ? 'Email atau password salah.'
          : `Gagal login: ${err.message}`;
        show(errorBox);
      } finally {
        btn.disabled = false;
        label.textContent = 'Masuk';
        hide(spinner);
      }
    }

    async function logout() {
      await state.supabase.auth.signOut();
      state.user = null;
      state.profile = null;

        confirmText: 'Ya, Keluar',

    // ============================================================
    function showLogin() {
      hide('#app');
      show('#login-screen');
    }

    function showApp() {
      hide('#login-screen');
      show('#app');
      renderUserInfo();
      renderSidebar();
      renderBottomNav();
      navigate(state.currentPage || 'dashboard');
    }

    function renderUserInfo() {
      const p = state.profile;
      const name = p.full_name || p.email;
      const initial = (name || '?').trim().charAt(0).toUpperCase();
      $('#header-avatar').textContent = initial;
      $('#header-user-name').textContent = name;
      $('#header-user-role').textContent = p.role;
      $('#sidebar-user-name').textContent = name;
      $('#sidebar-user-role').textContent = p.role;
    }

    function visibleNavItems() {
      return NAV_ITEMS.filter(item => !item.adminOnly || state.profile?.role === 'admin');
    }

    function renderSidebar() {
      const nav = $('#sidebar-nav');
      nav.innerHTML = '';
      visibleNavItems().forEach(item => {
        const btn = document.createElement('button');
        btn.className = `w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-navy-700 transition text-left ${state.currentPage === item.id ? 'nav-active' : ''}`;
        btn.innerHTML = `<span class="text-lg">${item.icon}</span><span>${item.label}</span>`;
        btn.onclick = () => navigate(item.id);
        nav.appendChild(btn);
      });
    }

    function renderBottomNav() {
      const nav = $('#bottom-nav');
      nav.innerHTML = '';
      visibleNavItems().filter(i => i.bottomNav).forEach(item => {
        const btn = document.createElement('button');
        btn.className = `flex-1 flex flex-col items-center justify-center py-2 text-xs ${state.currentPage === item.id ? 'bottom-nav-active' : 'text-slate-500'}`;
        btn.innerHTML = `<span class="text-xl leading-none">${item.icon}</span><span class="mt-0.5">${item.label}</span>`;
        btn.onclick = () => navigate(item.id);
        nav.appendChild(btn);
      });
    }

    // ============================================================
    // 9. ROUTER & PAGE RENDERERS (stub — diisi di Fase 3+)
    // ============================================================
    function navigate(pageId) {
      const item = NAV_ITEMS.find(i => i.id === pageId);
      if (!item) return;
      if (item.adminOnly && state.profile?.role !== 'admin') {
        toast('Halaman ini hanya untuk admin.', 'warn');
        return;
      }
      state.currentPage = pageId;
      $('#page-title').textContent = item.label;
      renderSidebar();
      renderBottomNav();
      const main = $('#main-content');
      main.innerHTML = '';
      const page = PAGES[pageId] ? PAGES[pageId]() : placeholderPage(item);
      main.appendChild(page);
    }
    window.navigate = navigate;

    function placeholderPage(item, msg = 'Halaman ini akan diisi di Fase berikutnya.') {
      const div = document.createElement('div');
      div.className = 'page max-w-3xl mx-auto bg-white rounded-xl border border-slate-200 p-8 text-center';
      div.innerHTML = `
        <div class="text-5xl mb-3">${item.icon}</div>
        <h3 class="text-xl font-bold text-slate-800 mb-2">${item.label}</h3>
        <p class="text-slate-500 text-sm">${escapeHtml(msg)}</p>

      return div;

        state.categories = catResp.data || [];
        const eqCount = {};
        (eqResp.data || []).forEach(e => { if (e.kategori_id) eqCount[e.kategori_id] = (eqCount[e.kategori_id] || 0) + 1; });

    async function submitCategory(id) {
      const form = document.getElementById('cat-form');
      const submitBtn = document.getElementById('cat-submit-btn');
      const cancelBtn = document.getElementById('cat-cancel-btn');
      const name = form.elements.name.value.trim();
      const parent_unit_type = form.elements.parent_unit_type.value;
      if (!name) { toast('Nama kategori wajib diisi.', 'warn'); return; }
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Memproses…'; }
      if (cancelBtn) cancelBtn.disabled = true;
      try {
        if (id) {
          const { error } = await state.supabase.from('categories').update({ name, parent_unit_type }).eq('id', id);
          if (error) throw error;
          toast('Kategori berhasil di-update.', 'success');
        } else {
          const { error } = await state.supabase.from('categories').insert({ name, parent_unit_type });
          if (error) throw error;
          toast('Kategori baru dibuat.', 'success');
        }
        closeModal();
        reloadCategoriesList();
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = id ? '💾 Simpan' : '+ Tambah'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitCategory = submitCategory;

    async function confirmDeleteCategory(id, name, usageCount) {
      if (usageCount > 0) {
        toast(`Tidak bisa hapus — ada ${usageCount} equipment yang pakai kategori ini. Hapus/pindah dulu equipment-nya.`, 'warn');
        return;
      }
      const ok = await confirmDialog({
        title: 'Hapus Kategori?',
        message: `Yakin mau hapus kategori "${name}"? Aksi tidak bisa di-undo.`,
        confirmText: 'Hapus',
        danger: true,
      });
      if (!ok) return;
      try {
        const { error } = await state.supabase.from('categories').delete().eq('id', id);
        if (error) throw error;
        toast('Kategori dihapus.', 'success');
        reloadCategoriesList();
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    }
    window.confirmDeleteCategory = confirmDeleteCategory;

    async function exportEquipmentToExcel() {
      try {
        toast('Menyiapkan data export…', 'info');
        // Ambil data lengkap (43 field) berdasarkan filter saat ini
        let q = state.supabase.from('equipment').select('*');
        const f = state.equipmentFilters;
        if (f.parent_unit_id) q = q.eq('assigned_unit_id', Number(f.parent_unit_id));
        if (f.kategori_id)    q = q.eq('kategori_id',      Number(f.kategori_id));
        if (f.status_operasi) q = q.eq('status_operasi',   f.status_operasi);
        if (f.tipe_kepemilikan) q = q.eq('tipe_kepemilikan', f.tipe_kepemilikan);
        const s = (state.equipmentSearch || '').trim();
        if (s) q = q.or(`tag_number.ilike.%${s}%,nama_equipment.ilike.%${s}%,serial_number.ilike.%${s}%`);
        q = q.order('tag_number');
        const { data, error } = await q;
        if (error) throw error;
        if (!data || data.length === 0) {
          toast('Tidak ada data untuk di-export.', 'warn');
          return;
        }

        // Transform data: ganti ID → nama (kategori, parent_unit, parent_equipment)
        const rows = data.map(eq => ({
          'Tag Number': eq.tag_number,
          'Nama Equipment': eq.nama_equipment,
          'Kategori': getCategoryName(eq.kategori_id),
          'Parent Unit': getParentUnitName(eq.assigned_unit_id),
          'Tipe Kepemilikan': eq.tipe_kepemilikan,
          'Brand': eq.brand,
          'Model': eq.model,
          'Serial Number': eq.serial_number,
          'Tahun Pembuatan': eq.tahun_pembuatan,
          'Tahun Commissioning': eq.tahun_commissioning,
          'Year Used': eq.year_used,
          'Country of Origin': eq.country_of_origin,
          'Spek Khusus': eq.spek_khusus,
          'Status Operasi': eq.status_operasi,
          'Kondisi Fisik': eq.kondisi_fisik,
          'Lokasi Fisik': eq.lokasi_fisik,
          'Running Hours': eq.running_hours,
          'Last Maintenance Date': eq.last_maintenance_date,
          'Last Maintenance Type': eq.last_maintenance_type,
          'Next Maintenance Date': eq.next_maintenance_date,
          'Maintenance Interval': eq.maintenance_interval,
          'PIC Mechanic': eq.pic_mechanic,
          'GOH Year': eq.goh_year,
          'Nomor SKPI': eq.nomor_skpi,
          'SKPI Start Date': eq.skpi_start_date,
          'SKPI End Date': eq.skpi_end_date,
          'COC Number': eq.coc_number,
          'ARF / Lembaga': eq.arf_lembaga,
          'Refurbish Year': eq.refurbish_year,
          'Refurbish By': eq.refurbish_by,
          'Load Test Result': eq.load_test_result,
          'Nomor Sertifikat Lain': eq.nomor_sertifikat_lain,
          'Tgl Terbit Sertifikat': eq.tgl_terbit_sertifikat,
          'Tgl Expired Sertifikat': eq.tgl_expired_sertifikat,
          'Lembaga Penerbit': eq.lembaga_penerbit,
          'Tgl Pembelian': eq.tgl_pembelian,
          'Harga Perolehan': eq.harga_perolehan,
          'Nomor PO/Invoice': eq.nomor_po_invoice,
          'Vendor/Supplier': eq.vendor_supplier,
          'Cost Center': eq.cost_center,
          'Pressure Test Date': eq.pressure_test_date,
          'Pressure Test Result': eq.pressure_test_result,
          'Remarks': eq.remarks,
        }));

        // Bikin workbook
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(rows);
        // Set lebar kolom auto (paling tidak ada lebar minimum)
        const colWidths = Object.keys(rows[0]).map(key => {
          const maxLen = Math.max(
            key.length,
            ...rows.map(r => String(r[key] || '').length)
          );
          return { wch: Math.min(Math.max(maxLen + 2, 12), 50) };
        });
        ws['!cols'] = colWidths;
        XLSX.utils.book_append_sheet(wb, ws, 'Equipment');

        // Bikin metadata sheet
        const meta = [
          ['Export dari Rigbase Station'],
          ['Tanggal Export', new Date().toLocaleString('id-ID')],
          ['Total Records', rows.length],
          [],
          ['Filter Aktif:'],
          ['Parent Unit', state.equipmentFilters.parent_unit_id ? getParentUnitName(Number(state.equipmentFilters.parent_unit_id)) : '(semua)'],
          ['Kategori', state.equipmentFilters.kategori_id ? getCategoryName(Number(state.equipmentFilters.kategori_id)) : '(semua)'],
          ['Status Operasi', state.equipmentFilters.status_operasi || '(semua)'],
          ['Tipe Kepemilikan', state.equipmentFilters.tipe_kepemilikan || '(semua)'],
          ['Search', state.equipmentSearch || '(kosong)'],
        ];
        const wsMeta = XLSX.utils.aoa_to_sheet(meta);
        wsMeta['!cols'] = [{ wch: 25 }, { wch: 30 }];
        XLSX.utils.book_append_sheet(wb, wsMeta, 'Info');

        // Generate filename
        const ts = new Date().toISOString().slice(0, 16).replace(/[:\-T]/g, '');
        const filename = `rigbase_equipment_${ts}.xlsx`;
        XLSX.writeFile(wb, filename);
        toast(`✅ ${rows.length} equipment ter-export ke ${filename}`, 'success');
      } catch (err) {
        toast('Gagal export: ' + err.message, 'error');
      }
    }
    window.exportEquipmentToExcel = exportEquipmentToExcel;

              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              Reset Filter
            </button>
          </div>
        </div>
        <div id="eq-list-container">Memuat…</div>
      `;

      setTimeout(() => {
        $('#eq-search').addEventListener('input', debounce(e => { state.equipmentSearch = e.target.value; reloadEquipmentList(); refreshFilterIndicator(); }, 350));
        $('#filter-unit').onchange   = e => { state.equipmentFilters.parent_unit_id = e.target.value; reloadEquipmentList(); refreshFilterIndicator(); };
        $('#filter-cat').onchange    = e => { state.equipmentFilters.kategori_id    = e.target.value; reloadEquipmentList(); refreshFilterIndicator(); };
        $('#filter-status').onchange = e => { state.equipmentFilters.status_operasi = e.target.value; reloadEquipmentList(); refreshFilterIndicator(); };
        $('#filter-tipe').onchange   = e => { state.equipmentFilters.tipe_kepemilikan = e.target.value; reloadEquipmentList(); refreshFilterIndicator(); };
      }, 0);

      reloadEquipmentList();
      return div;
    }

    function resetEquipmentFilters() {
      const hadFilter = state.equipmentSearch || state.equipmentFilters.parent_unit_id || state.equipmentFilters.kategori_id || state.equipmentFilters.status_operasi || state.equipmentFilters.tipe_kepemilikan;
      if (!hadFilter) return;
      state.equipmentSearch = '';
      state.equipmentFilters = { parent_unit_id: '', kategori_id: '', status_operasi: '', tipe_kepemilikan: '' };
      // Reset UI inputs tanpa re-render full page
      const s = $('#eq-search'); if (s) s.value = '';
      ['#filter-unit', '#filter-cat', '#filter-status', '#filter-tipe'].forEach(sel => {
        const el = $(sel); if (el) el.value = '';
      });
      refreshFilterIndicator();
      reloadEquipmentList();
      toast('Filter di-reset.', 'info');
    }
    window.resetEquipmentFilters = resetEquipmentFilters;

    function refreshFilterIndicator() {
      const indicator = document.querySelector('#btn-reset-filter')?.parentElement?.querySelector('div');
      const btn = document.querySelector('#btn-reset-filter');
      if (!indicator || !btn) return;
      const has = !!(state.equipmentSearch || state.equipmentFilters.parent_unit_id || state.equipmentFilters.kategori_id || state.equipmentFilters.status_operasi || state.equipmentFilters.tipe_kepemilikan);
      indicator.innerHTML = has
        ? '<span class="inline-flex items-center gap-1 text-safety font-semibold">● Filter aktif</span>'
        : '<span class="text-slate-400">Belum ada filter</span>';
      btn.disabled = !has;
      btn.className = `inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border ${has ? 'border-safety text-safety hover:bg-safety hover:text-white' : 'border-slate-200 text-slate-400 cursor-not-allowed'} text-xs font-semibold transition`;
    }

    async function reloadEquipmentList() {
      const c = document.getElementById('eq-list-container');
      if (!c) return;
      c.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">Memuat data…</div>';
      try {
        await fetchEquipmentList();
        c.innerHTML = renderEquipmentTable(state.equipmentList);
      } catch (err) {
        c.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 text-sm">Gagal load: ${escapeHtml(err.message)}</div>`;
      }
    }

    function renderEquipmentTable(items) {
      if (!items.length) {
        return `<div class="bg-white rounded-xl border border-slate-200 p-8 text-center text-slate-500">Tidak ada equipment yang cocok.</div>`;
      }
      const cards = items.map(eq => `
        <button onclick="setEquipmentView('detail', '${eq.id}')" class="block w-full bg-white border border-slate-200 rounded-xl p-4 text-left hover:shadow-md transition">
          <div class="flex items-center justify-between mb-1">
            <div class="font-bold text-navy">${escapeHtml(eq.tag_number)}</div>
            ${statusBadge(eq.status_operasi)}
          </div>
          <div class="text-sm text-slate-800 font-medium truncate">${escapeHtml(eq.nama_equipment)}</div>
          <div class="text-xs text-slate-500 mt-1 truncate">
            ${escapeHtml(getCategoryName(eq.kategori_id))} • ${escapeHtml(getParentUnitName(eq.assigned_unit_id))}
          </div>
        </button>
      `).join('');
      const rows = items.map(eq => `
        <tr class="hover:bg-slate-50 cursor-pointer" onclick="setEquipmentView('detail', '${eq.id}')">
          <td class="px-3 py-2 text-sm font-semibold text-navy whitespace-nowrap">${escapeHtml(eq.tag_number)}</td>
          <td class="px-3 py-2 text-sm">${escapeHtml(eq.nama_equipment)}</td>
          <td class="px-3 py-2 text-sm text-slate-600 whitespace-nowrap">${escapeHtml(getCategoryName(eq.kategori_id))}</td>
          <td class="px-3 py-2 text-sm text-slate-600 whitespace-nowrap">${escapeHtml(getParentUnitName(eq.assigned_unit_id))}</td>
          <td class="px-3 py-2 text-sm">${statusBadge(eq.status_operasi)}</td>
          <td class="px-3 py-2 text-sm">${statusBadge(eq.tipe_kepemilikan)}</td>
          <td class="px-3 py-2 text-sm text-slate-600 whitespace-nowrap">${fmtDate(eq.next_maintenance_date)}</td>
        </tr>
      `).join('');
      return `
        <div class="md:hidden space-y-2">${cards}</div>
        <div class="hidden md:block bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Tag</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Nama</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Kategori</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Parent Unit</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Status</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Tipe</th>
                  <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 uppercase">Next Maint.</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200">${rows}</tbody>
            </table>
          </div>
          <div class="px-4 py-2 text-xs text-slate-500 bg-slate-50 border-t">${items.length} equipment</div>
        </div>
      `;
    }

    // ============================================================
    // 9e. EQUIPMENT DETAIL VIEW (5 tabs)
    // ============================================================
    function renderEquipmentDetail() {
      const div = document.createElement('div');
      div.className = 'page space-y-4';
      div.innerHTML = '<div class="text-slate-400 text-sm">Memuat detail…</div>';

      Promise.all([
        fetchEquipment(state.currentEquipmentId),
        fetchActiveLoanAsLender(state.currentEquipmentId).catch(() => null),
        fetchActiveLoanAsBorrower(state.currentEquipmentId).catch(() => null),
        fetchChildren(state.currentEquipmentId).catch(() => []),
      ]).then(async ([eq, loanAsLender, loanAsBorrower, children]) => {
        // Fetch parent equipment kalau ada
        let parentEq = null;
        if (eq.parent_equipment_id) {
          try {
            const { data } = await state.supabase.from('equipment')
              .select('id, tag_number, nama_equipment, kategori_id')
              .eq('id', eq.parent_equipment_id).maybeSingle();
            parentEq = data;
          } catch {}
        }
        const isAdmin = state.profile.role === 'admin';
        const isBroken = eq.status_operasi === 'Down' || eq.status_operasi === 'Repair';
        const hasActiveLoan = !!(loanAsLender || loanAsBorrower);
        const activeLoan = loanAsLender || loanAsBorrower;

        // Banner pinjaman
        let loanBanner = '';
        if (loanAsLender) {
          loanBanner = `
            <div class="bg-purple-50 border-2 border-purple-300 rounded-xl p-4 shadow-sm">
              <div class="flex items-start gap-3">
                <span class="text-2xl">📌</span>
                <div class="flex-1">
                  <div class="font-bold text-purple-900 text-sm">Equipment ini sedang DIPINJAMKAN</div>
                  <div class="text-sm text-purple-800 mt-1">
                    Pemilik asli: <span class="font-semibold">${escapeHtml(getParentUnitName(loanAsLender.lender_unit_id))}</span> →
                    Dipinjam ke: <span class="font-semibold">${escapeHtml(getParentUnitName(loanAsLender.borrower_unit_id))}</span>
                  </div>
                  <div class="text-xs text-purple-700 mt-1">
                    Sejak <span class="font-semibold">${fmtDate(loanAsLender.loan_date)}</span>
                    (${daysUntil(loanAsLender.loan_date) != null ? `${-daysUntil(loanAsLender.loan_date)} hari lalu` : '—'})
                    ${loanAsLender.reason ? '• Alasan: ' + escapeHtml(loanAsLender.reason) : ''}
                  </div>
                </div>
              </div>
            </div>`;
        } else if (loanAsBorrower) {
          loanBanner = `
            <div class="bg-amber-50 border-2 border-amber-300 rounded-xl p-4 shadow-sm">
              <div class="flex items-start gap-3">
                <span class="text-2xl">🔧</span>
                <div class="flex-1">
                  <div class="font-bold text-amber-900 text-sm">Equipment ini sementara DIGANTIKAN PINJAMAN</div>
                  <div class="text-sm text-amber-800 mt-1">
                    Dari unit <span class="font-semibold">${escapeHtml(getParentUnitName(loanAsBorrower.lender_unit_id))}</span> sejak
                    <span class="font-semibold">${fmtDate(loanAsBorrower.loan_date)}</span>
                  </div>
                  <div class="text-xs text-amber-700 mt-1">
                    ${loanAsBorrower.reason ? 'Alasan: ' + escapeHtml(loanAsBorrower.reason) : ''}
                  </div>
                </div>
              </div>
            </div>`;
        }

        // Determine which buttons to show
        const canPinjam = isAdmin && isBroken && !loanAsBorrower; // butuh pengganti tapi belum punya pinjaman aktif
        const canKembalikan = isAdmin && hasActiveLoan;
        const canMutasi = isAdmin && !hasActiveLoan; // gak boleh mutasi kalau lagi dipinjam/meminjamkan
        const canGanti = isAdmin && !hasActiveLoan;
        const canEdit = isAdmin;
        const canHapus = isAdmin && !hasActiveLoan;

        // Breadcrumb hierarki: Parent Unit → Parent Equipment → Equipment ini
        const breadcrumb = `
          <div class="flex items-center gap-1.5 flex-wrap text-xs text-slate-500 mb-1">
            <span>🏭 ${escapeHtml(getParentUnitName(eq.assigned_unit_id))}</span>
            ${parentEq ? `<span>›</span><button onclick="setEquipmentView('detail','${parentEq.id}')" class="text-navy hover:underline">📦 ${escapeHtml(parentEq.tag_number)}</button>` : ''}
            <span>›</span>
            <span class="font-semibold text-slate-700">${escapeHtml(eq.tag_number)}</span>
          </div>`;

        div.innerHTML = `
          ${loanBanner}
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <button onclick="setEquipmentView('list')" class="text-sm text-navy hover:underline mb-2 inline-flex items-center gap-1">← Kembali ke daftar</button>
            ${breadcrumb}
            <div class="flex items-start justify-between gap-3 flex-wrap">
              <div class="flex-1 min-w-0">
                <h2 class="text-2xl font-bold text-slate-900">${escapeHtml(eq.tag_number)}</h2>
                <p class="text-base text-slate-700 mt-1">${escapeHtml(eq.nama_equipment)}</p>
                <div class="flex flex-wrap items-center gap-2 mt-3">
                  ${statusBadge(eq.status_operasi)}
                  ${statusBadge(eq.kondisi_fisik)}
                  ${statusBadge(eq.tipe_kepemilikan)}
                  <span class="text-xs text-slate-500">${escapeHtml(getCategoryName(eq.kategori_id))}</span>
                  <span class="text-xs text-slate-400">•</span>
                  <span class="text-xs text-slate-500">${escapeHtml(getParentUnitName(eq.assigned_unit_id))}</span>
                  ${children.length > 0 ? `<span class="text-xs text-slate-400">•</span><span class="text-xs font-semibold text-navy">🧩 ${children.length} komponen</span>` : ''}
                </div>
              </div>
              <div class="flex gap-2 flex-wrap">
                <button onclick="printEquipmentDetail()" class="px-3 py-2 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium no-print">🖨 Print / PDF</button>
                ${isAdmin ? `
                  ${canPinjam ? `<button onclick="openLoanModal('${eq.id}')" class="px-3 py-2 rounded-lg bg-amber-100 hover:bg-amber-200 text-amber-800 text-sm font-medium">🤝 Pinjam Pengganti</button>` : ''}
                  ${canKembalikan ? `<button onclick="openReturnLoanModal('${activeLoan.id}')" class="px-3 py-2 rounded-lg bg-green-100 hover:bg-green-200 text-green-800 text-sm font-medium">↩️ Kembalikan Pinjaman</button>` : ''}
                  ${canGanti ? `<button onclick="openReplaceModal('${eq.id}')" class="px-3 py-2 rounded-lg bg-purple-100 hover:bg-purple-200 text-purple-800 text-sm font-medium">🔄 Ganti</button>` : ''}
                  ${canMutasi ? `<button onclick="openMutasiModal('${eq.id}')" class="px-3 py-2 rounded-lg bg-blue-100 hover:bg-blue-200 text-blue-800 text-sm font-medium">↔ Mutasi</button>` : ''}
                  ${canEdit ? `<button onclick="setEquipmentView('form', '${eq.id}')" class="px-3 py-2 rounded-lg bg-navy hover:bg-navy-700 text-white text-sm font-medium">✏ Edit</button>` : ''}
                  ${canHapus ? `<button onclick="confirmDeleteEquipment('${eq.id}', '${escapeHtml(eq.tag_number).replace(/'/g,'&#39;')}')" class="px-3 py-2 rounded-lg bg-red-100 hover:bg-red-200 text-red-700 text-sm font-medium">🗑 Hapus</button>` : ''}
                ` : ''}
              </div>
            </div>
            ${hasActiveLoan && isAdmin ? '<div class="mt-3 text-xs text-slate-500 italic">ℹ️ Mutasi/Ganti/Hapus di-disable selama equipment ini ada pinjaman aktif. Kembalikan dulu pinjaman.</div>' : ''}
          </div>

          ${children.length > 0 ? `
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <h3 class="text-base font-bold text-slate-800 mb-3 flex items-center gap-2">
              🧩 Komponen (${children.length})
              <span class="text-xs font-normal text-slate-500">— equipment yang merupakan bagian dari ${escapeHtml(eq.tag_number)}</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${children.map(c => `
                <button onclick="setEquipmentView('detail','${c.id}')" class="text-left bg-slate-50 hover:bg-navy hover:text-white rounded-lg p-3 transition group border border-slate-200">
                  <div class="flex items-center justify-between gap-2 mb-1">
                    <span class="font-bold text-navy group-hover:text-white text-sm">${escapeHtml(c.tag_number)}</span>
                    ${statusBadge(c.status_operasi)}
                  </div>
                  <div class="text-xs text-slate-700 group-hover:text-blue-100 truncate">${escapeHtml(c.nama_equipment)}</div>
                  <div class="text-xs text-slate-500 group-hover:text-blue-200 mt-0.5">${escapeHtml(getCategoryName(c.kategori_id))}</div>
                </button>
              `).join('')}
            </div>
          </div>` : ''}

          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="flex border-b border-slate-200 overflow-x-auto">
              ${[
                ['info','📋 Info'],
                ['maintenance','🛠️ Maintenance'],
                ['sertifikasi','📜 Sertifikasi'],
                ['dokumen','📎 Dokumen'],
                ['history','🔄 History'],
              ].map(([id, lbl]) => `
                <button onclick="state.equipmentDetailTab='${id}'; renderDetailTab(window.__currentEq)"
                  class="px-4 py-3 text-sm font-medium whitespace-nowrap ${state.equipmentDetailTab===id ? 'border-b-2 border-safety text-safety bg-safety/5' : 'text-slate-600 hover:text-navy'}">
                  ${lbl}
                </button>
              `).join('')}
            </div>
            <div id="detail-tab-content" class="p-5"></div>
          </div>
        `;
        window.__currentEq = eq;
        window.__currentLoan = activeLoan;
        renderDetailTab(eq);
      }).catch(err => {
        div.innerHTML = `<div class="bg-red-50 border border-red-200 p-4 rounded-lg text-red-700 text-sm">Gagal load: ${escapeHtml(err.message)}</div>`;
      });

      return div;
    }

    function renderDetailTab(eq) {
      const c = document.getElementById('detail-tab-content');
      if (!c) return;
      // Re-render tabs bar to update active state
      const parent = c.parentElement.querySelector('.flex.border-b');
      if (parent) {
        parent.querySelectorAll('button').forEach((btn, i) => {
          const ids = ['info','maintenance','sertifikasi','dokumen','history'];
          btn.className = `px-4 py-3 text-sm font-medium whitespace-nowrap ${state.equipmentDetailTab===ids[i] ? 'border-b-2 border-safety text-safety bg-safety/5' : 'text-slate-600 hover:text-navy'}`;
        });
      }
      switch (state.equipmentDetailTab) {
        case 'info':        c.innerHTML = renderInfoTab(eq); break;
        case 'sertifikasi': c.innerHTML = renderSertifikasiTab(eq); break;
        case 'maintenance': c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderMaintenanceTab(eq, c); break;
        case 'dokumen':     c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderDokumenTab(eq, c); break;
        case 'history':     c.innerHTML = '<div class="text-slate-400">Memuat…</div>'; renderHistoryTab(eq, c); break;
      }
    }
    window.renderDetailTab = renderDetailTab;

    function infoRow(label, value) {
      return `<div class="grid grid-cols-3 gap-2 py-2.5 border-b border-slate-200 last:border-0">
        <div class="text-sm md:text-base font-medium text-slate-600">${escapeHtml(label)}</div>
        <div class="col-span-2 text-sm md:text-base font-semibold text-slate-900">${value === '' || value == null ? '<span class="text-slate-400 font-normal">—</span>' : value}</div>
      </div>`;
    }

    function renderInfoTab(eq) {
      const sections = [
        ['Identitas', [
          ['Tag Number', eq.tag_number],
          ['Nama Equipment', eq.nama_equipment],
          ['Kategori', getCategoryName(eq.kategori_id)],
          ['Parent Unit', getParentUnitName(eq.assigned_unit_id)],
          ['Tipe Kepemilikan', eq.tipe_kepemilikan],
        ]],
        ['Spesifikasi', [
          ['Brand', eq.brand],
          ['Model', eq.model],
          ['Serial Number', eq.serial_number],
          ['Tahun Pembuatan', eq.tahun_pembuatan],
          ['Tahun Commissioning', eq.tahun_commissioning],
          ['Year Used', eq.year_used],
          ['Country of Origin', eq.country_of_origin],
          ['Spek Khusus', eq.spek_khusus],
        ]],
        ['Status', [
          ['Status Operasi', eq.status_operasi],
          ['Kondisi Fisik', eq.kondisi_fisik],
          ['Lokasi Fisik', eq.lokasi_fisik],
          ['Running Hours', eq.running_hours != null ? fmtNumber(eq.running_hours, ' jam') : null],
        ]],
        ['Maintenance', [
          ['Last Maintenance', fmtDate(eq.last_maintenance_date)],
          ['Last Type', eq.last_maintenance_type],
          ['Next Maintenance', fmtDate(eq.next_maintenance_date)],
          ['Interval', eq.maintenance_interval],
          ['PIC Mechanic', eq.pic_mechanic],
          ['GOH Year', eq.goh_year],
        ]],
        ['Finansial', [
          ['Tgl Pembelian', fmtDate(eq.tgl_pembelian)],
          ['Harga Perolehan', eq.harga_perolehan != null ? fmtCurrency(eq.harga_perolehan) : null],
          ['Nomor PO/Invoice', eq.nomor_po_invoice],
          ['Vendor/Supplier', eq.vendor_supplier],
          ['Cost Center', eq.cost_center],
        ]],
        ['Safety', [
          ['Pressure Test Date', fmtDate(eq.pressure_test_date)],
          ['Pressure Test Result', eq.pressure_test_result],
        ]],
        ['Catatan', [
          ['Remarks', eq.remarks],
        ]],
      ];
      return sections.map(([title, rows]) => `
        <div class="mb-5 last:mb-0">
          <h4 class="font-bold text-navy text-base uppercase tracking-wider mb-3">${title}</h4>
          <div class="bg-white border border-slate-200 rounded-lg p-4">
            ${rows.map(([l, v]) => infoRow(l, v != null && v !== '' ? escapeHtml(String(v)) : null)).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderSertifikasiTab(eq) {
      const skpiDays = daysUntil(eq.skpi_end_date);
      const sertDays = daysUntil(eq.tgl_expired_sertifikat);
      const skpiAlert = skpiDays != null
        ? (skpiDays < 0 ? `<span class="text-red-700 font-bold">⚠ Expired ${-skpiDays} hari lalu</span>`
        : (skpiDays <= 60 ? `<span class="text-amber-700 font-bold">⏰ ${skpiDays} hari lagi</span>`
        : `<span class="text-green-700">${skpiDays} hari lagi</span>`))
        : '<span class="text-slate-400">—</span>';
      const sertAlert = sertDays != null
        ? (sertDays < 0 ? `<span class="text-red-700 font-bold">⚠ Expired ${-sertDays} hari lalu</span>`
        : (sertDays <= 60 ? `<span class="text-amber-700 font-bold">⏰ ${sertDays} hari lagi</span>`
        : `<span class="text-green-700">${sertDays} hari lagi</span>`))
        : '<span class="text-slate-400">—</span>';
      return `
        <div class="space-y-5">
          <div>
            <h4 class="font-bold text-navy text-base uppercase tracking-wider mb-3">SKPI</h4>
            <div class="bg-white border border-slate-200 rounded-lg p-4">
              ${infoRow('Nomor SKPI', escapeHtml(eq.nomor_skpi || '') || null)}
              ${infoRow('Start Date', fmtDate(eq.skpi_start_date))}
              ${infoRow('End Date', fmtDate(eq.skpi_end_date) + ' &nbsp; ' + skpiAlert)}
            </div>
          </div>
          <div>
            <h4 class="font-bold text-navy text-base uppercase tracking-wider mb-3">COC & Refurbish</h4>
            <div class="bg-white border border-slate-200 rounded-lg p-4">
              ${infoRow('COC Number', escapeHtml(eq.coc_number || '') || null)}
              ${infoRow('ARF / Lembaga', escapeHtml(eq.arf_lembaga || '') || null)}
              ${infoRow('Refurbish Year', eq.refurbish_year)}
              ${infoRow('Refurbish By', escapeHtml(eq.refurbish_by || '') || null)}
              ${infoRow('Load Test Result', escapeHtml(eq.load_test_result || '') || null)}
            </div>
          </div>
          <div>
            <h4 class="font-bold text-navy text-base uppercase tracking-wider mb-3">Sertifikat Lainnya</h4>
            <div class="bg-white border border-slate-200 rounded-lg p-4">
              ${infoRow('Nomor Sertifikat', escapeHtml(eq.nomor_sertifikat_lain || '') || null)}
              ${infoRow('Tgl Terbit', fmtDate(eq.tgl_terbit_sertifikat))}
              ${infoRow('Tgl Expired', fmtDate(eq.tgl_expired_sertifikat) + ' &nbsp; ' + sertAlert)}

          fetchMutationLog(eq.id),
          fetchLoanHistory(eq.id).catch(() => []),
        ]);

        // Gabung events ke timeline yg sama, sort by date desc
        const events = [];
        muts.forEach(m => events.push({
          kind: 'mutasi',
          date: m.mutation_date,
          title: `${getParentUnitName(m.from_unit_id)} → ${getParentUnitName(m.to_unit_id)}`,
          detail: m.reason,
          color: 'bg-safety',
        }));
        loans.forEach(l => {
          const isLender = l.lender_equipment_id === eq.id;
          // Event "pinjam"
          events.push({
            kind: 'pinjam',
            date: l.loan_date,
            title: isLender
              ? `🤝 DIPINJAMKAN: ${getParentUnitName(l.lender_unit_id)} → ${getParentUnitName(l.borrower_unit_id)}`

            events.push({

              date: l.return_date,
              title: isLender
                ? `↩️ DIKEMBALIKAN: ke ${getParentUnitName(l.lender_unit_id)}`
                : `↩️ MENGEMBALIKAN: pinjaman ke ${getParentUnitName(l.lender_unit_id)}`,
              detail: l.return_notes,
              color: 'bg-green-500',

          }
        });
        events.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        container.innerHTML = `
          <h4 class="font-bold text-slate-800 mb-3">Riwayat Mutasi & Pinjaman (${events.length})</h4>
          ${events.length === 0 ? '<div class="text-center py-6 text-slate-400 text-sm bg-slate-50 rounded-lg">Belum ada riwayat.</div>' :

                  <div class="absolute -left-6 top-1 w-3 h-3 rounded-full ${ev.color} ring-4 ring-white"></div>

        container.innerHTML = `<div class="bg-red-50 text-red-700 p-3 rounded">Gagal load: ${escapeHtml(err.message)}</div>`;
      }

    function renderFormField(f, value) {
      const v = value == null ? '' : value;
      const required = f.required ? 'required' : '';
      const baseCls = 'w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-navy text-sm';
      let input;
      if (f.type === 'textarea') {
        input = `<textarea name="${f.name}" rows="3" ${required} class="${baseCls}">${escapeHtml(v)}</textarea>`;
      } else if (f.type === 'select') {
        input = `<select name="${f.name}" ${required} class="${baseCls} bg-white">
          ${f.required ? '' : '<option value="">—</option>'}
          ${f.options.map(o => `<option value="${o}" ${v == o ? 'selected' : ''}>${o}</option>`).join('')}
        </select>`;
      } else if (f.type === 'select-parent-unit') {
        input = `<select name="${f.name}" ${required} class="${baseCls} bg-white">
          <option value="">— pilih —</option>
          ${state.parentUnits.map(u => `<option value="${u.id}" ${v == u.id ? 'selected' : ''}>${escapeHtml(u.name)} (${u.type})</option>`).join('')}
        </select>`;
      } else if (f.type === 'select-category') {
        // Render placeholder dulu; akan di-populate berdasarkan parent_unit type
        // (populateCategoryDropdown dipanggil setelah form di-render)
        const selectedTag = v ? `data-current-value="${v}"` : '';
        input = `<select name="${f.name}" ${required} ${selectedTag} class="${baseCls} bg-white">
          <option value="">— pilih Parent Unit dulu —</option>
        </select>
        <p class="text-xs text-slate-500 mt-1">Filter otomatis berdasarkan tipe Parent Unit (Rig/Standalone).</p>`;
      } else if (f.type === 'select-parent-equipment') {
        // Dropdown ini diisi async setelah form di-render (pas kategori/unit dipilih).
        // Render placeholder dulu, isi lewat populateParentEquipmentDropdown().
        const selectedTag = v ? `data-current-value="${v}"` : '';
        input = `<select name="${f.name}" ${selectedTag} class="${baseCls} bg-white">
          <option value="">— tidak ada parent (top-level) —</option>
        </select>
        ${f.placeholder ? `<p class="text-xs text-slate-500 mt-1">${escapeHtml(f.placeholder)}</p>` : ''}`;
      } else {
        const extras = [
          f.min != null ? `min="${f.min}"` : '',
          f.max != null ? `max="${f.max}"` : '',
          f.step ? `step="${f.step}"` : '',
          f.placeholder ? `placeholder="${escapeHtml(f.placeholder)}"` : '',
        ].join(' ');
        input = `<input type="${f.type}" name="${f.name}" value="${escapeHtml(v)}" ${extras} ${required} class="${baseCls}" />`;
      }
      const isFull = f.type === 'textarea';
      return `<div class="${isFull ? 'md:col-span-2' : ''}">
        <label class="block text-xs font-semibold text-slate-700 mb-1">${escapeHtml(f.label)}</label>
        ${input}
      </div>`;
    }

    async function submitEquipmentForm(isEdit) {
      const form = $('#eq-form');
      const errBox = $('#form-error');
      hide(errBox);
      const payload = {};
      EQUIPMENT_FIELDS.forEach(sec => sec.fields.forEach(f => {
        const el = form.elements[f.name];
        if (!el) return;
        let v = el.value;
        if (v === '') v = null;
        else if (f.type === 'number' || f.type === 'select-parent-unit' || f.type === 'select-category') {
          v = v == null ? null : Number(v);
          if (Number.isNaN(v)) v = null;
        }
        // select-parent-equipment stays as UUID string (no conversion)
        payload[f.name] = v;
      }));

      const submitBtn = form.querySelector('button[type=submit]');
      submitBtn.disabled = true;
      const originalLabel = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Menyimpan…';

      try {
        let saved;
        if (isEdit) {
          saved = await updateEquipment(state.currentEquipmentId, payload);
          toast('Equipment berhasil di-update.', 'success');
        } else {
          saved = await createEquipment(payload);
          toast('Equipment baru berhasil dibuat.', 'success');
        }
        setEquipmentView('detail', saved.id);
      } catch (err) {
        errBox.textContent = `Gagal: ${err.message}`;
        show(errBox);
        toast('Gagal menyimpan: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalLabel;
      }
    }

            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Pindah ke Unit *</label>

          <button id="mutasi-submit-btn" onclick="submitMutasi('${equipmentId}', ${eq.assigned_unit_id})" class="px-4 py-2 rounded-lg bg-navy hover:bg-navy-700 text-white text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">Mutasi Sekarang</button>
        `,
      });

    window.openMutasiModal = openMutasiModal;

    async function submitMutasi(equipment_id, from_unit_id) {
      const form = document.getElementById('mutasi-form');
      const submitBtn = document.getElementById('mutasi-submit-btn');
      const cancelBtn = document.getElementById('mutasi-cancel-btn');
      const to_unit_id = Number(form.elements.to_unit_id.value);
      const mutation_date = form.elements.mutation_date.value;
      const reason = form.elements.reason.value || null;
      if (!to_unit_id) { toast('Pilih unit tujuan dulu.', 'warn'); return; }
      if (to_unit_id === from_unit_id) { toast('Unit tujuan harus berbeda dengan unit asal.', 'warn'); return; }

      // Cek apakah equipment ini punya children — kalau iya, tanya cascade
      let children = [];
      try { children = await fetchChildren(equipment_id); } catch {}
      let cascade = false;
      if (children.length > 0) {
        closeModal();
        const choice = await new Promise((resolve) => {
          const id = '__cas_' + Date.now();
          openModal({
            title: `Equipment ini punya ${children.length} komponen`,
            maxWidth: 'max-w-md',
            body: `
              <p class="text-sm text-slate-700 mb-3">Equipment ini adalah <b>container</b> yang punya komponen anak:</p>
              <ul class="text-sm text-slate-600 bg-slate-50 rounded p-3 max-h-40 overflow-y-auto mb-3 list-disc list-inside">
                ${children.map(c => `<li><b>${escapeHtml(c.tag_number)}</b> — ${escapeHtml(c.nama_equipment)}</li>`).join('')}
              </ul>
              <p class="text-sm text-slate-700">Apa yang mau dilakukan ke komponen ini saat mutasi?</p>
            `,
            footer: `
              <button onclick="closeModal(); window['${id}']('cancel');" class="px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batalkan Mutasi</button>
              <button onclick="closeModal(); window['${id}']('detach');" class="px-3 py-2 rounded-lg bg-amber-100 hover:bg-amber-200 text-amber-800 text-sm font-medium">Detach saja (komponen tetap di unit lama)</button>
              <button onclick="closeModal(); window['${id}']('cascade');" class="px-3 py-2 rounded-lg bg-navy hover:bg-navy-700 text-white text-sm font-semibold">Cascade — pindah semua</button>
            `,
            dismissable: false,
          });
          window[id] = (v) => { delete window[id]; resolve(v); };
        });

        if (choice === 'cancel') return;
        cascade = (choice === 'cascade');
      }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Memproses…'; }
      if (cancelBtn) cancelBtn.disabled = true;
      try {
        // Mutasi parent
        await createMutation({ equipment_id, from_unit_id, to_unit_id, mutation_date, reason });

        // Handle children
        if (children.length > 0) {
          if (cascade) {
            // Pindahkan semua children ke unit tujuan + log mutation
            for (const child of children) {
              await createMutation({
                equipment_id: child.id,
                from_unit_id,
                to_unit_id,
                mutation_date,
                reason: `[Cascade] Ikut parent ${escapeHtml(window.__currentEq?.tag_number || '')} — ${reason || ''}`.trim(),
              });
            }
          } else {
            // Detach: lepas parent_equipment_id dari children, tapi tetap di unit lama
            const { error } = await state.supabase.from('equipment').update({
              parent_equipment_id: null,
              updated_by: state.user.id,
            }).in('id', children.map(c => c.id));
            if (error) throw new Error('Detach children gagal: ' + error.message);
          }
        }

        toast(`Mutasi berhasil${cascade ? ' (cascade ' + children.length + ' komponen)' : children.length > 0 ? ' (komponen di-detach)' : ''} — lihat tab History.`, 'success');
        closeModal();
        setEquipmentView('detail', equipment_id, 'history');
      } catch (err) {
        toast('Gagal mutasi: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Mutasi Sekarang'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitMutasi = submitMutasi;

    // ============================================================
    // 9g.2. PENGGANTIAN EQUIPMENT (Replace Flow)
    // Yang lama → pindah ke unit Independent, status Standby, tipe Mobile-Backup.
    // Yang baru → menempati posisi/unit yang ditinggalkan.
    // ============================================================
    // State helper buat replace modal — track filter Mobile-Backup only
    state.replaceShowPermanent = false;
    state.replaceCandidates = [];

    async function openReplaceModal(equipmentId) {
      const eq = window.__currentEq;
      if (!eq || eq.id !== equipmentId) return;

      // GUARD 1: parent unit "Independent" harus ada
      const independentUnit = state.parentUnits.find(u => u.name === 'Independent');
      if (!independentUnit) {
        toast('Parent unit "Independent" tidak ditemukan di database.', 'error');
        return;
      }
      // GUARD 2: equipment harus punya unit assigned
      if (!eq.assigned_unit_id) {
        toast('Equipment ini belum ter-assign ke unit. Edit dulu sebelum diganti.', 'warn');
        return;
      }
      // GUARD 3: kalau equipment udah di Independent — gak masuk akal diganti
      if (eq.assigned_unit_id === independentUnit.id) {
        toast('Equipment ini sudah di pool Independent (backup). Pakai Mutasi kalau mau pindah ke rig.', 'warn');
        return;
      }
      // GUARD 4: harus punya kategori
      if (!eq.kategori_id) {
        toast('Equipment ini belum punya kategori. Edit dulu sebelum diganti.', 'warn');
        return;
      }

      state.replaceShowPermanent = false;
      await loadReplaceCandidates(eq);
      renderReplaceModal(eq, independentUnit);
    }
    window.openReplaceModal = openReplaceModal;

    async function loadReplaceCandidates(eq) {
      try {
        let q = state.supabase
          .from('equipment')
          .select('id, tag_number, nama_equipment, assigned_unit_id, status_operasi, tipe_kepemilikan, brand, model')
          .eq('kategori_id', eq.kategori_id)
          .neq('id', eq.id)
          .neq('status_operasi', 'Scrap');
        if (!state.replaceShowPermanent) q = q.eq('tipe_kepemilikan', 'Mobile-Backup');
        q = q.order('tipe_kepemilikan', { ascending: false }).order('tag_number');
        const { data, error } = await q;
        if (error) throw error;
        state.replaceCandidates = data || [];
      } catch (err) {
        toast('Gagal load kandidat: ' + err.message, 'error');
        state.replaceCandidates = [];
      }
    }

    async function toggleReplacePermanent(eqId) {
      state.replaceShowPermanent = !state.replaceShowPermanent;
      const eq = window.__currentEq;
      if (!eq || eq.id !== eqId) return;
      await loadReplaceCandidates(eq);
      const selectEl = document.querySelector('#replace-form select[name="new_id"]');
      const noteEl = document.querySelector('#replace-candidate-note');
      const toggleEl = document.querySelector('#replace-permanent-toggle');
      if (selectEl) selectEl.innerHTML = buildCandidateOptions();
      if (noteEl) noteEl.innerHTML = candidateNote(eq);
      if (toggleEl) toggleEl.checked = state.replaceShowPermanent;
    }
    window.toggleReplacePermanent = toggleReplacePermanent;

    function buildCandidateOptions() {
      if (state.replaceCandidates.length === 0) {
        const filterNote = state.replaceShowPermanent ? '' : ' (Mobile-Backup saja)';
        return `<option value="">-- Tidak ada kandidat${filterNote} --</option>`;
      }
      return '<option value="">— pilih pengganti —</option>' + state.replaceCandidates.map(c => {
        const note = c.tipe_kepemilikan === 'Mobile-Backup' ? ' [Backup]' : ' [Permanent]';
        const loc = c.assigned_unit_id ? ` @ ${getParentUnitName(c.assigned_unit_id)}` : ' @ belum ter-assign';
        return `<option value="${c.id}">${escapeHtml(c.tag_number)} — ${escapeHtml(c.nama_equipment)}${note}${escapeHtml(loc)}</option>`;
      }).join('');
    }

    function candidateNote(eq) {
      const total = state.replaceCandidates.length;
      const mode = state.replaceShowPermanent ? 'semua (Backup + Permanent)' : 'Mobile-Backup saja';
      return `${total} kandidat kategori "${escapeHtml(getCategoryName(eq.kategori_id))}" — ${mode}.`;
    }

                  <li><span class="font-semibold">Equipment pengganti</span> → pindah ke <span class="font-semibold">${escapeHtml(oldUnitName)}</span>, tipe <span class="font-semibold">Permanent</span>, status <span class="font-semibold">Aktif</span></li>

          <button id="replace-submit-btn" onclick="submitReplace('${eq.id}', ${eq.assigned_unit_id}, ${independentUnit.id})" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">🔄 Lakukan Penggantian</button>

    async function submitReplace(oldEquipmentId, oldUnitId, independentUnitId) {
      const form = document.getElementById('replace-form');
      const submitBtn = document.getElementById('replace-submit-btn');
      const cancelBtn = document.getElementById('replace-cancel-btn');
      const newId = form.elements.new_id.value;
      const replace_date = form.elements.replace_date.value;
      const old_status = form.elements.old_status.value || 'Standby';
      const reason = form.elements.reason.value || null;

      // VALIDASI input
      if (!newId)         { toast('Pilih equipment pengganti dulu.', 'warn'); return; }
      if (!replace_date)  { toast('Tanggal wajib diisi.', 'warn'); return; }
      if (newId === oldEquipmentId) { toast('Equipment pengganti tidak boleh sama dengan equipment lama.', 'warn'); return; }
      if (!oldUnitId)     { toast('Equipment lama belum punya unit. Operasi dibatalkan.', 'error'); return; }
      if (oldUnitId === independentUnitId) { toast('Equipment lama sudah di Independent. Operasi dibatalkan.', 'error'); return; }

      // Konfirmasi double (extra safety)
      const ok = await confirmDialog({
        title: 'Konfirmasi Penggantian',
        message: `Yakin mau lakukan penggantian ini? 2 equipment akan di-update + 2 entry log akan dibuat. Aksi ini tidak otomatis bisa di-undo.`,
        confirmText: 'Ya, Lanjutkan',
      });
      if (!ok) return;

      // Modal konfirmasi nutup modal replace, kita harus buka lagi atau langsung jalan?
      // Karena confirmDialog override modal, replace modal udah ke-close.
      // Disable button gak bisa lagi — langsung kerja saja.

      // Fetch ulang equipment baru (data fresh — antisipasi race condition)
      let newEq;
      try {
        const { data, error } = await state.supabase.from('equipment')
          .select('id, tag_number, nama_equipment, assigned_unit_id, status_operasi').eq('id', newId).single();
        if (error) throw error;
        newEq = data;
      } catch (err) {
        toast('Gagal load equipment pengganti: ' + err.message, 'error');
        return;
      }

      // Re-verify: newEq jangan dalam status Scrap (mungkin baru di-Scrap antara load modal & submit)
      if (newEq.status_operasi === 'Scrap') {
        toast(`Equipment ${newEq.tag_number} berstatus Scrap. Pilih yang lain.`, 'warn');
        return;
      }

      const oldEq = window.__currentEq;
      const oldUnitName = getParentUnitName(oldUnitId);

      // 4 operasi
      try {
        // 1. Update equipment lama
        const { error: e1 } = await state.supabase.from('equipment').update({
          assigned_unit_id: independentUnitId,
          status_operasi: old_status,
          tipe_kepemilikan: 'Mobile-Backup',
          updated_by: state.user.id,
        }).eq('id', oldEquipmentId);
        if (e1) throw new Error('Update equipment lama gagal: ' + e1.message);

        // 2. Update equipment baru
        const { error: e2 } = await state.supabase.from('equipment').update({
          assigned_unit_id: oldUnitId,
          status_operasi: 'Aktif',
          tipe_kepemilikan: 'Permanent',
          updated_by: state.user.id,
        }).eq('id', newId);
        if (e2) throw new Error('Update equipment baru gagal: ' + e2.message);

        // 3. Mutation log untuk equipment lama
        const reasonOld = `[Penggantian] Diganti oleh ${newEq.tag_number}. Status → ${old_status}.${reason ? ' — ' + reason : ''}`.trim();
        const { error: e3 } = await state.supabase.from('mutation_log').insert({
          equipment_id: oldEquipmentId,
          from_unit_id: oldUnitId,
          to_unit_id: independentUnitId,
          mutation_date: replace_date,
          reason: reasonOld,
          created_by: state.user.id,
        });
        if (e3) throw new Error('Log mutasi lama gagal: ' + e3.message);

        // 4. Mutation log untuk equipment baru
        const reasonNew = `[Penggantian] Menggantikan ${oldEq.tag_number} di ${oldUnitName}.${reason ? ' — ' + reason : ''}`.trim();
        const { error: e4 } = await state.supabase.from('mutation_log').insert({
          equipment_id: newId,
          from_unit_id: newEq.assigned_unit_id,
          to_unit_id: oldUnitId,
          mutation_date: replace_date,
          reason: reasonNew,
          created_by: state.user.id,
        });
        if (e4) throw new Error('Log mutasi baru gagal: ' + e4.message);

        toast(`Penggantian berhasil. ${newEq.tag_number} aktif di ${oldUnitName}. Lihat tab History.`, 'success');
        // Langsung pindah ke equipment BARU's History tab
        setEquipmentView('detail', newId, 'history');
      } catch (err) {
        toast('Gagal: ' + err.message + ' — Cek manual via SQL Editor.', 'error');
        console.error('Replace failed:', err);
      }
    }
    window.submitReplace = submitReplace;

    // ============================================================
    // 9g.3. PINJAM-MEMINJAM EQUIPMENT (Loan Flow)
    // Equipment yang rusak pinjam pengganti dari unit lain.
    // Lender equipment: tetap milik unit asal, pindah sementara.
    // Borrower equipment: tetap di unit-nya, status jadi Repair.
    // ============================================================
    async function openLoanModal(borrowerEquipmentId) {
      const borrower = window.__currentEq;
      if (!borrower || borrower.id !== borrowerEquipmentId) return;

      // Guards
      if (!borrower.assigned_unit_id) {
        toast('Equipment ini belum ter-assign ke unit.', 'warn');
        return;
      }
      if (!borrower.kategori_id) {
        toast('Equipment ini belum punya kategori.', 'warn');
        return;
      }

      // Fetch kandidat lender: kategori sama, status Aktif, unit BEDA, gak lagi dipinjam
      let candidates = [];
      try {
        const { data, error } = await state.supabase
          .from('equipment')
          .select('id, tag_number, nama_equipment, assigned_unit_id, status_operasi, tipe_kepemilikan')
          .eq('kategori_id', borrower.kategori_id)
          .eq('status_operasi', 'Aktif')
          .neq('id', borrowerEquipmentId)
          .neq('assigned_unit_id', borrower.assigned_unit_id)
          .order('tipe_kepemilikan', { ascending: false })
          .order('tag_number');
        if (error) throw error;
        // Filter: pastikan gak lagi dipinjamkan (cek loan_log)
        const candidateIds = (data || []).map(c => c.id);
        if (candidateIds.length > 0) {
          const { data: activeLoans } = await state.supabase
            .from('loan_log')
            .select('lender_equipment_id')
            .in('lender_equipment_id', candidateIds)
            .eq('status', 'active');
          const lentIds = new Set((activeLoans || []).map(l => l.lender_equipment_id));
          candidates = (data || []).filter(c => !lentIds.has(c.id));
        }
      } catch (err) {
        toast('Gagal load kandidat: ' + err.message, 'error');
        return;
      }

      const borrowerUnitName = getParentUnitName(borrower.assigned_unit_id);
      const today = new Date().toISOString().slice(0, 10);

      const candidateOpts = candidates.length === 0
        ? '<option value="">-- Tidak ada kandidat (kategori sama, status Aktif, unit lain, tidak sedang dipinjamkan) --</option>'
        : '<option value="">— pilih equipment yang dipinjam —</option>' + candidates.map(c => {
            const note = c.tipe_kepemilikan === 'Mobile-Backup' ? ' [Backup]' : '';
            return `<option value="${c.id}">${escapeHtml(c.tag_number)} — ${escapeHtml(c.nama_equipment)}${note} @ ${escapeHtml(getParentUnitName(c.assigned_unit_id))}</option>`;
          }).join('');

      openModal({
        title: 'Pinjam Equipment Pengganti',
        maxWidth: 'max-w-xl',
        body: `
          <div class="space-y-3">
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm">
              <div class="font-bold text-amber-900 mb-1">Equipment yang butuh pengganti:</div>
              <div class="text-amber-800">
                <span class="font-semibold">${escapeHtml(borrower.tag_number)}</span> — ${escapeHtml(borrower.nama_equipment)}
              </div>
              <div class="text-xs text-amber-700 mt-1">
                Kategori: ${escapeHtml(getCategoryName(borrower.kategori_id))} • Berada di: <span class="font-semibold">${escapeHtml(borrowerUnitName)}</span> • Status: ${escapeHtml(borrower.status_operasi)}
              </div>
            </div>

            <form id="loan-form" class="space-y-3">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Equipment yang Dipinjam *</label>
                <select name="lender_id" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                  ${candidateOpts}
                </select>
                <p class="text-xs text-slate-500 mt-1">${candidates.length} kandidat kategori "${escapeHtml(getCategoryName(borrower.kategori_id))}" — status Aktif & unit berbeda.</p>
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Pinjam *</label>
                <input type="date" name="loan_date" required value="${today}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Alasan / Catatan</label>
                <textarea name="reason" rows="2" placeholder="contoh: ACC-100A rusak segel, perlu pengganti sementara sambil tunggu spare part" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm"></textarea>
              </div>

              <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
                <div class="font-bold mb-1">📋 Yang akan terjadi:</div>
                <ul class="list-disc list-inside space-y-0.5">
                  <li>Equipment yang dipinjam → pindah <b>sementara</b> ke <b>${escapeHtml(borrowerUnitName)}</b></li>
                  <li><b>${escapeHtml(borrower.tag_number)}</b> → status diubah jadi <b>Repair</b> (kalau belum)</li>
                  <li>Entry loan_log dibuat dengan status <b>active</b></li>
                  <li>Nanti tinggal klik <b>↩ Kembalikan Pinjaman</b> untuk balikin equipment ke pemilik</li>
                </ul>
              </div>
            </form>
          </div>
        `,
        footer: `
          <button id="loan-cancel-btn" onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">Batal</button>
          <button id="loan-submit-btn" onclick="submitLoan('${borrowerEquipmentId}')" class="px-4 py-2 rounded-lg bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">🤝 Pinjam Sekarang</button>
        `,
      });
    }
    window.openLoanModal = openLoanModal;

    async function submitLoan(borrowerEquipmentId) {
      const form = document.getElementById('loan-form');
      const submitBtn = document.getElementById('loan-submit-btn');
      const cancelBtn = document.getElementById('loan-cancel-btn');
      const lender_id = form.elements.lender_id.value;
      const loan_date = form.elements.loan_date.value;
      const reason = form.elements.reason.value || null;

      if (!lender_id) { toast('Pilih equipment yang dipinjam dulu.', 'warn'); return; }
      if (!loan_date) { toast('Tanggal pinjam wajib diisi.', 'warn'); return; }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Memproses…'; }
      if (cancelBtn) cancelBtn.disabled = true;

      try {
        await createLoan({
          lender_equipment_id: lender_id,
          borrower_equipment_id: borrowerEquipmentId,
          loan_date, reason,
        });
        toast('Pinjaman berhasil dicatat.', 'success');
        closeModal();
        setEquipmentView('detail', borrowerEquipmentId, 'history');
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '🤝 Pinjam Sekarang'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitLoan = submitLoan;

    async function openReturnLoanModal(loanId) {
      let loan;
      try {
        const { data, error } = await state.supabase.from('loan_log').select('*').eq('id', loanId).single();
        if (error) throw error;
        loan = data;
      } catch (err) {
        toast('Gagal load loan: ' + err.message, 'error');
        return;
      }
      if (loan.status !== 'active') {
        toast('Pinjaman ini sudah dikembalikan.', 'warn');
        return;
      }

      // Fetch info equipment terkait
      const [lenderResp, borrowerResp] = await Promise.all([
        state.supabase.from('equipment').select('id, tag_number, nama_equipment').eq('id', loan.lender_equipment_id).maybeSingle(),
        loan.borrower_equipment_id
          ? state.supabase.from('equipment').select('id, tag_number, nama_equipment, status_operasi').eq('id', loan.borrower_equipment_id).maybeSingle()
          : Promise.resolve({ data: null }),
      ]);
      const lenderEq = lenderResp.data;
      const borrowerEq = borrowerResp.data;
      const today = new Date().toISOString().slice(0, 10);
      const lenderUnitName = getParentUnitName(loan.lender_unit_id);

      openModal({
        title: 'Kembalikan Pinjaman',
        maxWidth: 'max-w-xl',
        body: `
          <div class="space-y-3">
            <div class="bg-green-50 border border-green-200 rounded-lg p-3 text-sm">
              <div class="font-bold text-green-900 mb-1">Detail Pinjaman:</div>
              <div class="text-green-800 text-sm">

                <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Pengembalian *</label>

              </div>

                <label class="block text-sm font-semibold text-slate-700 mb-1">Status ${escapeHtml(borrowerEq.tag_number)} Setelah Dikembalikan</label>
                <select name="borrower_status" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                  <option value="Aktif">Aktif (sudah selesai repair)</option>
                  <option value="Repair" selected>Repair (masih dalam perbaikan)</option>
                  <option value="Down">Down (belum bisa diperbaiki)</option>
                  <option value="Scrap">Scrap (tidak bisa dipakai lagi)</option>
                </select>
                <p class="text-xs text-slate-500 mt-1">Status equipment yang tadinya butuh pengganti — sesuaikan dengan kondisi setelah pinjaman dikembalikan.</p>
              </div>` : ''}

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Catatan Pengembalian</label>
                <textarea name="return_notes" rows="2" placeholder="contoh: Spare part baru sudah dipasang di ACC-100A, equipment pinjaman dikembalikan" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm"></textarea>
              </div>

              <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
                <div class="font-bold mb-1">📋 Yang akan terjadi:</div>
                <ul class="list-disc list-inside space-y-0.5">
                  <li>${lenderEq ? `<b>${escapeHtml(lenderEq.tag_number)}</b>` : 'Equipment yang dipinjam'} → pindah balik ke <b>${escapeHtml(lenderUnitName)}</b></li>
                  ${borrowerEq ? `<li><b>${escapeHtml(borrowerEq.tag_number)}</b> → status sesuai pilihan</li>` : ''}
                  <li>Entry loan_log update jadi status <b>returned</b></li>
                </ul>
              </div>
            </form>
          </div>
