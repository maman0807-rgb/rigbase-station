    function $(sel) { return document.querySelector(sel); }
    function show(el) { (typeof el === 'string' ? $(el) : el).classList.remove('hide'); }
    function hide(el) { (typeof el === 'string' ? $(el) : el).classList.add('hide'); }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    // Untuk JS string literal di dalam HTML attribute (inline onclick).
    // Escape backslash, quote, & line break supaya tidak break JS / atribut.
    function escapeAttr(s) {
      if (s == null) return '';
      return String(s)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '&quot;')
        .replace(/\r?\n/g, '\\n')
        .replace(/</g, '&lt;');
    }

    function fmtCurrency(n) {
      if (n == null || n === '') return '—';
      return 'Rp ' + Number(n).toLocaleString('id-ID');
    }
    function fmtNumber(n, suffix = '') {
      if (n == null || n === '') return '—';
      return Number(n).toLocaleString('id-ID') + suffix;

      if (!date) return null;
      return Math.floor((new Date(date).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);

      const el = document.createElement('div');

    function openModal({ title, body, footer, maxWidth = 'max-w-lg', dismissable = true }) {
      closeModal();
      const overlay = document.createElement('div');
      overlay.id = 'modal-overlay';
      overlay.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 overflow-y-auto';
      overlay.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl w-full ${maxWidth} my-8 max-h-[90vh] flex flex-col">
          <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
            <h3 class="text-lg font-bold text-slate-900">${escapeHtml(title || '')}</h3>
            <button onclick="closeModal()" class="p-1 hover:bg-slate-100 rounded text-slate-500" aria-label="Tutup">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div id="modal-body" class="p-5 overflow-y-auto flex-1"></div>
          ${footer ? `<div class="px-5 py-3 border-t border-slate-200 flex justify-end gap-2 flex-shrink-0 flex-wrap">${footer}</div>` : ''}
        </div>
      `;
      const bodyHost = overlay.querySelector('#modal-body');
      if (body instanceof HTMLElement) bodyHost.appendChild(body);
      else bodyHost.innerHTML = body || '';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay && dismissable) closeModal(); });
    }
    function closeModal() {
      const m = document.getElementById('modal-overlay');
      if (m) m.remove();

        openModal({

          footer: `
            <button onclick="closeModal(); window['${id}'](false);" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-sm font-medium">${escapeHtml(cancelText)}</button>

    // Auto-generate inspection_code: SIKLUS-YYYY-NNN
    async function generateInspectionCode(year) {
      const { data, error } = await state.supabase
        .from('inspections')
        .select('inspection_code')
        .like('inspection_code', `SIKLUS-${year}-%`);
      if (error) throw error;
      const codes = (data || []).map(r => r.inspection_code);
      const maxNum = codes.reduce((max, c) => {
        const m = c.match(/^SIKLUS-\d{4}-(\d+)$/);
        if (!m) return max;
        const n = parseInt(m[1], 10);
        return n > max ? n : max;
      }, 0);
      const next = String(maxNum + 1).padStart(3, '0');
      return `SIKLUS-${year}-${next}`;
    }

    async function createLoan({ lender_equipment_id, borrower_equipment_id, loan_date, reason }) {
      // Fetch fresh data
      const { data: lender, error: el } = await state.supabase.from('equipment')
        .select('id, tag_number, assigned_unit_id, status_operasi').eq('id', lender_equipment_id).single();
      if (el) throw el;
      const { data: borrower, error: eb } = await state.supabase.from('equipment')
        .select('id, tag_number, assigned_unit_id, status_operasi').eq('id', borrower_equipment_id).single();
      if (eb) throw eb;

      const lender_unit_id   = lender.assigned_unit_id;
      const borrower_unit_id = borrower.assigned_unit_id;
      if (!lender_unit_id)   throw new Error('Equipment yang dipinjam belum punya unit.');
      if (!borrower_unit_id) throw new Error('Equipment yang rusak belum punya unit.');
      if (lender_unit_id === borrower_unit_id) throw new Error('Lender dan borrower di unit yang sama — gak masuk akal "dipinjam".');

      // 1. Insert loan_log
      const { data: loan, error: e1 } = await state.supabase.from('loan_log').insert({
        lender_equipment_id, borrower_equipment_id,
        lender_unit_id, borrower_unit_id,
        loan_date, reason,
        status: 'active',
        created_by: state.user.id,
      }).select().single();
      if (e1) throw e1;

      // 2. Pindah lender equipment ke borrower unit
      const { error: e2 } = await state.supabase.from('equipment').update({
        assigned_unit_id: borrower_unit_id,
        updated_by: state.user.id,
      }).eq('id', lender_equipment_id);
      if (e2) throw e2;

      // 3. Set borrower equipment status ke Repair (kalau belum Down/Repair)
      if (borrower.status_operasi !== 'Down' && borrower.status_operasi !== 'Repair') {
        const { error: e3 } = await state.supabase.from('equipment').update({
          status_operasi: 'Repair',
          updated_by: state.user.id,
        }).eq('id', borrower_equipment_id);
        if (e3) throw e3;
      }

      return loan;
    }

    async function returnLoan({ loan_id, return_date, borrower_new_status, return_notes }) {
      // Fetch loan fresh
      const { data: loan, error: e0 } = await state.supabase.from('loan_log').select('*').eq('id', loan_id).single();
      if (e0) throw e0;
      if (loan.status !== 'active') throw new Error('Pinjaman ini sudah dikembalikan sebelumnya.');

      // 1. Update loan_log → returned
      const { error: e1 } = await state.supabase.from('loan_log').update({
        status: 'returned', return_date, return_notes,
        returned_by: state.user.id,
      }).eq('id', loan_id);
      if (e1) throw e1;

      // 2. Pindah lender equipment balik ke unit asal
      const { error: e2 } = await state.supabase.from('equipment').update({
        assigned_unit_id: loan.lender_unit_id,
        updated_by: state.user.id,
      }).eq('id', loan.lender_equipment_id);
      if (e2) throw e2;

      // 3. Update borrower equipment status sesuai pilihan user
      if (loan.borrower_equipment_id && borrower_new_status) {
        const { error: e3 } = await state.supabase.from('equipment').update({
          status_operasi: borrower_new_status,
          updated_by: state.user.id,
        }).eq('id', loan.borrower_equipment_id);
        if (e3) throw e3;
      }
    }

    async function fetchChildren(equipmentId) {

        .from('equipment')
        .select('id, tag_number, nama_equipment, kategori_id, status_operasi, kondisi_fisik')

    async function fetchPotentialParents(parentUnitId, excludeId) {
      // Cari semua equipment di unit yang sama, kecuali diri sendiri
      // (untuk dropdown 'Parent Equipment' di form)
      if (!parentUnitId) return [];
      let q = state.supabase
        .from('equipment')
        .select('id, tag_number, nama_equipment, kategori_id')
        .eq('assigned_unit_id', parentUnitId)
        .order('tag_number');
      if (excludeId) q = q.neq('id', excludeId);
      const { data, error } = await q;
      if (error) throw error;
      return data || [];
    }

    async function populateParentEquipmentDropdown(parentUnitId, currentValue, excludeId) {
      const sel = document.querySelector('#eq-form select[name="parent_equipment_id"]');
      if (!sel) return;
      sel.innerHTML = '<option value="">— memuat… —</option>';
      try {
        const list = await fetchPotentialParents(parentUnitId, excludeId);
        sel.innerHTML = '<option value="">— tidak ada parent (top-level) —</option>' +
          list.map(e => `<option value="${e.id}" ${currentValue === e.id ? 'selected' : ''}>${escapeHtml(e.tag_number)} — ${escapeHtml(e.nama_equipment)} (${escapeHtml(getCategoryName(e.kategori_id))})</option>`).join('');
      } catch (err) {
        sel.innerHTML = '<option value="">(gagal load: ' + escapeHtml(err.message) + ')</option>';
      }
    }
    window.populateParentEquipmentDropdown = populateParentEquipmentDropdown;

    // Populate kategori dropdown berdasarkan tipe parent_unit (Rig / Standalone).
    // - currentValue: kalau editing, preserve nilai yang sudah ada walaupun gak match filter.
    function populateCategoryDropdown(parentUnitId, currentValue) {
      const sel = document.querySelector('#eq-form select[name="kategori_id"]');
      if (!sel) return;
      const unit = state.parentUnits.find(u => u.id === Number(parentUnitId));
      if (!unit) {
        sel.innerHTML = '<option value="">— pilih Parent Unit dulu —</option>';
        return;
      }
      // Filter: kategori dengan parent_unit_type matching unit.type, atau 'Both'
      const matching = state.categories.filter(c =>
        c.parent_unit_type === unit.type || c.parent_unit_type === 'Both'
      );
      // Kalau ada currentValue yang TIDAK match filter, tetap include sebagai legacy
      let extra = [];
      if (currentValue && !matching.find(c => c.id == currentValue)) {
        const legacy = state.categories.find(c => c.id == currentValue);
        if (legacy) extra.push(legacy);
      }
      const all = [...matching, ...extra];
      sel.innerHTML = '<option value="">— pilih kategori —</option>' +
        all.map(c => {
          const isLegacy = extra.includes(c);
          const note = isLegacy ? ` ⚠ legacy (${c.parent_unit_type})` : '';
          return `<option value="${c.id}" ${currentValue == c.id ? 'selected' : ''}>${escapeHtml(c.name)}${note}</option>`;
        }).join('');
      // Tampilkan note kalau ada legacy
      const noteEl = sel.parentElement.querySelector('.text-xs.text-slate-500');
      if (noteEl) {
        noteEl.textContent = `${matching.length} kategori cocok untuk unit type "${unit.type}"${extra.length ? ' (+ 1 legacy)' : ''}.`;
      }
    }
    window.populateCategoryDropdown = populateCategoryDropdown;

    async function checkSession() {
      const { data: { session } } = await state.supabase.auth.getSession();
      if (session?.user) {
        await loadProfile(session.user);
        await loadReferenceData().catch(err => console.warn('Ref data load failed:', err.message));
        showApp();

        showLogin();
      }

    async function loadProfile(user) {
      state.user = user;
      const { data, error } = await state.supabase
        .from('profiles')
        .select('id, email, full_name, role, telegram_user_id')
        .eq('id', user.id)
        .single();
      if (error) {
        console.warn('Profile not found, fallback to user data:', error.message);
        state.profile = { id: user.id, email: user.email, full_name: user.email, role: 'user' };
      } else {
        state.profile = data;
      }
    }

    async function login(email, password) {
      const btn = $('#login-btn');
      const label = $('#login-btn-label');
      const spinner = $('#login-btn-spinner');
      const errorBox = $('#login-error');

      hide(errorBox);
      btn.disabled = true;
      label.textContent = 'Memproses…';
      show(spinner);

      try {
        // Dual-mode: kalau input tidak ada '@', perlakukan sebagai ID Karyawan + PIN
        // (samakan dengan skema Logbook: ID@logbook.app + PIN@HHE).
        let loginEmail = email, loginPass = password;
        if (!email.includes('@')) {
          loginEmail = (email + '@logbook.app').toLowerCase();
          if (/^\d{4}$/.test(password)) loginPass = password + '@HHE';
        }
        const { data, error } = await state.supabase.auth.signInWithPassword({ email: loginEmail, password: loginPass });
        if (error) throw error;
        await loadProfile(data.user);
        await loadReferenceData().catch(err => console.warn('Ref data load failed:', err.message));
        showApp();
        toast(`Selamat datang, ${state.profile.full_name || state.profile.email}`, 'success');
      } catch (err) {
        errorBox.textContent = err.message === 'Invalid login credentials'
          ? 'ID/Email atau PIN/password salah.'
          : `Gagal login: ${err.message}`;
        show(errorBox);
      } finally {
        btn.disabled = false;
        label.textContent = 'Masuk';
        hide(spinner);
      }
    }

      return ['sr_mekanik','spv','sr_spv','astmen','admin'].includes(state.profile?.role);
    }

    function visibleNavItems() {
      return NAV_ITEMS.filter(item =>
        (!item.adminOnly || state.profile?.role === 'admin') &&
        (!item.srOnly || isSrMekanikOrAbove())
      );
    }

    function renderSidebar() {
      const nav = $('#sidebar-nav');
      nav.innerHTML = '';
      visibleNavItems().forEach(item => {
        const btn = document.createElement('button');
        btn.className = `w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-navy-700 transition text-left ${state.currentPage === item.id ? 'nav-active' : ''}`;
        btn.innerHTML = `<span class="text-lg">${item.icon}</span><span>${item.label}</span>`;
        btn.onclick = () => navigate(item.id);
        nav.appendChild(btn);
      });
    }

    function renderBottomNav() {
      const nav = $('#bottom-nav');
      nav.innerHTML = '';
      visibleNavItems().filter(i => i.bottomNav).forEach(item => {
        const btn = document.createElement('button');
        btn.className = `flex-1 flex flex-col items-center justify-center py-2 text-xs ${state.currentPage === item.id ? 'bottom-nav-active' : 'text-slate-500'}`;
        btn.innerHTML = `<span class="text-xl leading-none">${item.icon}</span><span class="mt-0.5">${item.label}</span>`;
        btn.onclick = () => navigate(item.id);
        nav.appendChild(btn);
      });
    }

    // ============================================================
    // 9. ROUTER & PAGE RENDERERS (stub — diisi di Fase 3+)
    // ============================================================
    function navigate(pageId) {
      const item = NAV_ITEMS.find(i => i.id === pageId);
      if (!item) return;
      if (item.adminOnly && state.profile?.role !== 'admin') {
        toast('Halaman ini hanya untuk admin.', 'warn');
        return;
      }
      if (item.srOnly && !isSrMekanikOrAbove()) {
        toast('Halaman ini khusus Sr Mekanik ke atas.', 'warn');
        return;
      }
      state.currentPage = pageId;
      $('#page-title').textContent = item.label;
      renderSidebar();
      renderBottomNav();
      const main = $('#main-content');
      main.innerHTML = '';
      const page = PAGES[pageId] ? PAGES[pageId]() : placeholderPage(item);
      main.appendChild(page);
    }
    window.navigate = navigate;

      const div = document.createElement('div');
      div.className = 'page max-w-3xl mx-auto bg-white rounded-xl border border-slate-200 p-8 text-center';
      div.innerHTML = `

        <h3 class="text-xl font-bold text-slate-800 mb-2">${item.label}</h3>
        <p class="text-slate-500 text-sm">${escapeHtml(msg)}</p>

    async function submitCategory(id) {
      const form = document.getElementById('cat-form');
      const submitBtn = document.getElementById('cat-submit-btn');
      const cancelBtn = document.getElementById('cat-cancel-btn');
      const name = form.elements.name.value.trim();
      const parent_unit_type = form.elements.parent_unit_type.value;
      if (!name) { toast('Nama kategori wajib diisi.', 'warn'); return; }
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Memproses…'; }
      if (cancelBtn) cancelBtn.disabled = true;
      try {
        if (id) {
          const { error } = await state.supabase.from('categories').update({ name, parent_unit_type }).eq('id', id);
          if (error) throw error;
          logActivity('category_updated', 'category', id, name, { parent_unit_type });
          toast('Kategori berhasil di-update.', 'success');
        } else {
          const { error } = await state.supabase.from('categories').insert({ name, parent_unit_type });
          if (error) throw error;
          logActivity('category_created', 'category', null, name, { parent_unit_type });
          toast('Kategori baru dibuat.', 'success');
        }
        closeModal();
        reloadCategoriesList();
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = id ? '💾 Simpan' : '+ Tambah'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitCategory = submitCategory;

    async function confirmDeleteCategory(id, name, usageCount) {
      if (usageCount > 0) {
        toast(`Tidak bisa hapus — ada ${usageCount} equipment yang pakai kategori ini. Hapus/pindah dulu equipment-nya.`, 'warn');
        return;
      }
      const ok = await confirmDialog({
        title: 'Hapus Kategori?',
        message: `Yakin mau hapus kategori "${name}"? Aksi tidak bisa di-undo.`,
        confirmText: 'Hapus',
        danger: true,
      });
      if (!ok) return;
      try {
        const { error } = await state.supabase.from('categories').delete().eq('id', id);
        if (error) throw error;
        logActivity('category_deleted', 'category', id, name);
        toast('Kategori dihapus.', 'success');
        reloadCategoriesList();
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    }
    window.confirmDeleteCategory = confirmDeleteCategory;

    async function exportEquipmentToExcel() {
      try {
        toast('Menyiapkan data export…', 'info');
        // Ambil data lengkap (43 field) berdasarkan filter saat ini
        let q = state.supabase.from('equipment').select('*');
        const f = state.equipmentFilters;
        if (f.parent_unit_id) q = q.eq('assigned_unit_id', Number(f.parent_unit_id));
        if (f.kategori_id)    q = q.eq('kategori_id',      Number(f.kategori_id));
        if (f.status_operasi) q = q.eq('status_operasi',   f.status_operasi);
        if (f.tipe_kepemilikan) q = q.eq('tipe_kepemilikan', f.tipe_kepemilikan);
        const s = (state.equipmentSearch || '').trim();
        if (s) q = q.or(`tag_number.ilike.%${s}%,nama_equipment.ilike.%${s}%,serial_number.ilike.%${s}%`);
        q = q.order('tag_number');
        const { data, error } = await q;
        if (error) throw error;
        if (!data || data.length === 0) {
          toast('Tidak ada data untuk di-export.', 'warn');
          return;
        }

        // Transform data: ganti ID → nama (kategori, parent_unit, parent_equipment)
        const rows = data.map(eq => ({
          'Tag Number': eq.tag_number,
          'Nama Equipment': eq.nama_equipment,
          'Kategori': getCategoryName(eq.kategori_id),
          'Parent Unit': getParentUnitName(eq.assigned_unit_id),
          'Tipe Kepemilikan': eq.tipe_kepemilikan,
          'Brand': eq.brand,
          'Model': eq.model,
          'Serial Number': eq.serial_number,
          'Tahun Pembuatan': eq.tahun_pembuatan,
          'Tahun Commissioning': eq.tahun_commissioning,
          'Year Used': eq.year_used,
          'Country of Origin': eq.country_of_origin,
          'Spek Khusus': eq.spek_khusus,
          'Status Operasi': eq.status_operasi,
          'Kondisi Fisik': eq.kondisi_fisik,
          'Lokasi Fisik': eq.lokasi_fisik,
          'Running Hours': eq.running_hours,
          'Last Maintenance Date': eq.last_maintenance_date,
          'Last Maintenance Type': eq.last_maintenance_type,
          'Next Maintenance Date': eq.next_maintenance_date,
          'Maintenance Interval': eq.maintenance_interval,
          'PIC Mechanic': eq.pic_mechanic,
          'GOH Year': eq.goh_year,
          'Nomor SKPI': eq.nomor_skpi,
          'SKPI Start Date': eq.skpi_start_date,
          'SKPI End Date': eq.skpi_end_date,
          'COC Number': eq.coc_number,
          'ARF / Lembaga': eq.arf_lembaga,
          'Refurbish Year': eq.refurbish_year,
          'Refurbish By': eq.refurbish_by,
          'Load Test Result': eq.load_test_result,
          'Nomor Sertifikat Lain': eq.nomor_sertifikat_lain,
          'Tgl Terbit Sertifikat': eq.tgl_terbit_sertifikat,
          'Tgl Expired Sertifikat': eq.tgl_expired_sertifikat,
          'Lembaga Penerbit': eq.lembaga_penerbit,
          'Tgl Pembelian': eq.tgl_pembelian,
          'Harga Perolehan': eq.harga_perolehan,
          'Nomor PO/Invoice': eq.nomor_po_invoice,
          'Vendor/Supplier': eq.vendor_supplier,
          'Cost Center': eq.cost_center,
          'Pressure Test Date': eq.pressure_test_date,
          'Pressure Test Result': eq.pressure_test_result,
          'Remarks': eq.remarks,
        }));

        // Bikin workbook
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(rows);
        // Set lebar kolom auto (paling tidak ada lebar minimum)
        const colWidths = Object.keys(rows[0]).map(key => {
          const maxLen = Math.max(
            key.length,
            ...rows.map(r => String(r[key] || '').length)
          );
          return { wch: Math.min(Math.max(maxLen + 2, 12), 50) };
        });
        ws['!cols'] = colWidths;
        XLSX.utils.book_append_sheet(wb, ws, 'Equipment');

        // Bikin metadata sheet
        const meta = [
          ['Export dari Rigbase Station'],
          ['Tanggal Export', new Date().toLocaleString('id-ID')],
          ['Total Records', rows.length],
          [],
          ['Filter Aktif:'],
          ['Parent Unit', state.equipmentFilters.parent_unit_id ? getParentUnitName(Number(state.equipmentFilters.parent_unit_id)) : '(semua)'],
          ['Kategori', state.equipmentFilters.kategori_id ? getCategoryName(Number(state.equipmentFilters.kategori_id)) : '(semua)'],
          ['Status Operasi', state.equipmentFilters.status_operasi || '(semua)'],
          ['Tipe Kepemilikan', state.equipmentFilters.tipe_kepemilikan || '(semua)'],
          ['Search', state.equipmentSearch || '(kosong)'],
        ];
        const wsMeta = XLSX.utils.aoa_to_sheet(meta);
        wsMeta['!cols'] = [{ wch: 25 }, { wch: 30 }];
        XLSX.utils.book_append_sheet(wb, wsMeta, 'Info');

        // Generate filename
        const ts = new Date().toISOString().slice(0, 16).replace(/[:\-T]/g, '');
        const filename = `rigbase_equipment_${ts}.xlsx`;
        XLSX.writeFile(wb, filename);
        toast(`✅ ${rows.length} equipment ter-export ke ${filename}`, 'success');
      } catch (err) {
        toast('Gagal export: ' + err.message, 'error');
      }
    }

    async function submitCreateUser() {
      const form = document.getElementById('new-user-form');
      const submitBtn = document.getElementById('new-user-submit-btn');
      const cancelBtn = document.getElementById('new-user-cancel-btn');
      const errBox = document.getElementById('new-user-error');
      hide(errBox);

      const payload = {
        email: form.elements.email.value.trim(),
        password: form.elements.password.value,
        full_name: form.elements.full_name.value.trim() || null,
        role: form.elements.role.value,
        telegram_user_id: form.elements.telegram_user_id.value.trim() || null,
      };

      if (!payload.email || !payload.password) { errBox.textContent = 'Email & password wajib.'; show(errBox); return; }
      if (payload.password.length < 6) { errBox.textContent = 'Password minimal 6 karakter.'; show(errBox); return; }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Membuat…'; }
      if (cancelBtn) cancelBtn.disabled = true;

      try {
        const { data, error } = await state.supabase.functions.invoke('create-user', { body: payload });
        if (error) throw error;
        if (data && !data.ok) throw new Error(data.error || 'Unknown error');

        toast(`✅ User ${payload.email} berhasil dibuat sebagai ${payload.role}.`, 'success');
        logActivity('user_created', 'user', data?.user_id, payload.email, { role: payload.role });
        sendTelegramAlert(
          `➕ <b>User Baru</b>\n` +
          `Email: <b>${payload.email}</b>\n` +
          `Role: <b>${payload.role}</b>\n` +
          (payload.full_name ? `Nama: ${payload.full_name}\n` : '') +
          `👤 Dibuat oleh ${state.profile.full_name || state.profile.email}`
        );
        closeModal();
        reloadUsersList();
      } catch (err) {
        errBox.textContent = 'Gagal: ' + (err.message || err);
        show(errBox);
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '+ Buat User'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }

              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>

              <input type="file" accept=".xlsx,.xls" class="hidden" onchange="handleInspectionExcelUpload(event)" />
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
              <span class="hidden md:inline">Upload Excel</span>

      // Load KPI + list
      (async () => {
        try {
          const stats = await fetchInspectionStats();
          $('#insp-kpi').innerHTML = `
            ${statCard('Rig Diinspeksi', fmtNumber(stats.total_rigs_inspected), '🏭', 'bg-blue-100 text-blue-700')}
            ${statCard('Siklus Aktif',   fmtNumber(stats.active_cycles),        '🔄', 'bg-amber-100 text-amber-700')}
            ${statCard('Critical Open',  fmtNumber(stats.critical_open),        '🚨', 'bg-red-100 text-red-700')}
            ${statCard('Total Open',     fmtNumber(stats.total_open),           '📋', 'bg-orange-100 text-orange-700')}
          `;
        } catch (err) {
          toast('Gagal load KPI: ' + err.message, 'error');
        }
      })();

      setTimeout(() => {
        // Populate dropdown tahun dari data actual
        (async () => {
          const years = await fetchInspectionYears();
          const sel = $('#insp-tahun');
          if (sel && years.length > 0) {
            years.forEach(y => {
              const opt = document.createElement('option');
              opt.value = y;
              opt.textContent = y;
              if (state.inspectionFilters.tahun == y) opt.selected = true;
              sel.appendChild(opt);
            });
          }
        })();

        $('#insp-search').addEventListener('input', debounce(e => { state.inspectionFilters.search = e.target.value; reloadInspectionList(); }, 350));
        $('#insp-tahun').onchange    = e => { state.inspectionFilters.tahun = e.target.value; reloadInspectionList(); };
        $('#insp-kategori').onchange = e => { state.inspectionFilters.kategori = e.target.value; reloadInspectionList(); };
        $('#insp-rig').onchange      = e => { state.inspectionFilters.parent_unit_id = e.target.value; reloadInspectionList(); };
        $('#insp-status').onchange   = e => { state.inspectionFilters.status = e.target.value; reloadInspectionList(); };
      }, 0);

      reloadInspectionList();
      return div;
    }

    async function reloadInspectionList() {
      const c = document.getElementById('insp-list-container');
      if (!c) return;
      // Skeleton loader (lebih informatif daripada "Memuat...")
      c.innerHTML = `
        <div class="space-y-2">
          ${[1,2,3].map(() => `
            <div class="bg-white border border-slate-200 rounded-xl p-4 animate-pulse">
              <div class="h-5 bg-slate-200 rounded w-1/3 mb-2"></div>
              <div class="h-4 bg-slate-100 rounded w-1/2 mb-2"></div>
              <div class="h-3 bg-slate-100 rounded w-2/3"></div>
            </div>
          `).join('')}
        </div>
      `;
      try {
        const list = await fetchInspectionsList();
        if (list.length === 0) {
          c.innerHTML = '<div class="bg-white rounded-xl border border-slate-200 p-8 text-center text-slate-500">Belum ada siklus inspeksi yang cocok dengan filter.</div>';
          return;
        }
        // OPTIMIZED: 1 query untuk semua counts (bukan N+1)
        const inspIds = list.map(i => i.id);
        const { data: allFindings } = await state.supabase
          .from('inspection_findings')
          .select('inspection_id, status, category')
          .in('inspection_id', inspIds);
        // Group counts per siklus
        const countsMap = {};
        inspIds.forEach(id => countsMap[id] = { total: 0, open: 0, critical_open: 0, major_open: 0 });
        (allFindings || []).forEach(f => {
          const cnt = countsMap[f.inspection_id];
          if (!cnt) return;
          cnt.total++;
          if (f.status === 'Open') {
            cnt.open++;
            if (f.category === 'Critical') cnt.critical_open++;
            else if (f.category === 'Major') cnt.major_open++;
          }
        });
        const counts = list.map(i => countsMap[i.id]);
        c.innerHTML = list.map((i, idx) => {
          const cnt = counts[idx];
          const katBadge = i.kategori_inspeksi === 'Cat 4'
            ? '<span class="px-2 py-0.5 bg-purple-100 text-purple-800 text-xs font-semibold rounded">Cat 4</span>'
            : '<span class="px-2 py-0.5 bg-indigo-100 text-indigo-800 text-xs font-semibold rounded">Cat 3</span>';
          const progressBar = `
            <div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
              <div class="bg-safety h-1.5" style="width:${i.progress_akumulatif || 0}%"></div>
            </div>`;
          const alerts = [];
          if (cnt.critical_open > 0) alerts.push(`<span class="text-red-700 font-bold">🚨 ${cnt.critical_open} Critical Open</span>`);
          if (cnt.major_open > 0) alerts.push(`<span class="text-amber-700 font-semibold">⚠ ${cnt.major_open} Major Open</span>`);
          return `
            <button onclick="setInspectionView('detail', '${i.id}')" class="block w-full bg-white border border-slate-200 rounded-xl p-4 text-left hover:shadow-md hover:border-navy transition">
              <div class="flex items-start justify-between gap-3 flex-wrap mb-2">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap mb-1">
                    <span class="font-bold text-navy text-base">${escapeHtml(i.inspection_code)}</span>
                    ${katBadge}
                    ${inspectionStatusBadge(i.status)}
                  </div>
                  <div class="text-sm font-semibold text-slate-800">🏭 ${escapeHtml(i.parent_unit?.name || '—')}</div>
                  <div class="text-xs text-slate-500 mt-0.5">
                    ${escapeHtml(i.pi_company)} • Inspector: ${escapeHtml(i.rig_inspector)}
                  </div>
                  <div class="text-xs text-slate-500">
                    ${fmtDate(i.start_date)}${i.end_date ? ' → ' + fmtDate(i.end_date) : ' → on progress'}
                  </div>
                </div>
                <div class="text-right flex-shrink-0">
                  <div class="text-2xl font-bold text-slate-900">${cnt.total}</div>
                  <div class="text-xs text-slate-500">temuan</div>
                </div>
              </div>
              ${alerts.length > 0 ? `<div class="flex gap-3 text-xs mb-2 flex-wrap">${alerts.join(' • ')}</div>` : ''}
              <div class="flex items-center gap-2 text-xs text-slate-500">
                <span class="font-semibold">${i.progress_akumulatif || 0}%</span>
                <div class="flex-1">${progressBar}</div>
              </div>
            </button>
          `;
        }).join('');
      } catch (err) {
        c.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 text-sm">Gagal load: ${escapeHtml(err.message)}</div>`;
      }
    }
    window.reloadInspectionList = reloadInspectionList;

    function renderInspectionDetail() {
      const div = document.createElement('div');
      div.className = 'page space-y-4';
      div.innerHTML = '<div class="text-slate-400 text-sm">Memuat detail siklus…</div>';

      Promise.all([
        fetchInspection(state.currentInspectionId),
        fetchFindingsByInspection(state.currentInspectionId),
      ]).then(([insp, findings]) => {
        window.__currentInspection = insp;
        window.__currentFindings = findings;
        const counts = {
          total: findings.length,
          critical_open: findings.filter(f => f.status === 'Open' && f.category === 'Critical').length,
          major_open:    findings.filter(f => f.status === 'Open' && f.category === 'Major').length,
          minor_open:    findings.filter(f => f.status === 'Open' && f.category === 'Minor').length,
          na_open:       findings.filter(f => f.status === 'Open' && f.category === 'N/A').length,
          closed: findings.filter(f => f.status === 'Closed').length,
        };
        const katBadge = insp.kategori_inspeksi === 'Cat 4'
          ? '<span class="px-2 py-0.5 bg-purple-100 text-purple-800 text-xs font-semibold rounded">Cat 4</span>'
          : '<span class="px-2 py-0.5 bg-indigo-100 text-indigo-800 text-xs font-semibold rounded">Cat 3</span>';

        div.innerHTML = `
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <button onclick="setInspectionView('list')" class="text-sm text-navy hover:underline mb-2 inline-flex items-center gap-1">← Kembali ke daftar</button>
            <div class="flex items-start justify-between gap-3 flex-wrap">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <h2 class="text-2xl font-bold text-slate-900">${escapeHtml(insp.inspection_code)}</h2>
                  ${katBadge}
                  ${inspectionStatusBadge(insp.status)}
                </div>
                <div class="flex gap-2 flex-wrap mt-2 mb-1">
                  <button onclick='openInspectionFormModal(${JSON.stringify(insp).replace(/'/g, "&apos;")})' class="px-3 py-1.5 rounded-lg bg-navy hover:bg-navy-700 text-white text-xs font-semibold">✏ Edit Siklus</button>
                  ${state.profile.role === 'admin' ? `<button onclick="confirmDeleteInspection('${insp.id}', '${escapeHtml(insp.inspection_code)}')" class="px-3 py-1.5 rounded-lg bg-red-100 hover:bg-red-200 text-red-700 text-xs font-semibold">🗑 Hapus Siklus</button>` : ''}
                </div>
                <p class="text-base text-slate-700 mt-1">🏭 ${escapeHtml(insp.parent_unit?.name || '—')} (${escapeHtml(insp.parent_unit?.type || '—')})</p>
                <div class="mt-2 grid grid-cols-1 md:grid-cols-3 gap-x-4 gap-y-1 text-sm">
                  <div><span class="text-slate-500">PI:</span> <span class="font-semibold">${escapeHtml(insp.pi_company)}</span></div>
                  <div><span class="text-slate-500">Inspector:</span> <span class="font-semibold">${escapeHtml(insp.rig_inspector)}</span></div>
                  <div><span class="text-slate-500">Periode:</span> <span class="font-semibold">${fmtDate(insp.start_date)}${insp.end_date ? ' → ' + fmtDate(insp.end_date) : ' → on progress'}</span></div>
                  ${insp.client ? `<div><span class="text-slate-500">Client:</span> ${escapeHtml(insp.client)}</div>` : ''}
                  ${insp.service ? `<div><span class="text-slate-500">Service:</span> ${escapeHtml(insp.service)}</div>` : ''}
                  ${insp.place_of_inspection ? `<div><span class="text-slate-500">Lokasi:</span> ${escapeHtml(insp.place_of_inspection)}</div>` : ''}
                </div>
                <div class="mt-3">
                  <div class="flex items-center gap-2 text-sm mb-1">
                    <span class="font-semibold text-slate-700">Progress:</span>
                    <span class="font-bold text-navy">${insp.progress_akumulatif || 0}%</span>
                  </div>
                  <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                    <div class="bg-safety h-2.5 transition-all" style="width:${insp.progress_akumulatif || 0}%"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="mt-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 text-center text-xs">
              <div class="bg-slate-100 rounded p-2"><div class="font-bold text-lg text-slate-900">${counts.total}</div><div class="text-slate-600">Total Temuan</div></div>
              <div class="bg-red-50 rounded p-2"><div class="font-bold text-lg text-red-700">${counts.critical_open}</div><div class="text-red-700">🚨 Critical Open</div></div>
              <div class="bg-amber-50 rounded p-2"><div class="font-bold text-lg text-amber-700">${counts.major_open}</div><div class="text-amber-700">⚠ Major Open</div></div>
              <div class="bg-yellow-50 rounded p-2"><div class="font-bold text-lg text-yellow-700">${counts.minor_open}</div><div class="text-yellow-700">⚡ Minor Open</div></div>
              <div class="bg-slate-50 rounded p-2 border border-slate-200"><div class="font-bold text-lg text-slate-700">${counts.na_open}</div><div class="text-slate-600">N/A Open</div></div>
              <div class="bg-green-50 rounded p-2"><div class="font-bold text-lg text-green-700">${counts.closed}</div><div class="text-green-700">✓ Closed</div></div>
            </div>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="flex border-b border-slate-200 overflow-x-auto">
              ${[
                ['temuan', `📋 Temuan (${counts.total})`],
                ['pdf', '📄 PDF Harian'],
                ['catatan', '📝 Catatan'],
              ].map(([id, lbl]) => `
                <button onclick="setInspectionView('detail', '${insp.id}', '${id}')"
                  class="px-4 py-3 text-sm font-medium whitespace-nowrap ${state.inspectionDetailTab===id ? 'border-b-2 border-safety text-safety bg-safety/5' : 'text-slate-600 hover:text-navy'}">
                  ${lbl}
                </button>
              `).join('')}

            <div id="insp-tab-content" class="p-5"></div>
          </div>
        `;
        renderInspectionTabContent(insp, findings);
      }).catch(err => {
        div.innerHTML = `<div class="bg-red-50 border border-red-200 p-4 rounded-lg text-red-700 text-sm">Gagal load: ${escapeHtml(err.message)}</div>`;
      });

      return div;
    }

    function renderInspectionTabContent(insp, findings) {
      const c = document.getElementById('insp-tab-content');
      if (!c) return;
      switch (state.inspectionDetailTab) {
        case 'temuan':  c.innerHTML = renderTemuanList(findings); break;
        case 'pdf':     renderPdfHarianTab(insp); break;
        case 'catatan': c.innerHTML = `<div class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml(insp.catatan || '(tidak ada catatan)')}</div>`; break;
      }
    }

    // ============================================================
    // TAB: PDF HARIAN
    // ============================================================
    function renderPdfHarianTab(insp) {
      const c = document.getElementById('insp-tab-content');
      if (!c) return;
      const isAdmin = state.profile.role === 'admin';

      c.innerHTML = `
        <div class="bg-slate-50 border border-slate-200 rounded-lg p-3 mb-3 flex flex-wrap items-center gap-2">
          <div class="text-xs text-slate-600">
            Bucket: <code class="bg-white border border-slate-200 px-1.5 py-0.5 rounded">inspection-pdfs</code> (private, signed URL 1 jam).
            Format file: <code class="bg-white border border-slate-200 px-1.5 py-0.5 rounded">H{hari}_YYYY-MM-DD.pdf</code>
          </div>
          <div class="flex-1"></div>
          <button onclick="openUploadPdfModal('${insp.id}')" class="bg-safety hover:bg-safety-700 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Upload PDF Harian
          </button>
        </div>
        <div id="pdf-harian-list" class="text-center py-6 text-slate-400 text-sm">Memuat daftar PDF…</div>
      `;

      listInspectionPdfs(insp.id).then(files => {
        const host = document.getElementById('pdf-harian-list');
        if (!host) return;

        if (files.length === 0) {
          host.outerHTML = `<div id="pdf-harian-list" class="text-center py-8 text-slate-400 text-sm bg-slate-50 rounded-lg border border-dashed border-slate-300">Belum ada PDF laporan harian. Klik <b>Upload PDF Harian</b> di atas.</div>`;
          return;
        }

        // Sort by parsed day asc; fallback ke nama
        const enriched = files.map(f => ({ ...f, parsed: parsePdfFilename(f.name) }));
        enriched.sort((a, b) => {
          if (a.parsed && b.parsed) return a.parsed.day - b.parsed.day;
          return a.name.localeCompare(b.name);
        });

        host.outerHTML = `<div id="pdf-harian-list" class="space-y-2">
          ${enriched.map(f => {
            const dayLabel = f.parsed ? `H${f.parsed.day}` : '?';
            const dateLabel = f.parsed ? fmtDate(f.parsed.date) : '—';
            const size = formatBytes(f.metadata?.size);
            const uploadedAt = f.created_at ? new Date(f.created_at).toLocaleString('id-ID') : '—';
            return `
              <div class="bg-white border border-slate-200 rounded-lg p-3 flex flex-wrap items-center gap-3 hover:border-safety transition">
                <div class="w-12 h-12 rounded-lg bg-red-50 border border-red-200 flex items-center justify-center flex-shrink-0">
                  <svg class="w-6 h-6 text-red-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
                </div>
                <div class="flex-1 min-w-[12rem]">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="px-2 py-0.5 text-xs font-bold bg-navy text-white rounded">${dayLabel}</span>
                    <span class="text-sm font-semibold text-slate-900">${dateLabel}</span>
                    <span class="text-xs text-slate-500">• ${size}</span>
                  </div>
                  <div class="text-xs text-slate-500 mt-0.5"><code>${escapeHtml(f.name)}</code> • diupload ${uploadedAt}</div>
                </div>
                <div class="flex items-center gap-1.5">
                  <button onclick="openInspectionPdf('${insp.id}', '${escapeAttr(f.name)}')" class="px-3 py-1.5 text-sm font-semibold bg-navy hover:bg-navy-700 text-white rounded flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    Lihat
                  </button>
                  <button onclick="downloadInspectionPdf('${insp.id}', '${escapeAttr(f.name)}')" class="px-3 py-1.5 text-sm font-semibold border border-slate-300 hover:bg-slate-50 text-slate-700 rounded flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                  </button>
                  ${isAdmin ? `
                    <button onclick="deleteInspectionPdfConfirm('${insp.id}', '${escapeAttr(f.name)}')" class="px-3 py-1.5 text-sm font-semibold border border-red-300 text-red-600 hover:bg-red-50 rounded" title="Hapus (admin)">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a2 2 0 012-2h2a2 2 0 012 2v3"/></svg>
                    </button>
                  ` : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>`;
      }).catch(err => {
        const host = document.getElementById('pdf-harian-list');
        if (host) host.outerHTML = `<div id="pdf-harian-list" class="bg-red-50 border border-red-200 p-4 rounded-lg text-red-700 text-sm">Gagal memuat daftar PDF: ${escapeHtml(err.message)}</div>`;
      });
    }

    function refreshPdfHarianTab() {
      const insp = window.__currentInspection;
      if (insp && state.inspectionDetailTab === 'pdf') renderPdfHarianTab(insp);
    }

    async function openInspectionPdf(inspectionId, filename) {
      try {
        const url = await getInspectionPdfUrl(inspectionId, filename);
        window.open(url, '_blank', 'noopener');
      } catch (err) {
        toast('Gagal buka PDF: ' + err.message, 'error');

          `inspections/${inspectionId}/H${safeDay}_${date}.pdf`;

      document.getElementById('pdf-upload-date').addEventListener('input', updatePreview);
      updatePreview();

    async function submitInspectionPdfUpload(inspectionId) {
      const fileInput = document.getElementById('pdf-upload-file');
      const dayInput  = document.getElementById('pdf-upload-day');
      const dateInput = document.getElementById('pdf-upload-date');
      const submitBtn = document.getElementById('pdf-upload-submit');
      const msg       = document.getElementById('pdf-upload-msg');

      const showMsg = (text, type = 'error') => {
        const cls = type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-amber-50 border-amber-200 text-amber-800';
        msg.className = `border rounded p-2 text-sm ${cls}`;
        msg.textContent = text;
        msg.classList.remove('hidden');
      };

      const file = fileInput.files?.[0];
      const day = parseInt(dayInput.value, 10);
      const date = dateInput.value;

      if (!file)                       return showMsg('Pilih file PDF dulu.');
      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf'))
                                       return showMsg('File harus PDF.');
      if (file.size > PDF_MAX_BYTES)   return showMsg(`File terlalu besar (${formatBytes(file.size)}). Maksimal ${formatBytes(PDF_MAX_BYTES)}.`);
      if (!Number.isInteger(day) || day < 1 || day > 365)
                                       return showMsg('Nomor hari harus angka antara 1–365.');
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date))
                                       return showMsg('Tanggal laporan wajib diisi.');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Uploading…';

      try {
        await uploadInspectionPdf(inspectionId, file, day, date);
        toast(`PDF H${day} (${date}) berhasil diupload.`, 'success');
        closeModal();
        refreshPdfHarianTab();
      } catch (err) {
        // Tangani konflik (file sudah ada di path yang sama)
        const isConflict = err.statusCode === '409' || /already exists|duplicate/i.test(err.message || '');
        if (isConflict) {
          showMsg(`File H${String(day).padStart(2,'0')}_${date}.pdf sudah ada. Hapus dulu yang lama atau ganti tanggal/nomor hari.`);
        } else {
          showMsg('Gagal upload: ' + (err.message || err));
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload';
      }
    }
    window.submitInspectionPdfUpload = submitInspectionPdfUpload;

              <option value="Minor"    ${f.category==='Minor'?'selected':''}>⚡ Minor (${counts.minor})</option>

    // Render photo grid + upload slot per finding
    // labelType: 'before' | 'after' | 'kondisi' (untuk N/A — pakai field photos_before di DB)
    function renderFindingPhotos(findingId, slot, photos, labelType) {
      const max = 4;
      const slots = [];
      // Render existing photos
      photos.forEach((url, idx) => {
        slots.push(`
          <div class="relative group aspect-square rounded overflow-hidden bg-slate-100 border border-slate-200">
            <img src="${escapeHtml(url)}" alt="${slot}_${idx}" class="w-full h-full object-cover cursor-pointer" onclick="openFindingPhotoLightbox('${findingId}','${slot}',${idx})" />
            ${state.profile.role === 'admin' ? `
              <button onclick="deleteFindingPhoto('${findingId}','${slot}','${escapeHtml(url)}')" class="absolute top-0 right-0 p-1 bg-red-600 text-white rounded-bl opacity-0 group-hover:opacity-100 transition" title="Hapus foto">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>` : ''}
          </div>
        `);
      });
      // Upload slot (if < 4)
      if (photos.length < max) {
        slots.push(`
          <label class="aspect-square rounded border-2 border-dashed border-slate-300 hover:border-safety bg-slate-50 hover:bg-safety/5 flex items-center justify-center cursor-pointer transition">
            <input type="file" accept="image/*" multiple class="hidden" onchange="handleFindingPhotoUpload(event, '${findingId}', '${slot}')" />
            <div class="text-center text-slate-400">
              <svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
              <div class="text-xs mt-0.5">+ Foto</div>
            </div>
          </label>
        `);
      }
      const slotLabel = {
        before:  '📷 Before (kondisi rusak)',
        after:   '📷 After (setelah perbaikan)',
        kondisi: '📷 Foto Kondisi Aktual',
      }[labelType] || '📷 Foto';
      return `
        <div class="mt-3">
          <div class="text-xs font-bold text-slate-600 mb-1.5">${slotLabel} (${photos.length}/${max})</div>
          <div class="grid grid-cols-4 gap-1.5">${slots.join('')}</div>
        </div>
      `;
    }

    async function submitInspectionForm(id) {
      const form = document.getElementById('insp-form');
      const submitBtn = document.getElementById('insp-submit-btn');
      const cancelBtn = document.getElementById('insp-cancel-btn');
      const errBox = document.getElementById('insp-form-error');
      hide(errBox);

      // Build payload
      const payload = {};
      ['inspection_code','kategori_inspeksi','client','service','rig_type','manufacturer','model_serial','place_of_inspection','pi_company','rig_inspector','status','catatan','start_date','end_date'].forEach(f => {
        const el = form.elements[f];
        if (el) payload[f] = el.value || null;
      });
      payload.parent_unit_id = Number(form.elements.parent_unit_id.value) || null;
      ['year_manufactured','height_of_mast','hook_load','power_hp','progress_akumulatif'].forEach(f => {
        const v = form.elements[f]?.value;
        payload[f] = v === '' ? null : Number(v);
      });

      // Validate
      if (!payload.inspection_code) { errBox.textContent = 'Kode siklus wajib diisi.'; show(errBox); return; }
      if (!payload.parent_unit_id)  { errBox.textContent = 'Pilih rig dulu.'; show(errBox); return; }
      if (!payload.start_date)      { errBox.textContent = 'Tanggal mulai wajib diisi.'; show(errBox); return; }
      if (!payload.pi_company)      { errBox.textContent = 'PI wajib diisi.'; show(errBox); return; }
      if (!payload.rig_inspector)   { errBox.textContent = 'Rig Inspector wajib diisi.'; show(errBox); return; }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Menyimpan…'; }
      if (cancelBtn) cancelBtn.disabled = true;
      try {
        let saved;
        if (id) {
          saved = await updateInspection(id, payload);
          logActivity('updated', 'inspection', id, saved.inspection_code);
          toast('Siklus berhasil di-update.', 'success');
        } else {
          saved = await createInspection(payload);
          logActivity('created', 'inspection', saved.id, saved.inspection_code, {
            rig: getParentUnitName(saved.parent_unit_id),
            kategori: saved.kategori_inspeksi,
          });
          toast('Siklus baru berhasil dibuat.', 'success');
        }
        closeModal();
        setInspectionView('detail', saved.id);
      } catch (err) {
        errBox.textContent = `Gagal: ${err.message}`;
        show(errBox);
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = id ? '💾 Simpan Perubahan' : '+ Buat Siklus'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }
    window.submitInspectionForm = submitInspectionForm;

      const cat = state.categories.find(c => c.id === kategoriId);

      return /^mast\b/i.test(cat.name) || /\bmast\b/i.test(cat.name);

    async function submitFindingForm(id) {
      const form = document.getElementById('finding-form');
      const submitBtn = document.getElementById('finding-submit-btn');
      const cancelBtn = document.getElementById('finding-cancel-btn');
      const errBox = document.getElementById('finding-form-error');
      hide(errBox);

      const insp = window.__currentInspection;
      if (!insp) return;

      const payload = {
        inspection_id: insp.id,
        no_urut: Number(form.elements.no_urut.value),
        equipment_id: form.elements.equipment_id.value || null,
        equipment_name_snapshot: form.elements.equipment_name_snapshot.value.trim(),
        qty: form.elements.qty.value || null,
        bagian: form.elements.bagian.value || null,
        category: form.elements.category.value,
        finding: form.elements.finding.value || null,
        mpi_result: form.elements.mpi_result.value || null,
        acceptance_criteria: form.elements.acceptance_criteria.value || null,
        recommendation: form.elements.recommendation.value || null,
        tgl_ditemukan: form.elements.tgl_ditemukan.value,
        status: form.elements.status.value,
        tgl_closed: form.elements.tgl_closed.value || null,
        pic_perbaikan: form.elements.pic_perbaikan.value || null,
        catatan: form.elements.catatan.value || null,
      };

      // Validation
      if (!payload.no_urut)               { errBox.textContent = 'No urut wajib diisi.'; show(errBox); return; }
      if (!payload.equipment_name_snapshot) { errBox.textContent = 'Nama Equipment wajib diisi.'; show(errBox); return; }
      if (!payload.category)              { errBox.textContent = 'Category wajib dipilih.'; show(errBox); return; }
      if (!payload.tgl_ditemukan)         { errBox.textContent = 'Tanggal ditemukan wajib diisi.'; show(errBox); return; }
      if (payload.status === 'Closed' && !payload.tgl_closed) { errBox.textContent = 'Status Closed butuh Tanggal Closed.'; show(errBox); return; }

      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Menyimpan…'; }
      if (cancelBtn) cancelBtn.disabled = true;
      try {
        let saved;
        if (id) {
          saved = await updateFinding(id, payload);
          logActivity('updated', 'finding', id, payload.equipment_name_snapshot);
          toast('Temuan berhasil di-update.', 'success');
        } else {
          saved = await createFinding(payload);
          logActivity('created', 'finding', saved.id, payload.equipment_name_snapshot, { siklus: insp.inspection_code, category: payload.category });
          toast('Temuan baru berhasil dibuat.', 'success');
          // 🔔 Telegram alert untuk Critical baru
          if (payload.category === 'Critical') {
            sendTelegramAlert(
              `🚨 <b>CRITICAL FINDING</b>\n` +
              `Siklus: <b>${insp.inspection_code}</b>\n` +
              `Rig: ${getParentUnitName(insp.parent_unit_id)}\n` +
              `Equipment: <b>${payload.equipment_name_snapshot}</b>${payload.bagian ? ' (' + payload.bagian + ')' : ''}\n` +
              `📝 ${payload.finding || '—'}\n` +
              (payload.recommendation ? `💡 ${payload.recommendation}\n` : '') +
              `👤 ${state.profile.full_name || state.profile.email}`
            );
          }
        }
        closeModal();
        // Refresh detail view
        setInspectionView('detail', insp.id, 'temuan');
      } catch (err) {
        errBox.textContent = `Gagal: ${err.message}`;
        show(errBox);
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = id ? '💾 Simpan' : '+ Tambah Temuan'; }
        if (cancelBtn) cancelBtn.disabled = false;
      }
    }

    async function handleFindingPhotoUpload(event, findingId, slot) {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;
      const finding = (window.__currentFindings || []).find(f => f.id === findingId);
      if (!finding) { toast('Finding gak ketemu.', 'error'); return; }
      const existing = Array.isArray(slot === 'before' ? finding.photos_before : finding.photos_after)
        ? (slot === 'before' ? finding.photos_before : finding.photos_after)
        : [];
      const maxToAdd = 4 - existing.length;
      if (maxToAdd <= 0) { toast('Slot foto sudah penuh (max 4).', 'warn'); return; }
      const toUpload = files.slice(0, maxToAdd);

      toast(`Mengupload ${toUpload.length} foto…`, 'info');
      const newUrls = [];
      for (const file of toUpload) {
        try {
          const url = await uploadFindingPhoto(findingId, slot, file);
          newUrls.push(url);
        } catch (err) {

    function normalizeHeader(h) {
      return String(h || '').toLowerCase().trim().replace(/\s+/g, ' ');

    function parseExcelDate(v) {
      if (v == null || v === '') return null;
      if (v instanceof Date) return v.toISOString().slice(0, 10);
      if (typeof v === 'number') {
        // Excel serial date
        const d = new Date(Date.UTC(1899, 11, 30) + v * 86400000);
        return d.toISOString().slice(0, 10);
      }
      const s = String(v).trim();
      // YYYY-MM-DD
      let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
      // DD/MM/YYYY or DD-MM-YYYY
      m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
      if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
      // DD Bulan YYYY (Indonesia) — "15 Mei 2026"
      const monthsId = {
        januari: 1, februari: 2, maret: 3, april: 4, mei: 5, juni: 6,
        juli: 7, agustus: 8, september: 9, oktober: 10, november: 11, desember: 12,
        jan: 1, feb: 2, mar: 3, apr: 4, jun: 6, jul: 7, ags: 8, agu: 8,
        sep: 9, okt: 10, nov: 11, des: 12
      };
      m = s.match(/^(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/);
      if (m) {
        const monthIdx = monthsId[m[2].toLowerCase()];
        if (monthIdx) return `${m[3]}-${String(monthIdx).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
      }
      // Try parse as date string fallback
      const d = new Date(s);
      if (!isNaN(d)) return d.toISOString().slice(0, 10);
      return s;
    }

    // Parse numeric with unit/text: "96 feet" → 96, "97,5 Ton Metric" → 97.5, "350 HP" → 350
    function parseNumericWithUnit(v) {
      if (v == null || v === '') return null;
      if (typeof v === 'number') return v;
      const s = String(v).trim();
      // Cari angka pertama (handle decimal koma dan titik)
      const m = s.match(/-?[\d.,]+/);
      if (!m) return null;
      // Indonesia decimal: koma → titik. Kalau ada titik & koma, asumsikan titik = thousand separator
      let numStr = m[0];
      if (numStr.includes(',') && numStr.includes('.')) {
        // "1.234,56" → "1234.56"
        numStr = numStr.replace(/\./g, '').replace(',', '.');
      } else if (numStr.includes(',')) {
        numStr = numStr.replace(',', '.');
      }
      const n = parseFloat(numStr);
      return isNaN(n) ? null : n;
    }

    // Extract qty dari nama equipment: "Spider Slip 3ea" → { name: "Spider Slip", qty: "3ea" }
    function extractQtyFromName(name) {
      if (!name) return { name: '', qty: null };
      const s = String(name).trim();
      const m = s.match(/^(.+?)\s+(\d+\s*(?:ea|pcs|set|pc|unit|buah))$/i);
      if (m) return { name: m[1].trim(), qty: m[2].replace(/\s+/g, '') };
      return { name: s, qty: null };
    }

    // Strip rig prefix: "RIG BW H35KD" → "BW H35KD"
    function stripRigPrefix(name) {
      return String(name || '').trim().replace(/^RIG\s+/i, '');
    }

    // Auto-detect bagian Mast dari nama equipment (case-insensitive)
    function detectMastBagian(equipmentName) {
      const n = String(equipmentName || '').toLowerCase().trim();
      const parts = ['A-Frame', 'Crown Block', 'Upper', 'Lower', 'Monkey Board'];
      for (const p of parts) {
        // Match exact or contains as word
        if (n === p.toLowerCase()) return p;
        const regex = new RegExp(`\\b${p.toLowerCase().replace(/-/g, '[-\\s]?')}\\b`);
        if (regex.test(n)) return p;
      }
      return null;
    }

    // Parse Excel + validate
    async function handleInspectionExcelUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';
      if (file.size > 10 * 1024 * 1024) { toast('File terlalu besar (max 10MB).', 'error'); return; }
      toast('Parsing Excel…', 'info');

      try {
        const buffer = await file.arrayBuffer();
        const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
        // Find sheets
        const siklusSheet = wb.Sheets[wb.SheetNames.find(n => /siklus/i.test(n))];
        const temuanSheet = wb.Sheets[wb.SheetNames.find(n => /temuan/i.test(n))];
        if (!siklusSheet && !temuanSheet) { toast('Sheet "SIKLUS INSPEKSI" atau "TEMUAN" tidak ditemukan.', 'error'); return; }

        const siklusRows = siklusSheet ? XLSX.utils.sheet_to_json(siklusSheet, { defval: null }) : [];
        const temuanRows = temuanSheet ? XLSX.utils.sheet_to_json(temuanSheet, { defval: null }) : [];

        // Validate siklus
        const siklusParsed = siklusRows.map((row, idx) => parseAndValidateSiklus(row, idx + 2));
        // Validate temuan
        const equipmentByRig = await fetchAllEquipmentForResolution();
        const tempParsed = await Promise.all(temuanRows.map((row, idx) => parseAndValidateTemuan(row, idx + 2, equipmentByRig, siklusParsed)));

        openImportPreviewModal(siklusParsed, tempParsed);
      } catch (err) {
        toast('Gagal parse Excel: ' + err.message, 'error');
      }
    }
    window.handleInspectionExcelUpload = handleInspectionExcelUpload;

    async function fetchAllEquipmentForResolution() {
      // Map: { [parent_unit_id]: [{id, tag_number, nama_equipment}, ...] }
      const { data, error } = await state.supabase.from('equipment').select('id, tag_number, nama_equipment, assigned_unit_id');
      if (error) throw error;
      const map = {};
      (data || []).forEach(e => {
        if (!map[e.assigned_unit_id]) map[e.assigned_unit_id] = [];
        map[e.assigned_unit_id].push(e);
      });
      return map;
    }

    function parseAndValidateSiklus(row, excelRowNum) {
      // Map row keys (header) → field name
      const data = { _excelRow: excelRowNum, _errors: [], _warnings: [], _status: 'valid' };
      for (const [k, v] of Object.entries(row)) {
        const norm = normalizeHeader(k);
        const field = SIKLUS_COLUMN_MAP[norm];
        if (field) data[field] = v;
      }

      // Validate required
      if (!data.inspection_code) data._errors.push('ID Siklus kosong');
      if (!data._rig_name)       data._errors.push('Rig kosong');
      if (!data.kategori_inspeksi) data._errors.push('Kategori kosong');
      if (!data.start_date)      data._errors.push('Tanggal Mulai kosong');
      if (!data.pi_company)      data._errors.push('PI kosong');
      if (!data.rig_inspector)   data._errors.push('Inspector kosong');

      // Validate enum
      if (data.kategori_inspeksi && !['Cat 3', 'Cat 4'].includes(String(data.kategori_inspeksi).trim())) {
        data._errors.push(`Kategori invalid: ${data.kategori_inspeksi} (harus Cat 3 atau Cat 4)`);
      } else if (data.kategori_inspeksi) {
        data.kategori_inspeksi = String(data.kategori_inspeksi).trim();
      }
      if (data.status && !['On Progress', 'Completed'].includes(String(data.status).trim())) {
        data._warnings.push(`Status invalid: ${data.status} (default ke On Progress)`);
        data.status = 'On Progress';
      }

      // Resolve rig (strip prefix "RIG " kalau ada — sesuai format laporan PI)
      if (data._rig_name) {
        const rigName = stripRigPrefix(data._rig_name);
        const unit = state.parentUnits.find(u => u.name === rigName);
        if (!unit) data._errors.push(`Rig "${rigName}" tidak ditemukan di parent_units`);
        else data.parent_unit_id = unit.id;
      }

      // Parse dates (support format ID: "15 Mei 2026")
      if (data.start_date) data.start_date = parseExcelDate(data.start_date);
      if (data.end_date)   data.end_date = parseExcelDate(data.end_date);

      // Numeric coercion pakai parseNumericWithUnit (strip unit + handle koma decimal)
      ['progress_akumulatif', 'year_manufactured', 'height_of_mast', 'hook_load', 'power_hp'].forEach(f => {
        if (data[f] != null && data[f] !== '') {
          const n = parseNumericWithUnit(data[f]);
          if (n != null) data[f] = n;
          else { data._warnings.push(`${f} bukan angka: ${data[f]} (di-skip)`); data[f] = null; }
        }
      });

      if (data._errors.length > 0) data._status = 'error';
      else if (data._warnings.length > 0) data._status = 'warning';
      return data;
    }

    async function parseAndValidateTemuan(row, excelRowNum, equipmentByRig, siklusParsed) {
      const data = { _excelRow: excelRowNum, _errors: [], _warnings: [], _status: 'valid' };
      for (const [k, v] of Object.entries(row)) {
        const norm = normalizeHeader(k);
        const field = TEMUAN_COLUMN_MAP[norm];
        if (field === '_equipment_query') data._equipment_query = v;
        else if (field) data[field] = v;
      }

      // Required
      if (!data.inspection_code) data._errors.push('ID Siklus kosong');
      if (!data.no_urut)         data._errors.push('No urut kosong');
      if (!data.equipment_name_snapshot && !data._equipment_query) data._errors.push('Equipment kosong');
      if (!data.category)        data._errors.push('Category kosong');
      if (!data.tgl_ditemukan)   data._errors.push('Tanggal Ditemukan kosong');

      // Enum
      if (data.category && !['Critical', 'Major', 'Minor', 'N/A'].includes(String(data.category).trim())) {
        data._errors.push(`Category invalid: ${data.category} (harus Critical/Major/Minor/N/A)`);
      } else if (data.category) {
        data.category = String(data.category).trim();
      }
      if (data.status && !['Open', 'Closed'].includes(String(data.status).trim())) {
        data._warnings.push(`Status invalid: ${data.status} (default ke Open)`);
        data.status = 'Open';
      }
      if (!data.status) data.status = 'Open';
      if (data.mpi_result && !['Discontinuity', 'No Discontinuity', 'N/A'].includes(String(data.mpi_result).trim())) {
        data._warnings.push(`MPI invalid: ${data.mpi_result}`);
        data.mpi_result = null;
      } else if (data.mpi_result) {
        data.mpi_result = String(data.mpi_result).trim();
      }

      // Status Closed → tgl_closed required
      if (data.status === 'Closed' && !data.tgl_closed) data._errors.push('Status Closed butuh Tanggal Closed');

      // Parse dates
      if (data.tgl_ditemukan) data.tgl_ditemukan = parseExcelDate(data.tgl_ditemukan);
      if (data.tgl_closed)    data.tgl_closed = parseExcelDate(data.tgl_closed);

      // Numeric
      if (data.no_urut != null) {
        const n = Number(data.no_urut);
        if (!isNaN(n)) data.no_urut = n;
        else data._errors.push(`No urut bukan angka: ${data.no_urut}`);
      }

      // Resolve equipment via siklus → rig → equipment
      const siklus = siklusParsed.find(s => s.inspection_code === data.inspection_code);
      // Kalau siklus gak ada di sheet (mungkin siklus existing), cari di DB
      let parentUnitId = siklus?.parent_unit_id;
      if (!parentUnitId && data.inspection_code) {
        try {
          const { data: ex } = await state.supabase.from('inspections').select('parent_unit_id').eq('inspection_code', data.inspection_code).maybeSingle();
          if (ex) parentUnitId = ex.parent_unit_id;
          else data._warnings.push(`ID Siklus "${data.inspection_code}" gak ada di sheet maupun DB`);
        } catch (e) { /* ignore */ }
      }

      // Step 1: Extract qty dari nama equipment (kalau qty kosong)
      if (!data.qty && (data.equipment_name_snapshot || data._equipment_query)) {
        const source = data.equipment_name_snapshot || data._equipment_query;
        const { name, qty } = extractQtyFromName(source);
        if (qty) {
          data.qty = qty;
          // Update sumber yang lebih bersih (tanpa qty di belakang)
          if (data.equipment_name_snapshot) data.equipment_name_snapshot = name;
          if (data._equipment_query) data._equipment_query = name;
        }
      }

      // Step 2: Auto-detect bagian Mast dari nama equipment (kalau bagian kosong)
      // Contoh: equipment "Crown Block" → bagian="Crown Block", equipment_query di-redirect ke MAST-XXX
      if (!data.bagian && (data.equipment_name_snapshot || data._equipment_query)) {
        const source = data.equipment_name_snapshot || data._equipment_query;
        const detected = detectMastBagian(source);
        if (detected) {
          data.bagian = detected;
          // Auto-redirect query ke equipment Mast di rig ini (kalau ada)
          if (parentUnitId) {
            const candidates = equipmentByRig[parentUnitId] || [];
            const mastEq = candidates.find(e => /^mast/i.test(e.nama_equipment) || /^mast/i.test(e.tag_number));
            if (mastEq) {
              data._equipment_query = mastEq.tag_number;
              if (!data.equipment_name_snapshot || data.equipment_name_snapshot === source) {
                data.equipment_name_snapshot = mastEq.nama_equipment;
              }
              data._warnings.push(`Auto-detect: "${detected}" dianggap bagian Mast → link ke ${mastEq.tag_number}`);
            }
          }
        }
      }

      // Step 3: Equipment resolution (tag exact → name exact → name partial)
      if (data._equipment_query && parentUnitId) {
        const q = String(data._equipment_query).trim().toLowerCase();
        const candidates = equipmentByRig[parentUnitId] || [];
        let eq = candidates.find(e => e.tag_number.toLowerCase() === q);
        if (!eq) eq = candidates.find(e => e.nama_equipment.toLowerCase() === q);
        if (!eq) eq = candidates.find(e => e.nama_equipment.toLowerCase().includes(q));
        if (eq) {
          data.equipment_id = eq.id;
          if (!data.equipment_name_snapshot) data.equipment_name_snapshot = eq.nama_equipment;
        } else {
          data._warnings.push(`Equipment "${data._equipment_query}" tidak ke-resolve (disimpan sebagai unresolved)`);
          if (!data.equipment_name_snapshot) data.equipment_name_snapshot = String(data._equipment_query);
        }
      } else if (!data.equipment_name_snapshot && data._equipment_query) {
        data.equipment_name_snapshot = String(data._equipment_query);
      }

      if (data._errors.length > 0) data._status = 'error';
      else if (data._warnings.length > 0) data._status = 'warning';
      return data;
    }

      const renderTable = (rows, columns, isSiklus) => {
